name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ---------------------------------------------------------------------------
# Job overview
#
#   build           — all platforms, Release + Debug, sanitizers
#   static-analysis — clang-tidy (Linux only) + Cppcheck (all platforms)
#   valgrind        — Linux only, Debug, memory error detection
#   fuzzing         — Linux only (libFuzzer runtime only reliable on Linux CI)
#   frama-c         — Linux only, formal verification (WP proofs + Eva)
#                     Currently scoped to core/primitives/checked.h,
#                     core/primitives/bits.h, core/primitives/compare.h,
#                     core/primitives/ptr.h, core/slice.h, and
#                     core/memory.h (full surface, 22 functions across
#                     alignment/allocation, raw memory ops, and
#                     bytes_t/cbytes_t variants).
#                     Additional headers will be added as they are annotated.
#   coverage        — Linux only, MC/DC coverage via GCC 14 -fcondition-coverage
#                     Uses -DCANON_CHECKED_FORCE_FALLBACK and
#                     -DCANON_BITS_FORCE_FALLBACK so the fallback paths
#                     in checked.h and bits.h are measurable (builtins
#                     expand to single instructions with no branches for
#                     gcov to see).
#   misra           — Linux only, MISRA C:2012 advisory analysis
#   lifetime-debug  — All platforms, Release + Debug, compatible compilers.
#                     Builds and tests the suite with CANON_LIFETIME=debug
#                     to exercise the runtime lifetime-tracking path
#                     (CANON_LIFETIME_DEBUG). Sanitizers (ASan + UBSan)
#                     enabled in Debug on Linux + macOS to catch any UB
#                     the lifetime instrumentation might introduce.
#                     The matrix mirrors the default `build` job so the
#                     substrate is exercised under the same platform and
#                     compiler combinations: GCC + Clang on Linux, MSVC
#                     on Windows, Clang on macOS. Previously Linux-Clang
#                     only — expanded after Phase 2 (dynvec, dynstring,
#                     smallvec) embedded lifetime_t in five owning types
#                     plus all macro-generated dynvec instantiations,
#                     broadening the surface enough that single-platform
#                     evidence was no longer sufficient.
#
# NOTE — Dr. Memory (Windows memory checker) is intentionally omitted.
#   Dr. Memory crashes internally on Windows Server 2022 (the current
#   windows-latest runner, Build 26100) with an unrecoverable internal
#   fault at startup. This is a known upstream bug with no available fix
#   or workaround as of the time of writing. Memory safety on Windows is
#   covered by the MSVC build with /W4 /WX and by Valgrind on Linux.
#   Re-enable dr-memory when upstream ships a compatible release.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test — all platforms, Release and Debug
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cppcheck

      - name: Install Cppcheck (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          winget install --id Cppcheck.Cppcheck --silent `
            --accept-package-agreements --accept-source-agreements
          $path = (Get-ChildItem "C:\Program Files\Cppcheck" `
            -Filter "cppcheck.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1).DirectoryName
          if ($path) { echo "$path" >> $env:GITHUB_PATH }

      - name: Configure CMake for compile_commands.json (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -S "${{ github.workspace }}"

      - name: Run clang-tidy (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          SKIP="dynstring_test.c dynvec_test.c"
          FILES=""
          for f in $(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null | sort); do
            if ! grep -qE '[^[:space:]]' "$f"; then continue; fi
            BASENAME=$(basename "$f")
            SKIP_THIS=0
            for s in $SKIP; do
              if [ "$BASENAME" = "$s" ]; then SKIP_THIS=1; break; fi
            done
            if [ "$SKIP_THIS" = "1" ]; then continue; fi
            FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No files to analyse — skipping clang-tidy"
            exit 0
          fi

          CHECKS="\
          bugprone-integer-division,\
          bugprone-macro-parentheses,\
          bugprone-misplaced-widening-cast,\
          bugprone-signed-char-misuse,\
          bugprone-sizeof-expression,\
          bugprone-suspicious-memset-usage,\
          bugprone-too-small-loop-variable,\
          bugprone-undefined-memory-manipulation,\
          clang-analyzer-core.CallAndMessage,\
          clang-analyzer-core.DivideZero,\
          clang-analyzer-core.NullDereference,\
          clang-analyzer-core.UndefinedBinaryOperatorResult,\
          clang-analyzer-core.uninitialized.Assign,\
          clang-analyzer-core.uninitialized.Branch,\
          clang-analyzer-deadcode.DeadStores,\
          clang-analyzer-security.insecureAPI.strcpy,\
          misc-misplaced-const,\
          misc-redundant-expression,\
          misc-unused-parameters"

          clang-tidy \
            -p build \
            --checks="-*,$CHECKS" \
            --warnings-as-errors="$CHECKS" \
            --extra-arg="-I${{ github.workspace }}/core/primitives" \
            --extra-arg="-I${{ github.workspace }}/core" \
            --extra-arg="-I${{ github.workspace }}" \
            $FILES

      - name: Run Cppcheck (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cppcheck \
            --enable=warning \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=returnDanglingLifetime:*slice_test.c" \
            "--suppress=returnDanglingLifetime:*borrow_test.c" \
            "--suppress=returnDanglingLifetime:*array_test.c" \
            "--suppress=returnDanglingLifetime:*any_all_test.c" \
            "--suppress=returnDanglingLifetime:*filter_test.c" \
            "--suppress=returnDanglingLifetime:*find_test.c" \
            "--suppress=returnDanglingLifetime:*fold_test.c" \
            "--suppress=returnDanglingLifetime:*map_test.c" \
            "--suppress=returnDanglingLifetime:*reverse_test.c" \
            "--suppress=returnDanglingLifetime:*search_test.c" \
            "--suppress=returnDanglingLifetime:*sort_test.c" \
            "--suppress=returnDanglingLifetime:*unique_test.c" \
            "--suppress=literalWithCharPtrCompare:*diag_test.c" \
            "--suppress=arrayIndexOutOfBounds:*diag.h" \
            "--suppress=ctunullpointer:*deque_test.c" \
            "--suppress=ctunullpointer:*vec_test.c" \
            "--suppress=ctunullpointer:*hashmap_test.c" \
            "--suppress=ctunullpointer:*queue_test.c" \
            "--suppress=ctunullpointer:*stack_test.c" \
            "--suppress=ctunullpointer:*array_test.c" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            "${{ github.workspace }}/test"

      - name: Run Cppcheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cppcheck `
            --enable=warning `
            --std=c99 `
            --error-exitcode=1 `
            --suppress=missingIncludeSystem `
            --suppress=toomanyconfigs `
            "--suppress=returnDanglingLifetime:*slice_test.c" `
            "--suppress=returnDanglingLifetime:*borrow_test.c" `
            "--suppress=returnDanglingLifetime:*array_test.c" `
            "--suppress=returnDanglingLifetime:*any_all_test.c" `
            "--suppress=returnDanglingLifetime:*filter_test.c" `
            "--suppress=returnDanglingLifetime:*find_test.c" `
            "--suppress=returnDanglingLifetime:*fold_test.c" `
            "--suppress=returnDanglingLifetime:*map_test.c" `
            "--suppress=returnDanglingLifetime:*reverse_test.c" `
            "--suppress=returnDanglingLifetime:*search_test.c" `
            "--suppress=returnDanglingLifetime:*sort_test.c" `
            "--suppress=returnDanglingLifetime:*unique_test.c" `
            "--suppress=literalWithCharPtrCompare:*diag_test.c" `
            "--suppress=arrayIndexOutOfBounds:*diag.h" `
            "--suppress=ctunullpointer:*deque_test.c" `
            "--suppress=ctunullpointer:*vec_test.c" `
            "--suppress=ctunullpointer:*hashmap_test.c" `
            "--suppress=ctunullpointer:*queue_test.c" `
            "--suppress=ctunullpointer:*stack_test.c" `
            "--suppress=ctunullpointer:*array_test.c" `
            -I "${{ github.workspace }}/core/primitives" `
            -I "${{ github.workspace }}/core" `
            -I "${{ github.workspace }}/semantics" `
            -I "${{ github.workspace }}/data" `
            -I "${{ github.workspace }}/algo" `
            -I "${{ github.workspace }}/util" `
            -I "${{ github.workspace }}" `
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Fuzzing — Linux only
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang with libFuzzer runtime
        run: sudo apt-get install -y clang

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure

  # -------------------------------------------------------------------------
  # 5. Formal verification — Frama-C (Linux only)
  #
  #    Scope: core/primitives/checked.h, core/primitives/bits.h,
  #    core/primitives/compare.h, core/primitives/ptr.h,
  #    core/slice.h, and core/memory.h (round 1).
  #
  #    checked.h is the first Canon-C header with full ACSL contracts
  #    (every unsigned function plus all three signed functions). bits.h
  #    is the second, covering portable bit manipulation with fallback
  #    paths. compare.h is the third, covering three-way comparators
  #    for all Canon primitive types including floating-point with NaN
  #    handling. ptr.h is the fourth, covering explicit pointer
  #    arithmetic, alignment, and bounds checking with NULL-handling
  #    discipline. slice.h is the fifth and the first non-primitives
  #    header — it defines the canonical {ptr, len} borrow types
  #    (bytes_t, cbytes_t, str_t) plus the DEFINE_SLICE(T) macro for
  #    typed element views. memory.h is the sixth — it adds a heap
  #    allocation surface (mem_alloc / mem_free / mem_alloc_array_checked)
  #    and alignment helpers. memory.h is currently scoped to round 1
  #    (predicates plus the simplest 9 functions); the remaining 22
  #    functions in memory.h will land in round 2+.
  #
  #    Installation: opam with aggressive caching + cvc5 from GitHub.
  #    Ubuntu 24.04 Noble no longer ships Frama-C in its default apt
  #    repositories (it was available through 22.04 Jammy). The only
  #    reliable install path on current runners is opam, which builds
  #    OCaml and Frama-C from source. Without caching, this takes
  #    30-60 minutes every run. With the cache below, the first run
  #    pays that cost once and every subsequent run restores a ready
  #    switch in ~30 seconds. The cache key includes OCAML_VERSION
  #    and FRAMAC_VERSION so bumping either forces a clean rebuild.
  #
  #    CVC5 binary: The opam `cvc5` package (1.3.0) ships only the
  #    OCaml library bindings — not the CLI binary that why3 needs
  #    for `-wp-prover cvc5`. We download the prebuilt CLI binary
  #    from the official cvc5 GitHub release and install it to
  #    /usr/local/bin. This is outside the opam cache (the cache
  #    covers ~/.opam, not /usr/local) so the download happens on
  #    every CI run, but at ~20 MB it adds only a few seconds.
  #    Keeping cvc5 outside opam is actually cleaner because it
  #    decouples the binary version from opam's build constraints.
  #
  #    Provers: Alt-Ergo + Z3 + CVC5 triple-prover setup.
  #    Alt-Ergo handles linear arithmetic and most ACSL contracts very
  #    fast. Z3 handles nonlinear integer reasoning (multiplication
  #    contracts in checked_mul / checked_mul_u64 / checked_mul_isize)
  #    that Alt-Ergo struggles with. CVC5 is a tertiary prover that
  #    closes additional goals beyond what Alt-Ergo and Z3 can handle
  #    (confirmed: CI #791 shows CVC5 discharging 3 goals on checked.h
  #    and 3 goals on ptr.h). WP tries Alt-Ergo first, falls through
  #    to Z3, then to CVC5 — keeping the common case fast while giving
  #    hard goals three chances before timing out. Remaining unproved
  #    goals (2 on checked.h, 15 on bits.h, 10 on ptr.h, 23 on
  #    slice.h, 57 on memory.h) are therefore demonstrated triple-
  #    prover-resistant, which is a stronger certification evidence
  #    statement than single- or dual-prover.
  #
  #    CVC5 auto-detection: why3 config detect does NOT auto-register
  #    cvc5 1.2.1 because why3 1.7.2's prover-detection regex expects
  #    cvc5 version 1.0.x. However, the CVC5 family IS in why3 1.7.2's
  #    known-provers list (confirmed via `why3 config list-supported-
  #    provers`), so we register it manually with `why3 config
  #    add-prover`, which stores the prover under a [partial_prover]
  #    section with manual = true. This is the same workaround used
  #    for Alt-Ergo and Z3 (which are auto-detected but flagged as
  #    "unrecognized version" and accepted anyway).
  #
  #    WP (Weakest Precondition):
  #      Proves ACSL contracts: requires, ensures, assigns, behaviors.
  #      Proves absence of runtime errors via -wp-rte: overflows,
  #      invalid shifts, null derefs, division by zero. Mathematical
  #      proof — if WP says "Valid", the property holds for ALL inputs.
  #
  #    Eva is NOT run on these headers — see the comment below for the
  #    rationale (header-only modules have no entry point).
  #
  #    __FRAMAC__ is automatically defined by Frama-C's preprocessor.
  #    checked.h and bits.h use this to force the fallback path (WP
  #    has no semantics for compiler builtins). compare.h has no
  #    builtins — all code paths are verified directly. ptr.h uses
  #    __FRAMAC__ transitively through contract.h, where the contract
  #    handler body is replaced with a non-terminating loop to hide
  #    stdio calls from WP while preserving the ensures \false
  #    / exits \false contract that callers depend on. slice.h uses
  #    __FRAMAC__ transitively through contract.h for the same
  #    handler-discipline reason — its own require_msg calls collapse
  #    under -DCANON_NO_REQUIRE so the WP and coverage evidence
  #    streams measure the same source. memory.h follows the same
  #    pattern: require_msg collapses under -DCANON_NO_REQUIRE for
  #    both WP and coverage, and mem_secure_zero forces the volatile
  #    write-loop fallback under __FRAMAC__ (memset_s is C11 Annex K
  #    and rarely shipped on certification targets).
  #
  #    Certification evidence produced:
  #      - Absence of runtime errors (all standards)
  #      - Contract verification (requirement traceability)
  #      - Formal proof artifacts (DO-178C objective substitution)
  # -------------------------------------------------------------------------
  frama-c:
    needs: build
    runs-on: ubuntu-latest

    env:
      OCAML_VERSION: "4.14.2"
      FRAMAC_VERSION: "29.0"
      CVC5_VERSION: "1.2.1"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for opam and Frama-C
        # The opam cvc5 package is removed from this install list (see
        # the separate CVC5 CLI installation step below for rationale).
        # python3-tomli was a cvc5-opam-specific build dep — also removed.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            opam \
            m4 \
            pkg-config \
            libgmp-dev \
            zlib1g-dev \
            autoconf \
            autotools-dev \
            graphviz \
            libcairo2-dev \
            libgtk-3-dev \
            libgtksourceview-3.0-dev \
            cmake \
            wget

      - name: Cache opam switch
        id: cache-opam
        uses: actions/cache@v4
        with:
          path: ~/.opam
          # Cache key bumped to v8 because the cvc5 opam package was removed.
          # The old v7 cache contains the library-only cvc5 build which we
          # no longer need. v8 cache will be smaller and faster to restore.
          key: opam-${{ runner.os }}-ocaml-${{ env.OCAML_VERSION }}-framac-${{ env.FRAMAC_VERSION }}-z3-v8

      - name: Initialise opam (cache miss only)
        # cvc5 is NO LONGER installed via opam here. The opam cvc5.1.3.0
        # package ships only OCaml library bindings, not the CLI binary
        # that why3 needs for `-wp-prover cvc5`. We fetch the official
        # prebuilt cvc5 binary from GitHub releases in a separate step
        # below. Removing cvc5 from opam also shrinks the cache and
        # eliminates the conf-python3-tomli dependency chain.
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/.opam
          opam init -y --bare --no-setup --disable-sandboxing
          opam switch create frama-c ocaml-base-compiler.${OCAML_VERSION}
          eval $(opam env --switch=frama-c)
          opam install -y --confirm-level=unsafe-yes --assume-depexts \
            frama-c.${FRAMAC_VERSION} alt-ergo why3 z3

      - name: Install cvc5 CLI binary from GitHub releases
        # The opam `cvc5` package installs OCaml bindings, not a CLI
        # binary. WP + why3 need the standalone `cvc5` executable.
        # We fetch it from the official cvc5 GitHub release and
        # install to /usr/local/bin, which is on PATH by default.
        #
        # Version pinned to CVC5_VERSION env var so CI remains
        # deterministic. Bumping the version is a one-line change
        # that doesn't require cache invalidation (this install
        # runs outside the opam cache).
        #
        # The download is ~20-30 MB and takes a few seconds. We do
        # this on every run (cache hit or miss) because the binary
        # lives outside ~/.opam — but it's cheap enough that this
        # isn't worth optimizing further.
        run: |
          CVC5_URL="https://github.com/cvc5/cvc5/releases/download/cvc5-${CVC5_VERSION}/cvc5-Linux-x86_64-static.zip"
          echo "Downloading cvc5 ${CVC5_VERSION} from ${CVC5_URL}"
          wget -q "${CVC5_URL}" -O /tmp/cvc5.zip
          unzip -q /tmp/cvc5.zip -d /tmp/cvc5-release
          # The zip extracts to a directory like cvc5-Linux-x86_64-static/bin/cvc5
          CVC5_EXTRACTED=$(find /tmp/cvc5-release -name cvc5 -type f | head -1)
          if [ -z "${CVC5_EXTRACTED}" ]; then
            echo "ERROR: cvc5 binary not found in downloaded archive"
            echo "Archive contents:"
            find /tmp/cvc5-release -type f
            exit 1
          fi
          echo "Found cvc5 binary at: ${CVC5_EXTRACTED}"
          sudo cp "${CVC5_EXTRACTED}" /usr/local/bin/cvc5
          sudo chmod +x /usr/local/bin/cvc5
          echo "Installed cvc5 to /usr/local/bin/cvc5"
          /usr/local/bin/cvc5 --version | head -3

      - name: Activate opam environment and configure Why3 provers
        # why3 config detect auto-registers Alt-Ergo 2.6.3 and Z3 4.15.2
        # (with "version not recognized" warnings because the installed
        # versions are newer than why3 1.7.2's detection regex). It does
        # NOT auto-register cvc5 because why3's version regex is tuned
        # to cvc5 1.0.x. We work around this with `why3 config add-prover`,
        # which bypasses version detection and stores the prover under
        # [partial_prover] with manual = true.
        #
        # cvc5 binary location: /usr/local/bin/cvc5 (installed in the
        # previous step from the official GitHub release). why3 needs
        # an absolute path for add-prover, and /usr/local/bin is on
        # PATH by default.
        #
        # Robustness: `set +e` and explicit error handling keep this
        # step from failing catastrophically if cvc5 registration fails.
        # The WP steps then fall back to Alt-Ergo + Z3 only, same as
        # before cvc5 was introduced.
        run: |
          set +e
          eval $(opam env --switch=frama-c)
          OPAM_BIN="$(opam var --switch=frama-c bin)"
          echo "${OPAM_BIN}" >> $GITHUB_PATH
          export PATH="${OPAM_BIN}:${PATH}"

          echo "--- Versions ---"
          frama-c -version
          alt-ergo --version

          CVC5_BIN="/usr/local/bin/cvc5"
          if [ -x "${CVC5_BIN}" ]; then
            echo "cvc5 binary: ${CVC5_BIN}"
            "${CVC5_BIN}" --version | head -5
          else
            echo "WARN: cvc5 binary not found at ${CVC5_BIN}"
            echo "      WP will run without cvc5"
          fi

          echo ""
          echo "--- Supported prover families (grep cvc5 for confirmation) ---"
          why3 config list-supported-provers 2>&1 | grep -i cvc5 \
            || echo "cvc5 family not found in why3 supported-provers list"

          echo ""
          echo "--- Auto-detect provers (why3 config detect) ---"
          why3 config detect

          if [ -x "${CVC5_BIN}" ]; then
            echo ""
            echo "--- Manual cvc5 registration (add-prover) ---"
            # Try common cvc5 prover family names. why3's prover family
            # naming has varied across versions; try lowercase first, then
            # uppercase, fall through gracefully if both fail.
            REGISTERED=0
            for FAMILY_NAME in cvc5 CVC5; do
              echo "Attempting: why3 config add-prover ${FAMILY_NAME} ${CVC5_BIN} cvc5"
              if why3 config add-prover "${FAMILY_NAME}" "${CVC5_BIN}" cvc5 2>&1; then
                echo "cvc5 registered successfully under family name '${FAMILY_NAME}'"
                REGISTERED=1
                break
              else
                echo "Registration with family name '${FAMILY_NAME}' failed, trying next..."
              fi
            done
            if [ "${REGISTERED}" -ne 1 ]; then
              echo "WARN: all cvc5 registration attempts failed — WP will run without cvc5"
            fi
          else
            echo ""
            echo "--- Skipping manual cvc5 registration (binary missing) ---"
          fi

          echo ""
          echo "--- Registered provers after manual add (why3 config list-provers) ---"
          why3 config list-provers 2>&1 || true

          echo ""
          echo "--- Registered prover sections in why3.conf ---"
          grep -E '^\[(partial_)?prover\]|^name = |^version = ' ~/.why3.conf \
            2>/dev/null || echo "(why3.conf not found or no prover sections)"

          # Force exit 0 — this step is diagnostic configuration only;
          # any individual command failure has been handled above.
          exit 0

      - name: "WP: core/primitives/checked.h"
        # WP is expected to leave exactly 2 goals unproven:
        #   typed_checked_add_overflow_ensures
