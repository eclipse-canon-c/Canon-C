  # -------------------------------------------------------------------------
  # 7. MISRA C:2012 advisory analysis (Linux only)
  #
  #    Uses Cppcheck's MISRA addon for preliminary compliance checking.
  #    This is NOT a qualified MISRA checker — it covers approximately
  #    60-70% of MISRA C:2012 rules. For certification, replace with
  #    a qualified tool: Polyspace, LDRA, PC-lint, or Parasoft C/C++test.
  #
  #    This job is advisory — it does not fail the build. Its purpose
  #    is to track MISRA compliance progress and identify deviations
  #    that must be documented in docs/deviations.md.
  #
  #    Suppressions:
  #      - misra-config:*_impl.h — macro-templated implementation headers
  #        (hashmap_impl.h, deque_impl.h, etc.) emit [misra-config]
  #        errors because Cppcheck cannot resolve macro-instantiated
  #        type names (e.g. HASHMAP_SLOT_NAME) without an instantiation
  #        context. This is a tool limitation, not a code defect.
  #        Qualified MISRA checkers handle this correctly via full
  #        preprocessor-aware analysis.
  # -------------------------------------------------------------------------
  misra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run MISRA C:2012 analysis on library headers
        shell: bash
        run: |
          HEADERS=$(find \
            "${{ github.workspace }}/core" \
            "${{ github.workspace }}/semantics" \
            "${{ github.workspace }}/data" \
            "${{ github.workspace }}/algo" \
            "${{ github.workspace }}/util" \
            -name "*.h" -type f 2>/dev/null | sort)

          if [ -z "$HEADERS" ]; then
            echo "No header files found — skipping MISRA analysis"
            exit 0
          fi

          echo "Found $(echo "$HEADERS" | wc -l) header files to analyze"

          cppcheck \
            --addon=misra \
            --std=c99 \
            --language=c \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=misra-config:*_impl.h" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            $HEADERS \
            2>&1 | tee misra_report.txt

          echo ""
          echo "==============================================="
          echo "  MISRA C:2012 Summary"
          echo "==============================================="

          TOTAL=$(grep -c "\[misra-" misra_report.txt || true)
          echo "  Total violations: ${TOTAL}"
          echo ""
          echo "  NOTE: Rule category breakdown (Mandatory/Required/Advisory)"
          echo "  requires a MISRA rule lookup table and is not produced by"
          echo "  Cppcheck alone. For certification, use a qualified tool"
          echo "  (Polyspace, LDRA, PC-lint) that emits categorized output."
          echo ""
          echo "  Deviations documented in: docs/deviations.md"
          echo "==============================================="

          # Advisory only — does not fail the build.
          # When MISRA compliance is mature, uncomment to enforce:
          # if [ "${TOTAL}" -gt 0 ]; then
          #   echo "FAIL: ${TOTAL} MISRA violations found"
          #   exit 1
          # fi

      - name: Upload MISRA report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra_report.txt

  # -------------------------------------------------------------------------
  # 8. Lifetime-debug build — all platforms, Release + Debug
  #
  #    Builds and runs the full test suite with CANON_LIFETIME=debug,
  #    which defines CANON_LIFETIME_DEBUG project-wide. This activates:
  #      - lifetime_t lt field on Arena, Pool, DynString, every
  #        dynvec_T instantiation, and (Phase 3) smallvec instantiations
  #      - source_lt + captured_id fields on every borrow struct
  #      - _from_lifetime constructors capture the source's token
  #      - BORROW_LT_CHECK_ fires require_msg on every _get if the
  #        captured ID no longer matches the source's current ID
  #
  #    Matrix mirrors the default `build` job — same OS/compiler/
  #    build-type coverage. This catches:
  #      - MSVC vs GCC/Clang struct-padding differences for the
  #        embedded lifetime_t field
  #      - macOS Clang vs Linux Clang alignment behavior of uint64_t
  #        inside struct
  #      - Platform-specific pointer-size assumptions in the
  #        (region_id_t)(uintptr_t)&v ID derivation
  #      - Release-mode codegen differences when LIKELY/UNLIKELY hints
  #        interact with the additional fields
  #
  #    Sanitizers (ASan + UBSan) are enabled in Debug on Linux + macOS
  #    to catch any latent UB the lifetime instrumentation might
  #    introduce — e.g. a forgotten field initialiser leaving
  #    captured_id uninitialised, or pointer arithmetic that the
  #    additional fields perturb. MSVC builds skip ASan (DLL
  #    deployment limitation; see ENABLE_SANITIZERS in CMakeLists.txt).
  #
  #    Previously this job was Linux-Clang only — sufficient evidence
  #    when only arena and borrow embedded lifetime_t (Phase 1). After
  #    Phase 2 broadened the surface to five owning types plus all
  #    macro-generated dynvec instantiations, single-platform coverage
  #    was no longer adequate. The matrix expanded after Phase 2
  #    landed.
  # -------------------------------------------------------------------------
  lifetime-debug:
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS, CANON_LIFETIME=debug)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCANON_LIFETIME=debug \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows, CANON_LIFETIME=debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCANON_LIFETIME=debug `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
