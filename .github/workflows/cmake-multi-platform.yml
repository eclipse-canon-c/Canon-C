name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ---------------------------------------------------------------------------
# Job overview
#
#   build           — core matrix: all platforms, Release + Debug, sanitizers
#   static-analysis — clang-tidy + Cppcheck, all platforms, errors block
#   valgrind        — Linux only, Debug, memory error detection
#   dr-memory       — Windows only, Debug, memory error detection
#   fuzzing         — Linux + macOS + Windows/Clang, 30s per fuzz target
#
# Jobs 2-5 depend on build passing first.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test — all platforms, Release and Debug
  #
  # Sanitizer matrix:
  #   Linux/macOS  GCC + Clang  ->  ASan + UBSan
  #   Windows      MSVC         ->  ASan only (/fsanitize=address)
  #   Windows      Clang        ->  ASan + UBSan
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          # macOS + gcc is Apple's Clang shim — redundant
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      # Sanitizers are enabled on Debug builds only.
      # On Windows we use pwsh to avoid bash mangling the workspace path.
      # On Linux/macOS we keep bash for the conditional SANITIZERS variable.
      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis — clang-tidy + Cppcheck
  #    Runs on all three platforms. Errors block the build.
  #    Needs compile_commands.json from CMake (CMAKE_EXPORT_COMPILE_COMMANDS).
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install clang-tidy and Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install llvm cppcheck

      - name: Install clang-tidy and Cppcheck (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cppcheck llvm --yes

      - name: Configure CMake (generate compile_commands.json)
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -S "${{ github.workspace }}"

      - name: Run clang-tidy
        shell: bash
        run: |
          FILES=$(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No test source files found — skipping clang-tidy"
            exit 0
          fi
          clang-tidy \
            -p build \
            --warnings-as-errors="*" \
            $FILES

      - name: Run Cppcheck
        shell: bash
        run: |
          cppcheck \
            --enable=all \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  #    Builds without sanitizers (conflicts with Valgrind instrumentation),
  #    then runs the test suite under Valgrind memcheck.
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Dr. Memory — Windows only
  #    Builds without sanitizers (conflicts with Dr. Memory instrumentation),
  #    then runs each test binary individually under Dr. Memory.
  # -------------------------------------------------------------------------
  dr-memory:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dr. Memory
        run: choco install drmemory --yes

      - name: Configure CMake (no sanitizers — conflicts with Dr. Memory)
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Debug `
            -DENABLE_SANITIZERS=OFF `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests under Dr. Memory
        shell: pwsh
        run: |
          $drmemory = (Get-Command drmemory.exe -ErrorAction SilentlyContinue)?.Source
          if (-not $drmemory) {
            $drmemory = "C:\Program Files\Dr. Memory\bin\drmemory.exe"
          }

          $testExes = Get-ChildItem -Path build\Debug -Filter "*_test.exe"
          $failed = @()

          foreach ($exe in $testExes) {
            Write-Host "Running Dr. Memory on $($exe.Name)..."
            & "$drmemory" -exit_code_if_errors 1 -- $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              $failed += $exe.Name
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host "Dr. Memory reported errors in: $($failed -join ', ')"
            exit 1
          }

  # -------------------------------------------------------------------------
  # 5. Fuzzing — Linux, macOS, Windows/Clang
  #    Each fuzz target runs for 25 seconds (30s CTest timeout).
  #    Uses libFuzzer — Clang only.
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
          - os: windows-latest
            c_compiler: clang
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=Debug `
            -DENABLE_FUZZING=ON `
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure
