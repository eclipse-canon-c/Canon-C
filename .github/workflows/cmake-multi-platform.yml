      - name: "WP: core/primitives/compare.h"
        # compare.h achieved 208/208 (100%) with Typed+Cast model.
        # All 28 comparator functions are fully proved — functional
        # correctness, RTE absence, and assigns \nothing.
        #
        # -wp-model Typed+Cast: compare.h takes void* parameters and
        # casts them to typed pointers inside the function body. WP's
        # default Typed memory model treats void* as char* (sint8*) and
        # flags incompatible pointer casts, preventing mem_access RTE
        # goals from being proved. Typed+Cast relaxes the model to
        # allow pointer casts between compatible-sized types, which is
        # exactly what these comparators do (void* → const u32*, etc.).
        # See docs/deviations.md, entry VERIFY-005.
        run: |
          eval $(opam env --switch=frama-c)
