      - uses: ./.github/actions/framac-setup
      - name: "WP: vmacros/vdrivers/vec_verify.h (VERIFY-018, enforced)"
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I semantics \
              -I data \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            vmacros/vdrivers/vec_verify.h 2>&1 | tee wp_vec_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e
          echo ""
          echo "==============================================="
          echo "  WP (vec_verify.h) exit status: ${WP_EXIT}"
          echo "  MODE: ENFORCED — VERIFY-018 baseline, exact match."
          echo "  baseline: CI #1152 (96dd41d): 5184/5380, 196 unproved"
          echo "  model=Typed+Cast provers=alt-ergo,z3,cvc5 timeout=120 split=on"
          echo "  config=-DCANON_NO_REQUIRE -DNDEBUG (CANON_LIFETIME off)"
          echo "==============================================="
          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_vec_output.txt || true)
          echo "  ${PROVED_LINE}"
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to an"
            echo "      ACSL syntax error in vec_verify.h or an include"
            echo "      resolution failure. Check the WP output above for"
            echo "      [kernel:annot-error] or [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_vec_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi
          # Prover-environment check (informational, kept from report-only):
          # if CVC5 vanished from the prover set, its 8 baseline goals will
          # flip and the gates below will fail — this warning names the
          # likely cause before the confusing diff does.
          CVC5_INVOKED=$(grep -cE "CVC5|cvc5" wp_vec_output.txt || true)
          if [ "${CVC5_INVOKED}" -eq 0 ]; then
            echo "WARNING: CVC5 does not appear in WP output."
            echo "         The triple-prover setup may have degraded to"
            echo "         dual-prover. Check the prover configuration step;"
            echo "         expect gate failures below if so."
          fi
          # Gate 0 — pinned goal surface (promotion checklist step 3).
          # Catches silent drift of the goal set itself (a function dropping
          # out of the TU, a deleted contract, an include-graph change)
          # that gates 1-3 could miss.
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          if [ "${PROVED_COUNT}" != "5184 / 5380" ]; then
            echo "FAIL: proved-goal summary changed (baseline: 5184 / 5380)."
            echo "      The goal surface drifted — reclassify in VERIFY-018,"
            echo "      then ratchet this pin, EXPECTED_UNPROVED, and CHECKS"
            echo "      together in one acknowledged commit."
            exit 1
          fi
          # VERIFY-018 baseline residual count.
          EXPECTED_UNPROVED=196
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_vec_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_vec_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_vec_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"
          # Gate 1 — no Failed verdicts, ever. Timeout/Unknown are the
          # classified residual verdicts; Failed means a contract is WRONG.
          if [ "${FAILED_COUNT}" -ne 0 ]; then
            echo "FAIL: ${FAILED_COUNT} goal(s) FAILED (not timeout) —"
            echo "      a contract in vec_verify.h is falsified:"
            grep -E "^\[wp\] \[Failed\]" wp_vec_output.txt
            exit 1
          fi
          # Gate 2 — exact count.
          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo "FAIL: unproved count ${UNPROVED_COUNT} != ${EXPECTED_UNPROVED}."
            echo "      Higher: regression or new residual — classify in"
            echo "      VERIFY-018 before touching this job. Lower: a goal"
            echo "      newly proved — ratchet CHECKS, EXPECTED_UNPROVED and"
            echo "      the pinned Proved line down in the same PR. Diff"
            echo "      against CHECKS below:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_vec_output.txt || true
            exit 1
          fi
          # Gate 3 — by-name roll-call: every classified residual must be
          # present. With gate 2's exact count and unique names, presence
          # of all of them == set equality (a swap — one goal regressing
          # while another improves, count unchanged — fails here).
