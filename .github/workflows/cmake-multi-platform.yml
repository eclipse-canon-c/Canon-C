      - name: "Debug: per-line MC/DC detail for arena.h"
        # Identifies which specific conditions in arena.h are uncovered.
        # As of the CI run that landed test_try_alloc_aligned_failure
        # (closing the line 510 compound-return gap), arena.h reaches
        # 90.6% MC/DC (58/64, 6 missed). The 6 remaining outcomes are
        # documented in docs/deviations.md as MCDC-003 and split into
        # two categories:
        #
        #   1. Overflow guard structural unreachability (4 outcomes) —
        #      the compound `||` in arena_alloc (line 346) and
        #      arena_alloc_aligned (line 401):
        #          if (arena->offset > CANON_USIZE_MAX - pad ||      // cond 0
        #              arena->offset + pad > CANON_USIZE_MAX - size ||// cond 1
        #              arena->offset + pad + size > arena->capacity) // cond 2
        #              return NULL;
        #      gcov reports cond 0 and cond 1 as "not covered (true)" in
        #      both functions. Both subconditions are structurally
        #      unreachable under the arena_invariant predicate:
        #        - arena_invariant requires capacity <= CANON_ARENA_MAX_SIZE
        #        - CANON_ARENA_MAX_SIZE = CANON_GB = 2^30 (limits.h)
        #        - pad <= CANON_DEFAULT_ALIGN - 1 <= 15
        #        - therefore offset + pad <= 2^30 + 15, well below
        #          CANON_USIZE_MAX on both 32-bit and 64-bit platforms,
        #          so cond 0 cannot fire
        #        - cond 1 firing in MC/DC isolation requires
        #          offset + pad + size > CANON_USIZE_MAX while cond 2 is
        #          false (offset + pad + size <= capacity); since
