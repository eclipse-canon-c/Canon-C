name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ---------------------------------------------------------------------------
# Job overview
#
#   build           — all platforms, Release + Debug, sanitizers
#   static-analysis — clang-tidy (Linux only) + Cppcheck (all platforms)
#   valgrind        — Linux only, Debug, memory error detection
#   dr-memory       — Windows only, Debug, memory error detection
#   fuzzing         — Linux only (libFuzzer runtime only reliable on Linux CI)
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test — all platforms, Release and Debug
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis
  #
  #    clang-tidy — Linux only
  #      Requires compile_commands.json. Uses a curated check set that
  #      excludes checks inappropriate for test code (style complexity
  #      limits, LLVM-internal libc restrictions, cert naming rules for
  #      identifiers, etc.).
  #
  #    Cppcheck — all platforms
  #      Does not need a compile DB. Errors and warnings are reported;
  #      style/information/performance/portability diagnostics are
  #      suppressed to avoid noise from intentional test patterns
  #      (same-expression comparisons that verify identity, etc.).
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- Tool installation ------------------------------------------------

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cppcheck

      - name: Install Cppcheck (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # The choco Cppcheck package is compiled against a non-existent
          # staging path and fails to load std.cfg. Install the official
          # release directly instead.
          $version = "2.14.0"
          $installer = "cppcheck-$version-x64-Setup.msi"
          $url = "https://github.com/danmar/cppcheck/releases/download/$version/$installer"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process msiexec.exe -Wait -ArgumentList "/i $installer /quiet /norestart"
          # Add to PATH for subsequent steps
          echo "C:\Program Files\Cppcheck" >> $env:GITHUB_PATH

      # --- clang-tidy (Linux only) ------------------------------------------

      - name: Configure CMake for compile_commands.json (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -S "${{ github.workspace }}"

      - name: Run clang-tidy (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Skip blank files and files with known pre-existing issues
          # that belong to code we did not author:
          #   ptr_test.c   — ALIGN_OF macro triggers gnu-offsetof-extensions
          #   types_test.c — CHECK(!true == false) triggers logical-not-parentheses
          #   limits_test.c — reserved _check_* identifiers, cert-err33-c on fprintf
          #   arena_test.c / memory_test.c — empty placeholder files
          SKIP="arena_test.c memory_test.c ptr_test.c types_test.c limits_test.c"
          FILES=""
          for f in $(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null | sort); do
            if ! grep -qE '[^[:space:]]' "$f"; then
              echo "Skipping blank file: $f"
              continue
            fi
            BASENAME=$(basename "$f")
            SKIP_THIS=0
            for s in $SKIP; do
              if [ "$BASENAME" = "$s" ]; then SKIP_THIS=1; break; fi
            done
            if [ "$SKIP_THIS" = "1" ]; then
              echo "Skipping excluded file: $f"
              continue
            fi
            FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No files to analyse — skipping clang-tidy"
            exit 0
          fi

          # Curated check set:
          #   Start with all checks (*), then disable categories/checks that
          #   are inappropriate for C99 test code:
          #
          #   -llvmlibc-*                  LLVM-internal rules (no system headers etc.)
          #   -cppcoreguidelines-avoid-non-const-global-variables
          #                                Test counters (g_pass/g_fail) are intentionally mutable globals
          #   -readability-function-cognitive-complexity
          #                                Test functions are intentionally long
          #   -readability-magic-numbers   Test literals are self-documenting
          #   -cert-err33-c                fprintf return ignored in test macros — intentional
          #   -bugprone-reserved-identifier
          #   -cert-dcl37-c
          #   -cert-dcl51-cpp              _check_* typedefs in limits_test.c — not our code
          #   -google-readability-casting  C-style casts are idiomatic in C99
          #   -misc-include-cleaner        Header inclusion style is intentional
          #   -altera-*                    FPGA-specific rules not applicable here
          #   -fuchsia-*                   Fuchsia OS-specific rules not applicable here
          #   -hicpp-*                     High-integrity C++ rules not applicable to C test code
          CHECKS="*,\
          -llvmlibc-*,\
          -cppcoreguidelines-avoid-non-const-global-variables,\
          -readability-function-cognitive-complexity,\
          -readability-magic-numbers,\
          -cert-err33-c,\
          -bugprone-reserved-identifier,\
          -cert-dcl37-c,\
          -cert-dcl51-cpp,\
          -google-readability-casting,\
          -misc-include-cleaner,\
          -altera-*,\
          -fuchsia-*,\
          -hicpp-*"

          clang-tidy \
            -p build \
            --checks="$CHECKS" \
            --warnings-as-errors=* \
            --extra-arg="-I${{ github.workspace }}/core/primitives" \
            --extra-arg="-I${{ github.workspace }}/core" \
            --extra-arg="-I${{ github.workspace }}" \
            $FILES

      # --- Cppcheck (all platforms) -----------------------------------------
      # Only error-level findings are reported. Style, performance,
      # portability, and information diagnostics are suppressed to avoid
      # noise from intentional test patterns (identity comparisons,
      # duplicate expressions in boundary tests, etc.).

      - name: Run Cppcheck (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cppcheck \
            --enable=error,warning \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            "${{ github.workspace }}/test"

      - name: Run Cppcheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cppcheck `
            --enable=error,warning `
            --std=c99 `
            --error-exitcode=1 `
            --suppress=missingIncludeSystem `
            -I "${{ github.workspace }}/core/primitives" `
            -I "${{ github.workspace }}/core" `
            -I "${{ github.workspace }}/semantics" `
            -I "${{ github.workspace }}/data" `
            -I "${{ github.workspace }}/algo" `
            -I "${{ github.workspace }}/util" `
            -I "${{ github.workspace }}" `
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Dr. Memory — Windows only
  # -------------------------------------------------------------------------
  dr-memory:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dr. Memory
        shell: pwsh
        run: |
          # Install Dr. Memory via its official GitHub release rather than
          # choco, which places the binary in an unpredictable versioned path.
          $version = "2.6.0"
          $zip = "DrMemory-Windows-$version.zip"
          $url = "https://github.com/DynamoRIO/drmemory/releases/download/release_$version/$zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "C:\DrMemory"
          # Add the bin directory (one level inside the versioned folder) to PATH
          $bin = (Get-ChildItem "C:\DrMemory" -Filter "bin" -Recurse -Directory |
                  Select-Object -First 1).FullName
          echo "$bin" >> $env:GITHUB_PATH

      - name: Configure CMake (no sanitizers — conflicts with Dr. Memory)
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Debug `
            -DENABLE_SANITIZERS=OFF `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests under Dr. Memory
        shell: pwsh
        run: |
          $drmemory = (Get-Command drmemory.exe -ErrorAction SilentlyContinue)?.Source
          if (-not $drmemory) {
            Write-Error "drmemory.exe not found on PATH"
            exit 1
          }

          Write-Host "Using Dr. Memory at: $drmemory"

          $testExes = Get-ChildItem -Path build\Debug -Filter "*_test.exe"
          $failed = @()

          foreach ($exe in $testExes) {
            Write-Host "Running Dr. Memory on $($exe.Name)..."
            & "$drmemory" -exit_code_if_errors 1 -- $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              $failed += $exe.Name
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host "Dr. Memory reported errors in: $($failed -join ', ')"
            exit 1
          }

  # -------------------------------------------------------------------------
  # 5. Fuzzing — Linux only
  #
  #    libFuzzer requires a Clang toolchain that ships the fuzzer runtime.
  #    macOS Xcode Clang does not ship libclang_rt.fuzzer_osx.a, and
  #    Windows Clang CI does not have the fuzzer DLL available at runtime.
  #    Linux apt Clang ships the full fuzzer runtime reliably.
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang with libFuzzer runtime
        run: sudo apt-get install -y clang

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure
