            echo "FAIL: error.h should have 0 unproved goals."
            echo "      Found ${UNPROVED_COUNT} unproved goals — this is a"
            echo "      regression. error.h is the semantics/ layer's clean"
            echo "      baseline; any residual needs a VERIFY-013 category in"
            echo "      docs/deviations.md before this wrapper is updated."
            echo ""
            echo "Observed unproved goals:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_error_output.txt || true
