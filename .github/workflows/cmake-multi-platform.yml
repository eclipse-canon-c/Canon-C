      - name: "WP: core/primitives/bits.h"
        # WP is expected to leave exactly 15 goals unproven (as Timeout
        # or Unknown — WP may classify the same goal differently across
        # runs depending on solver heuristics).
        # These are all WP model limitations on bitwise reasoning — not
        # code defects. Categories:
        #   - Bitwise complement (~) in specs: bits_clear, bits_insert (3)
        #   - SWAR popcount magic constants: bits_popcount (1)
        #   - Rotation shift RTE + spec |: bits_rotl, bits_rotr (4)
        #   - Minimality through bit-smearing: bits_next_power_of_two (4)
        #   - Byte swap signed overflow + spec: bits_bswap16/32/64 (3)
        # All 15 are documented in docs/verification.md and deviations.md.
        # The wrapper below verifies WP fails on EXACTLY these 15 goals —
        # any additional failure is a regression and fails the job.
        run: |
