      - name: Upload WP proof output (result)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wp-proof-result
          path: wp_result_output.txt
  
  # -------------------------------------------------------------------------
  # borrow.h — ENFORCED, 120s / -wp-split.
  #
  # First verified header in semantics/ with in-place contracts, and the
  # project's first hybrid Shape-A/Shape-B header: the 24 non-macro
  # functions (borrowed_ptr x6, borrowed_str x9, borrowed_bytes x9) carry
  # ACSL and are verified here; DEFINE_BORROWED_SLICE is outside the
  # verified surface, parked with the other single-file macro families in
  # docs/vmacros.md (DEFINE_SLICE precedent: documented + tested, not
  # WP-verified).
  #
  # Verified configuration is the default build (CANON_LIFETIME off,
  # -DCANON_NO_REQUIRE -DNDEBUG): the BORROW_LT_* macros expand to nothing,
  # so WP sees the exact shipped bodies of the ABI guarantee. The
  # lifetime-debug path is runtime-only by construction (OWN-001 §7) and
  # stays covered by borrow_test.c across the CI matrix, including the
  # OWN-002 double-reset regression guards.
  #
  # Composability check #6 — CONFIRMED: the TU's substrate is checked.h +
  # slice.h (no ptr.h, no memory.h — slice.h does not pull them), and the
  # inherited surface is exactly 17 goals re-emitted byte-identically:
  # slice.h's 15 (VERIFY-007/-012) + checked.h's 2 (VERIFY-002, prefix
  # flipped typed_ -> typed_cast_ under this TU's model). Own residuals:
  # exactly 2, both on borrowed_bytes_eq's memcmp call site (the only
  # direct libc call in the header) — the danglingness_s1/s2 pair; the
  # valid_s1/s2 and initialization goals closed via the day-one guarded
  # \valid_read/\initialized requires. Zero function-pointer residuals:
  # borrow.h has no combinators or hooks — the first downstream header
  # since error.h to add no new residual class at all.
  #
  # Cross-stream tie-in: gcov reports borrow.h at 38/40 MC/DC (95.0%,
  # CI #1106) with exactly 2 outcomes open — the NULL-true sides of the
  # one-NULL guard in borrowed_bytes_eq. The named goal dead_by_invariant
  # (an /*@ assert \false */ inside that guard) PROVED at CI #1110 under
  # cbytes_invariant, completing the MCDC-008 cross-stream record
  # (MCDC-002 shape, seventh instance, first in semantics/, first carried
  # by a named assert). This job's proved-set check on dead_by_invariant
  # is the proof-stream regression detector; the per-line coverage debug
  # step in the coverage job is the measurement-stream one.
  #
  # Promoted from report-only to enforced as of {TODO: promotion CI #}
  # (VERIFY-016/MCDC-008 landed in the same PR): report-only first at
  # 383bf9f (CI #1109, 27 unproved — the final 19 plus 8 call-site
  # chaining goals from slice.h contracts mirrored by shape); aligned to
  # slice.h's real clauses at 262a503 (CI #1110): 2433/2452 proved,
  # exactly 19 unproved (17 inherited + 2 own), 0 Unknown, 0 Failed,
  # zero outside prediction, dead_by_invariant proved. The 19 are the
  # identical named subset of #1109's 27 — name-stable across both runs.
  # No timeout-minutes override: this TU is slice.h-sized, not
  # region.h-sized — the default job budget is ample.
  # -------------------------------------------------------------------------
  frama-c-borrow:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/framac-setup
      - name: "WP: semantics/borrow.h"
        # borrow.h — Typed+Cast. Expected: 2433 / 2452 proved, exactly 19
        # unproved (VERIFY-016): 17 inherited (slice.h's full 15-goal
        # surface incl. the contract.h handler pair, + checked.h's 2 with
        # the typed_ -> typed_cast_ prefix flip) + 2 borrow-own (memcmp
        # danglingness at borrowed_bytes_eq, the header's only libc call).
        # Also enforces the MCDC-008 closure: the named in-body assert
        # dead_by_invariant must remain in the proved set. Any deviation
        # is a regression.
        #
        # First hybrid Shape-A/Shape-B header: the 24 non-macro functions
        # are annotated in place (slice.h-style); DEFINE_BORROWED_SLICE is
        # outside the verified surface (docs/vmacros.md). Verified
        # configuration is the default build (CANON_LIFETIME off,
        # -DCANON_NO_REQUIRE -DNDEBUG) — the exact shipped bodies of the
        # ABI guarantee; the lifetime-debug path stays runtime-verified by
        # borrow_test.c across the CI matrix (OWN-001 §7).
        #
        # Promoted from report-only as of {TODO: promotion CI #}; see the
        # banner above for the #1109 -> #1110 chronology and VERIFY-016 in
        # docs/deviations.md for the full residual classification.
        run: |
          eval $(opam env --switch=frama-c)
          ENFORCE=1
          EXPECTED_UNPROVED=19
          EXPECTED_PROVED="2433 / 2452"
          FAILURES=0
          note_fail() {
            echo "$1"
            FAILURES=$((FAILURES + 1))
          }
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            semantics/borrow.h 2>&1 | tee wp_borrow_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e
          echo ""
          echo "==============================================="
          echo "  WP (borrow.h) exit status: ${WP_EXIT}"
          echo "  MODE: report-only (ENFORCE=${ENFORCE})"
          echo "==============================================="
          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_borrow_output.txt || true)
          echo "  ${PROVED_LINE}"
          if [ -z "${PROVED_LINE}" ]; then
            note_fail "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in borrow.h. Check the WP"
            echo "      output above for [kernel:annot-error] or"
            echo "      [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_borrow_output.txt | head -10 || true
          else
            TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_borrow_output.txt || true)
            UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_borrow_output.txt || true)
            FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_borrow_output.txt || true)
            UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
            echo "  Timeouts: ${TIMEOUT_COUNT}"
            echo "  Unknown:  ${UNKNOWN_COUNT}"
            echo "  Failed:   ${FAILED_COUNT}"
            echo "  Total unproved: ${UNPROVED_COUNT}"
            if [ -n "${EXPECTED_UNPROVED}" ] && \
               [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
              note_fail "FAIL: unproved count ${UNPROVED_COUNT} != pinned ${EXPECTED_UNPROVED}."
            fi
            PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
            echo "  Proved: ${PROVED_COUNT}"
            if [ -n "${EXPECTED_PROVED}" ] && \
               [ "${PROVED_COUNT}" != "${EXPECTED_PROVED}" ]; then
              note_fail "FAIL: proved count ${PROVED_COUNT} != pinned ${EXPECTED_PROVED}."
            fi
            echo ""
            echo "  --- All unproved goals (name-stability record) ---"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_borrow_output.txt || \
              echo "  (none)"
            echo ""
            echo "  --- Inherited roll-call: 17 expected re-emissions ---"
            INHERITED=(
              "typed_cast_contract_default_handler_terminates"
              "typed_cast_contract_default_handler_loop_invariant_established"
              "typed_cast_bytes_equal_call_memcmp_requires_valid_s1"
              "typed_cast_bytes_equal_call_memcmp_requires_valid_s2"
              "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s1"
              "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s2"
              "typed_cast_str_from_cstr_call_strlen_requires_valid_string_s"
              "typed_cast_str_equal_call_memcmp_requires_valid_s1"
              "typed_cast_str_equal_call_memcmp_requires_valid_s2"
              "typed_cast_str_equal_call_memcmp_requires_danglingness_s1"
              "typed_cast_str_equal_call_memcmp_requires_danglingness_s2"
              "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s1"
              "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s2"
              "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s1"
              "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s2"
              "typed_cast_checked_add_overflow_ensures"
              "typed_cast_checked_add_u64_overflow_ensures"
            )
            INHERITED_SEEN=0
            for goal in "${INHERITED[@]}"; do
              if grep -qE "\[(Timeout|Unknown|Failed)\].*${goal}" wp_borrow_output.txt; then
                INHERITED_SEEN=$((INHERITED_SEEN + 1))
              else
                echo "  MISSING inherited residual: ${goal}"
              fi
            done
            echo "  Inherited residuals observed: ${INHERITED_SEEN}/17"
            if [ "${INHERITED_SEEN}" -ne 17 ]; then
              note_fail "FAIL: inherited set differs from the composability prediction."
            fi
            echo ""
            echo "  --- Own-residual roll-call (borrowed_bytes_eq memcmp) ---"
            OWN_CHECKS=(
              "typed_cast_borrowed_bytes_eq_call_memcmp_requires_danglingness_s1"
              "typed_cast_borrowed_bytes_eq_call_memcmp_requires_danglingness_s2"
            )
            OWN_SEEN=0
            for goal in "${OWN_CHECKS[@]}"; do
              if grep -qE "\[(Timeout|Unknown|Failed)\].*${goal}" wp_borrow_output.txt; then
                OWN_SEEN=$((OWN_SEEN + 1))
              else
                note_fail "FAIL: expected unproved goal ${goal} not observed."
              fi
            done
            echo "  Own residuals observed: ${OWN_SEEN}/2 (expected 2)"
            OTHER_UNPROVED=$((UNPROVED_COUNT - INHERITED_SEEN - OWN_SEEN))
            echo "  Unproved outside the documented set: ${OTHER_UNPROVED} (expected 0)"
            if [ "${OTHER_UNPROVED}" -ne 0 ]; then
              note_fail "FAIL: undocumented residuals present — see VERIFY-016."
            fi
            echo ""
            echo "  --- MCDC-008 cross-stream goal ---"
            if grep -qE "\[(Timeout|Unknown|Failed)\].*dead_by_invariant" wp_borrow_output.txt; then
              note_fail "FAIL: dead_by_invariant UNPROVED — one-NULL guard not discharged."
              echo "      This regresses the MCDC-008 cross-stream closure. Investigate"
              echo "      the cbytes_invariant preconditions on borrowed_bytes_eq."
            else
              echo "  dead_by_invariant: PROVED — one-NULL guard formally dead"
              echo "  under cbytes_invariant. MCDC-008 closure intact."
            fi
            CVC5_INVOKED=$(grep -cE "CVC5|cvc5" wp_borrow_output.txt || true)
            echo "  CVC5 mentions in WP output: ${CVC5_INVOKED}"
            if [ "${CVC5_INVOKED}" -eq 0 ]; then
              echo "WARNING: CVC5 does not appear in WP output."
              echo "         The triple-prover setup may have degraded to"
              echo "         dual-prover. Check the prover configuration step."
            fi
          fi
          echo ""
          echo "==============================================="
          if [ "${FAILURES}" -eq 0 ]; then
            echo "PASS: borrow.h verified — 2433/2452 proved, 19 documented"
            echo "      residuals all observed (VERIFY-016): 17 inherited +"
            echo "      2 own, zero new residual classes; dead_by_invariant"
            echo "      proved (MCDC-008 closure intact). Composability"
            echo "      confirmation #6."
          else
            echo "FAIL: ${FAILURES} enforcement check(s) missed — see FAIL lines above."
          fi
          if [ "${ENFORCE}" -eq 1 ] && [ "${FAILURES}" -ne 0 ]; then
            exit 1
          fi
          echo "==============================================="
      - name: Upload WP proof output (borrow.h)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wp-proof-borrow
          path: wp_borrow_output.txt
  
  # -------------------------------------------------------------------------
  # 6. MC/DC coverage — GCC 14 -fcondition-coverage (Linux only)
  #
  #    -DCANON_CHECKED_FORCE_FALLBACK and -DCANON_BITS_FORCE_FALLBACK are
  #    passed so the fallback paths in checked.h and bits.h are exercised.
  #    Without these flags, GCC expands builtins to single instructions
  #    with no branches, the #else fallback blocks become dead code, and
  #    gcov reports 0% MC/DC on them. Forcing the fallback makes coverage
  #    measure the same code Frama-C is proving — the two tracks stay
  #    consistent.
  # -------------------------------------------------------------------------
  coverage:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install GCC 14 and lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 lcov

      - name: Configure CMake with MC/DC coverage instrumentation
        # CANON_CHECKED_FORCE_FALLBACK: exercise the same fallback path WP
        #   verifies (otherwise GCC expands __builtin_*_overflow to single
        #   instructions with no branches for gcov to see).
        # CANON_BITS_FORCE_FALLBACK: same rationale for bits.h — forces the
        #   portable fallback paths for popcount, clz, ctz, and bswap
        #   instead of compiler builtins.
        # CANON_NO_REQUIRE: compiles CHECKED_ASSERT_RESULT(result) out to
        #   nothing. Without this, every function contains a runtime NULL
        #   assertion whose NULL branch is structurally unreachable (the
        #   ACSL `requires \valid(result)` clause proves it for every
        #   caller), yet gcov counts it as an uncovered branch. Defining
        #   CANON_NO_REQUIRE removes the assertion from the preprocessed
        #   source, keeping MC/DC measurement focused on real branches.
        #   The frama-c job passes the same flag for the same reason, so
        #   the WP and coverage evidence streams stay aligned.
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fcondition-coverage -DCANON_CHECKED_FORCE_FALLBACK -DCANON_BITS_FORCE_FALLBACK -DCANON_NO_REQUIRE" \
            -DENABLE_SANITIZERS=OFF \
            -DENABLE_COVERAGE_TUS=ON \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        # contract_test is excluded here: the coverage build defines
        # CANON_NO_REQUIRE, which compiles require()/require_msg() into
        # ((void)0). contract_test's entire purpose is to verify that
        # those macros fire when preconditions are violated, so with
        # the macros disabled every assertion in the test fails by
        # design. contract_test still runs (and passes) in every other
        # CI job — build, valgrind, fuzzing — where CANON_NO_REQUIRE is
        # not defined. Excluding it here is honest about what the
        # coverage build measures: the fallback path of the Canon-C
        # library headers, not the assertion infrastructure itself.
        run: ctest --build-config Debug --output-on-failure --exclude-regex '^contract_test$'

      - name: Run MC/DC cover TUs (Shape-B modules)
        working-directory: build
        # Cover TUs are not ctests — run them directly so their .gcda is
        # written. They exit 0; they exist to emit coverage, not to assert.
        run: |
          ./option_cover
          ./result_cover
      
      - name: Collect branch coverage data (lcov)
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage_raw.info \
            --rc branch_coverage=1 \
            --ignore-errors unused \
            --gcov-tool gcov-14

          lcov --remove coverage_raw.info \
            '/usr/*' \
            '*/test/*' \
            --output-file coverage.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

      - name: Collect MC/DC condition coverage (gcov-14 --conditions)
        run: |
          cd build

          for gcda in $(find . -name "*.gcda" | sort); do
            gcov-14 --conditions "$gcda" 2>/dev/null
          done > gcov_output.txt 2>&1

          awk '
            /^File / {
              current = $0
              sub(/^File /, "", current)
              gsub(/'\''/, "", current)
              have_file = 1
              next
            }
            /^Condition outcomes covered:/ {
              if (have_file) {
                print current "\t" $0
                have_file = 0
              }
            }
          ' gcov_output.txt | \
            grep -v "/test/" | \
            sed "s|${{ github.workspace }}/||" | \
            tee mcdc_per_file.txt

          python3 << 'PYEOF'
          import re

          best = {}
          with open("mcdc_per_file.txt") as f:
              for line in f:
                  parts = line.strip().split("\t")
                  if len(parts) < 2:
                      continue
                  filename = parts[0].strip()
                  m = re.search(r"([\d.]+)% of (\d+)", parts[1])
                  if not m:
                      continue
                  pct = float(m.group(1))
                  total = int(m.group(2))
                  hit = int(total * pct / 100 + 0.5)
                  if filename not in best:
                      best[filename] = (pct, hit, total)
                  else:
                      cur_pct, cur_hit, cur_total = best[filename]
                      if total > cur_total or (total == cur_total and pct > cur_pct):
                          best[filename] = (pct, hit, total)

          results = [(v[0], v[1], v[2], v[2]-v[1], k) for k, v in best.items()]
          results.sort()

          total_hit = sum(r[1] for r in results)
          total_all = sum(r[2] for r in results)
          overall = 100.0 * total_hit / total_all if total_all else 0

          print()
          print("=" * 85)
          print("  Canon-C MC/DC Condition Coverage (GCC 14 -fcondition-coverage)")
          print("=" * 85)
          print(f"  {'File':<50} {'MC/DC%':>8} {'Hit':>5} {'Total':>6} {'Missed':>7}")
          print("-" * 85)
          for pct, hit, total, missed, f in results:
              print(f"  {f:<50} {pct:>7.1f}% {hit:>5} {total:>6} {missed:>7}")
          print("-" * 85)
          print(f"  {'TOTAL':<50} {overall:>7.1f}% {total_hit:>5} {total_all:>6} {total_all-total_hit:>7}")
          print("=" * 85)

          with open("mcdc_summary.txt", "w") as out:
              out.write(f"{overall:.1f}\n")
              out.write(f"{total_hit}\n")
              out.write(f"{total_all}\n")
          PYEOF

      - name: "Debug: per-line MC/DC detail for checked.h"
        run: |
          cd build

          CHECKED_GCDA=$(find . -name "checked_test*.gcda" | head -1)

          if [ -z "$CHECKED_GCDA" ]; then
            echo "ERROR: could not locate checked_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $CHECKED_GCDA"
          gcov-14 --conditions --all-blocks "$CHECKED_GCDA" 2>&1 | \
            grep -A 200 "checked.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for checked.h ==="
          find . -name "checked.h.gcov" -exec echo "Found: {}" \;

          CHECKED_GCOV=$(find . -name "checked.h.gcov" | head -1)
          if [ -n "$CHECKED_GCOV" ]; then
            echo ""
            echo "=== Full contents of $CHECKED_GCOV ==="
            cat "$CHECKED_GCOV"
          else
            echo "No checked.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*checked* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for ptr.h"
        # Identifies which specific conditions in ptr.h are uncovered.
        # As of CI #788, ptr.h reached 100% MC/DC (42/42). This debug
        # step remains in place to catch future regressions — if a new
        # function is added without corresponding tests, the output
        # will show which conditions drop below 100%.
        run: |
          cd build

          PTR_GCDA=$(find . -name "ptr_test*.gcda" | head -1)

          if [ -z "$PTR_GCDA" ]; then
            echo "ERROR: could not locate ptr_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $PTR_GCDA"
          gcov-14 --conditions --all-blocks "$PTR_GCDA" 2>&1 | \
            grep -A 200 "ptr.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for ptr.h ==="
          find . -name "ptr.h.gcov" -exec echo "Found: {}" \;

          PTR_GCOV=$(find . -name "ptr.h.gcov" | head -1)
          if [ -n "$PTR_GCOV" ]; then
            echo ""
            echo "=== Full contents of $PTR_GCOV ==="
            cat "$PTR_GCOV"
          else
            echo "No ptr.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*ptr* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for slice.h"
        # Identifies which specific conditions in slice.h are uncovered.
        # As of CI #816, slice.h reached its achievable MC/DC ceiling at
        # 93.1% (54/58, 4 missed). The 4 remaining outcomes are documented
        # in docs/deviations.md as MCDC-002 — they are the `!ptr` left-side
        # of OR in bytes_slice (line 117), bytes_skip (line 130),
        # str_slice (line 194), and str_skip (line 207). All four are
        # API-unreachable in MC/DC isolation.
        #
        # This step remains in place as a regression detector — if a
        # new function is added without corresponding tests, or if any
        # of the previously-closed reachable gaps regress, the output
        # will show which conditions drop below the documented ceiling.
        #
        # When VERIFY-007 confirms WP discharges the four MCDC-002
        # branches as unreachable, MCDC-002 transitions from "API-
        # unreachable" to "WP-discharged unreachable" — but the gcov
        # measurement remains at 93.1% because gcov instruments the
        # source, not the proof. The two evidence streams complement
        # each other rather than converge.
        run: |
          cd build

          SLICE_GCDA=$(find . -name "slice_test*.gcda" | head -1)

          if [ -z "$SLICE_GCDA" ]; then
            echo "ERROR: could not locate slice_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $SLICE_GCDA"
          gcov-14 --conditions --all-blocks "$SLICE_GCDA" 2>&1 | \
            grep -A 200 "slice.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for slice.h ==="
          find . -name "slice.h.gcov" -exec echo "Found: {}" \;

          SLICE_GCOV=$(find . -name "slice.h.gcov" | head -1)
          if [ -n "$SLICE_GCOV" ]; then
            echo ""
            echo "=== Full contents of $SLICE_GCOV ==="
            cat "$SLICE_GCOV"
          else
            echo "No slice.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*slice* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for memory.h"
        # Identifies which specific conditions in memory.h are uncovered.
        # As of CI #831, memory.h reached 88.3% MC/DC (113/128, 15 missed).
        # The 15 remaining outcomes split into three rough categories
        # (estimated, to be confirmed by reading this debug output and
        # documented in deviations.md as a memory.h-specific MCDC entry):
        #
        #   1. MCDC-002-pattern (~6 conditions) — the bytes_t variants
        #      mem_copy_bytes, mem_move_bytes, mem_zero_bytes, mem_set_bytes,
        #      mem_equal_bytes, mem_secure_zero_bytes contain compound
        #      `!b.ptr || b.len == 0` early returns. The {ptr, len}
        #      structure plus cbytes_empty() = {NULL, 0} make some
        #      subcondition combinations API-unreachable in MC/DC
        #      isolation, analogous to slice.h's bytes_slice / str_slice
        #      defensive branches.
        #
        #   2. require_msg panic paths (~4-6 conditions) — mem_align_to,
        #      mem_is_aligned, mem_swap, mem_swap_buf use require_msg to
        #      enforce preconditions. The failing branches collapse under
        #      -DCANON_NO_REQUIRE (used by the coverage build), but their
        #      structural positions still register as conditions in some
        #      cases. Same pattern as the contract.h 0/2 entry that
        #      appears in every test row.
        #
        #   3. Reachable gaps (~3-5 conditions) — mem_compare's `if (a == b)`
        #      vs `if (!a || !b)` interaction, and mem_swap_buf's three
        #      separate overlap require_msg calls, are likely the
        #      reachable subset that more-careful test design could close.
        #
        # This step remains in place as a regression detector. If a new
