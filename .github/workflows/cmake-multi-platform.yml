      - name: "Debug: per-line MC/DC detail for diag.h"
        # First measured MC/DC ceiling for diag.h: 97.67% (84/86) as of
        # CI #1120 (93fa22c), reached by the render/print gap-closure tests
        # that took the header from 73.91% (34/46). The denominator grew
        # 46 -> 86 because diag_render and diag_render_frame were entirely
        # uncalled before this pass: uncalled `static inline` functions are
        # invisible to gcov, so the render pair was silently excluded from
        # the old baseline rather than counted as missed. The gap-closure
        # pass also surfaced two pre-verification defects on the newly
        # exercised path — a contract-violating NULL guard in diag_render
        # (a snprintf(NULL, >0) UB path) and a -Werror=format-truncation
        # break on the documented truncation path (CI #1120) — both fixed
        # before this ceiling was pinned.
        #
        # PREDICTION TO CONFIRM, NOT ASSERT: the 2 remaining uncovered
        # outcomes are expected to be two distinct dead-true-sides, of two
        # DIFFERENT dispositions (unlike borrow.h, whose pair shared one):
        #
        #   (a) line 293 — the GCC-16 overflow-clamp guard in diag_push:
        #
        #         if (d->depth >= DIAG_MAX_FRAMES) {
        #             d->depth = DIAG_MAX_FRAMES - 1u;   /* clamp */
        #         }
        #
        #       The true side is unreachable on every correct execution:
        #       the memmove branch immediately above already holds depth at
        #       DIAG_MAX_FRAMES - 1, so depth >= DIAG_MAX_FRAMES is false by
        #       construction here. This is invariant-dead defensive code —
        #       the slice.h MCDC-002 / borrow.h MCDC-008 shape. The header
        #       carries a named `/*@ assert dead_by_invariant_clamp: \false; */`
        #       at this site; when the diag.h WP run discharges it under
        #       diag_invariant, the MCDC entry is written with the full
        #       cross-stream record (gcov: outcome unreachable; WP: goal
        #       proved \false). Until then: "invariant-dead, deviation
        #       pending".
        #
        #   (b) line 668 — the snprintf encoding-error skip in diag_render:
        #
        #         if (n < 0) { continue; }   /* encoding error — skip frame */
        #
        #       The true side is LIBC-ENVIRONMENTAL, not invariant-dead:
        #       it is unreachable because these format strings with valid
        #       arguments cannot provoke an encoding error on any hosted
        #       libc, NOT because any diag invariant forbids it. This is a
        #       NEW disposition flavor for the traceability record — do not
        #       file it under the invariant-dead family. WP will not
        #       discharge it from diag's own contracts (it depends on the
        #       stdio spec), so it remains a permanent documented residual
        #       rather than a deviation that later closes. The sibling
        #       encoding-error skip in diag_render_frame is expected to be
        #       gimplified out of the condition denominator (value-selecting
        #       context), so it is not counted here; if the dump shows it
        #       open, that is a real gap.
        #
        # If the dump shows a DIFFERENT open outcome — anywhere in the
        # inspectors, the diag_push copy loop, or the render total/rem
        # accounting — that is a reachable test gap (MCDC-003 line-510
        # shape), NOT a deviation: fix it with an ordinary ungated test,
        # not a records entry.
        #
        # NOTE on scope: diag.h is a Shape-A header. The 86-outcome
        # denominator covers the 13 `static inline` functions. The four
        # DIAG_PUSH / DIAG_PUSH_FMT / DIAG_RETURN_IF / DIAG_PROPAGATE
        # macros are call-site expansion wrappers: their conditions are
        # stamped to diag_test.c (a /test/ path) and removed by the
        # coverage filter — the known single-file macro attribution,
        # docs/vmacros.md. Do not read this row as covering the macros;
        # they are documented-not-verified, exercised by diag_test.c.
        #
        # This step remains in place as a regression detector. If a future
        # change opens a new uncovered outcome or closes one of the two
        # documented ones, the output surfaces it for human review.
        # Report-only; never fails.
        run: |
          cd build
          DIAG_GCDA=$(find . -name "diag_test*.gcda" | head -1)
          if [ -z "$DIAG_GCDA" ]; then
            echo "ERROR: could not locate diag_test gcda file"
            find . -name "*.gcda" | head -20
            exit 0   # report-only — do not fail the coverage job
          fi
          echo "Running gcov on: $DIAG_GCDA"
          gcov-14 --conditions --all-blocks "$DIAG_GCDA" 2>&1 | \
            grep -A 200 "diag.h" | head -500
          echo ""
          echo "=== Looking for the generated .gcov file for diag.h ==="
          find . -name "diag.h.gcov" -exec echo "Found: {}" \;
          DIAG_GCOV=$(find . -name "diag.h.gcov" | head -1)
          if [ -n "$DIAG_GCOV" ]; then
            echo ""
            echo "=== Full contents of $DIAG_GCOV ==="
            cat "$DIAG_GCOV"
            echo ""
            echo "=== Uncovered condition outcomes (quick filter) ==="
            grep -n "not covered" "$DIAG_GCOV" || \
              echo "(no 'not covered' lines found — check the full dump above)"
            echo ""
            echo "=== Expected ceiling: lines 293 (invariant-dead) and 668 (libc-environmental) ==="
          else
            echo "No diag.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*diag* 2>/dev/null || true
            done
          fi
      
      - name: "Debug: Shape-B attribution check for vec (vec_test)"
        # Per-module attribution confirmation (docs/vmacros.md checklist):
