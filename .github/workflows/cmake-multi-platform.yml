name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis — clang-tidy + Cppcheck
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install clang-tidy and Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm cppcheck
          # brew installs LLVM tools with version suffix; add the bin dir to PATH
          LLVM_BIN="$(brew --prefix llvm)/bin"
          echo "$LLVM_BIN" >> $GITHUB_PATH

      - name: Configure CMake (generate compile_commands.json)
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -S "${{ github.workspace }}"

      - name: Run clang-tidy
        shell: bash
        run: |
          # Only analyse files that are non-empty and part of the active build.
          # Empty placeholder files (arena_test.c, memory_test.c, etc.) produce
          # clang-diagnostic-empty-translation-unit errors — skip them.
          FILES=""
          for f in $(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null); do
            # Skip empty files
            if [ ! -s "$f" ]; then
              echo "Skipping empty file: $f"
              continue
            fi
            FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No non-empty test source files found — skipping clang-tidy"
            exit 0
          fi

          clang-tidy \
            -p build \
            --warnings-as-errors="*" \
            -extra-arg="-I${{ github.workspace }}/core/primitives" \
            -extra-arg="-I${{ github.workspace }}/core" \
            -extra-arg="-I${{ github.workspace }}" \
            $FILES

      - name: Run Cppcheck
        shell: bash
        run: |
          cppcheck \
            --enable=all \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Dr. Memory — Windows only
  # -------------------------------------------------------------------------
  dr-memory:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dr. Memory
        run: choco install drmemory --yes

      - name: Configure CMake (no sanitizers — conflicts with Dr. Memory)
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Debug `
            -DENABLE_SANITIZERS=OFF `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests under Dr. Memory
        shell: pwsh
        run: |
          # choco installs Dr. Memory under a versioned subdirectory;
          # search for the actual executable rather than assuming a fixed path.
          $drmemory = Get-ChildItem -Path "C:\Program Files\Dr. Memory" `
            -Filter "drmemory.exe" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $drmemory) {
            Write-Error "drmemory.exe not found — is Dr. Memory installed?"
            exit 1
          }

          Write-Host "Using Dr. Memory at: $drmemory"

          $testExes = Get-ChildItem -Path build\Debug -Filter "*_test.exe"
          $failed = @()

          foreach ($exe in $testExes) {
            Write-Host "Running Dr. Memory on $($exe.Name)..."
            & "$drmemory" -exit_code_if_errors 1 -- $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              $failed += $exe.Name
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host "Dr. Memory reported errors in: $($failed -join ', ')"
            exit 1
          }

  # -------------------------------------------------------------------------
  # 5. Fuzzing — Linux, macOS, Windows/Clang
  #    libFuzzer requires Clang on all platforms.
  #    On Windows we use Ninja + explicit clang-cl to avoid CMake
  #    defaulting to the MSVC generator which ignores -DCMAKE_C_COMPILER.
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
          - os: windows-latest
            c_compiler: clang
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --yes

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Force Ninja generator so CMake respects -DCMAKE_C_COMPILER=clang
          # instead of defaulting to the Visual Studio generator (which
          # ignores the flag and selects MSVC, causing ENABLE_FUZZING to fail).
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -G Ninja `
            -DCMAKE_C_COMPILER=clang `
            -DCMAKE_BUILD_TYPE=Debug `
            -DENABLE_FUZZING=ON `
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure
