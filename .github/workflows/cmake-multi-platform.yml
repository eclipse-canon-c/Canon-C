          echo "==============================================="
          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_error_output.txt || true)
          echo "  ${PROVED_LINE}"
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in error.h or an include"
            echo "      resolution failure. Check the WP output above for"
            echo "      [kernel:annot-error] or [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_error_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_error_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_error_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_error_output.txt || true)
