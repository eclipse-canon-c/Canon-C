          fi
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          if [ "${PROVED_COUNT}" != "65 / 65" ]; then
            echo "FAIL: proved-goal summary changed (pinned: 65 / 65)."
            echo "      The goal surface drifted — a VERIFY-013 category is"
            echo "      required in docs/deviations.md before this pin moves."
            exit 1
          fi
