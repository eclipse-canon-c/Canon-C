name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ---------------------------------------------------------------------------
# Job overview
#
#   build           — all platforms, Release + Debug, sanitizers
#   static-analysis — clang-tidy (Linux only) + Cppcheck (all platforms)
#   valgrind        — Linux only, Debug, memory error detection
#   fuzzing         — Linux only (libFuzzer runtime only reliable on Linux CI)
#   frama-c         — Linux only, formal verification (WP proofs + Eva)
#                     Currently scoped to core/primitives/checked.h only.
#                     Additional headers will be added as they are annotated.
#   coverage        — Linux only, MC/DC coverage via GCC 14 -fcondition-coverage
#                     Uses -DCANON_CHECKED_FORCE_FALLBACK so the fallback
#                     paths in checked.h are measurable (builtins expand to
#                     single instructions with no branches for gcov to see).
#   misra           — Linux only, MISRA C:2012 advisory analysis
#
# NOTE — Dr. Memory (Windows memory checker) is intentionally omitted.
#   Dr. Memory crashes internally on Windows Server 2022 (the current
#   windows-latest runner, Build 26100) with an unrecoverable internal
#   fault at startup. This is a known upstream bug with no available fix
#   or workaround as of the time of writing. Memory safety on Windows is
#   covered by the MSVC build with /W4 /WX and by Valgrind on Linux.
#   Re-enable dr-memory when upstream ships a compatible release.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test — all platforms, Release and Debug
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cppcheck

      - name: Install Cppcheck (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          winget install --id Cppcheck.Cppcheck --silent `
            --accept-package-agreements --accept-source-agreements
          $path = (Get-ChildItem "C:\Program Files\Cppcheck" `
            -Filter "cppcheck.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1).DirectoryName
          if ($path) { echo "$path" >> $env:GITHUB_PATH }

      - name: Configure CMake for compile_commands.json (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -S "${{ github.workspace }}"

      - name: Run clang-tidy (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          SKIP="dynstring_test.c dynvec_test.c"
          FILES=""
          for f in $(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null | sort); do
            if ! grep -qE '[^[:space:]]' "$f"; then continue; fi
            BASENAME=$(basename "$f")
            SKIP_THIS=0
            for s in $SKIP; do
              if [ "$BASENAME" = "$s" ]; then SKIP_THIS=1; break; fi
            done
            if [ "$SKIP_THIS" = "1" ]; then continue; fi
            FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No files to analyse — skipping clang-tidy"
            exit 0
          fi

          CHECKS="\
          bugprone-integer-division,\
          bugprone-macro-parentheses,\
          bugprone-misplaced-widening-cast,\
          bugprone-signed-char-misuse,\
          bugprone-sizeof-expression,\
          bugprone-suspicious-memset-usage,\
          bugprone-too-small-loop-variable,\
          bugprone-undefined-memory-manipulation,\
          clang-analyzer-core.CallAndMessage,\
          clang-analyzer-core.DivideZero,\
          clang-analyzer-core.NullDereference,\
          clang-analyzer-core.UndefinedBinaryOperatorResult,\
          clang-analyzer-core.uninitialized.Assign,\
          clang-analyzer-core.uninitialized.Branch,\
          clang-analyzer-deadcode.DeadStores,\
          clang-analyzer-security.insecureAPI.strcpy,\
          misc-misplaced-const,\
          misc-redundant-expression,\
          misc-unused-parameters"

          clang-tidy \
            -p build \
            --checks="-*,$CHECKS" \
            --warnings-as-errors="$CHECKS" \
            --extra-arg="-I${{ github.workspace }}/core/primitives" \
            --extra-arg="-I${{ github.workspace }}/core" \
            --extra-arg="-I${{ github.workspace }}" \
            $FILES

      - name: Run Cppcheck (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cppcheck \
            --enable=warning \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=returnDanglingLifetime:*slice_test.c" \
            "--suppress=returnDanglingLifetime:*borrow_test.c" \
            "--suppress=returnDanglingLifetime:*array_test.c" \
            "--suppress=returnDanglingLifetime:*any_all_test.c" \
            "--suppress=returnDanglingLifetime:*filter_test.c" \
            "--suppress=returnDanglingLifetime:*find_test.c" \
            "--suppress=returnDanglingLifetime:*fold_test.c" \
            "--suppress=returnDanglingLifetime:*map_test.c" \
            "--suppress=returnDanglingLifetime:*reverse_test.c" \
            "--suppress=returnDanglingLifetime:*search_test.c" \
            "--suppress=returnDanglingLifetime:*sort_test.c" \
            "--suppress=returnDanglingLifetime:*unique_test.c" \
            "--suppress=literalWithCharPtrCompare:*diag_test.c" \
            "--suppress=arrayIndexOutOfBounds:*diag.h" \
            "--suppress=ctunullpointer:*deque_test.c" \
            "--suppress=ctunullpointer:*vec_test.c" \
            "--suppress=ctunullpointer:*hashmap_test.c" \
            "--suppress=ctunullpointer:*queue_test.c" \
            "--suppress=ctunullpointer:*stack_test.c" \
            "--suppress=ctunullpointer:*array_test.c" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            "${{ github.workspace }}/test"

      - name: Run Cppcheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cppcheck `
            --enable=warning `
            --std=c99 `
            --error-exitcode=1 `
            --suppress=missingIncludeSystem `
            --suppress=toomanyconfigs `
            "--suppress=returnDanglingLifetime:*slice_test.c" `
            "--suppress=returnDanglingLifetime:*borrow_test.c" `
            "--suppress=returnDanglingLifetime:*array_test.c" `
            "--suppress=returnDanglingLifetime:*any_all_test.c" `
            "--suppress=returnDanglingLifetime:*filter_test.c" `
            "--suppress=returnDanglingLifetime:*find_test.c" `
            "--suppress=returnDanglingLifetime:*fold_test.c" `
            "--suppress=returnDanglingLifetime:*map_test.c" `
            "--suppress=returnDanglingLifetime:*reverse_test.c" `
            "--suppress=returnDanglingLifetime:*search_test.c" `
            "--suppress=returnDanglingLifetime:*sort_test.c" `
            "--suppress=returnDanglingLifetime:*unique_test.c" `
            "--suppress=literalWithCharPtrCompare:*diag_test.c" `
            "--suppress=arrayIndexOutOfBounds:*diag.h" `
            "--suppress=ctunullpointer:*deque_test.c" `
            "--suppress=ctunullpointer:*vec_test.c" `
            "--suppress=ctunullpointer:*hashmap_test.c" `
            "--suppress=ctunullpointer:*queue_test.c" `
            "--suppress=ctunullpointer:*stack_test.c" `
            "--suppress=ctunullpointer:*array_test.c" `
            -I "${{ github.workspace }}/core/primitives" `
            -I "${{ github.workspace }}/core" `
            -I "${{ github.workspace }}/semantics" `
            -I "${{ github.workspace }}/data" `
            -I "${{ github.workspace }}/algo" `
            -I "${{ github.workspace }}/util" `
            -I "${{ github.workspace }}" `
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Fuzzing — Linux only
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang with libFuzzer runtime
        run: sudo apt-get install -y clang

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure

  # -------------------------------------------------------------------------
  # 5. Formal verification — Frama-C (Linux only)
  #
  #    Scope: core/primitives/checked.h ONLY.
  #
  #    checked.h is the first Canon-C header with full ACSL contracts
  #    (every unsigned function plus all three signed functions). When
  #    bits.h, ptr.h, compare.h and the core/ layer are annotated, add
  #    them to the file list in the WP step below.
  #
  #    Installation: opam with aggressive caching.
  #    Ubuntu 24.04 Noble no longer ships Frama-C in its default apt
  #    repositories (it was available through 22.04 Jammy). The only
  #    reliable install path on current runners is opam, which builds
  #    OCaml and Frama-C from source. Without caching, this takes
  #    30-60 minutes every run. With the cache below, the first run
  #    pays that cost once and every subsequent run restores a ready
  #    switch in ~30 seconds. The cache key includes OCAML_VERSION
  #    and FRAMAC_VERSION so bumping either forces a clean rebuild.
  #
  #    Provers: Alt-Ergo + Z3 dual-prover setup.
  #    Alt-Ergo handles linear arithmetic and most ACSL contracts very
  #    fast. Z3 handles nonlinear integer reasoning (multiplication
  #    contracts in checked_mul / checked_mul_u64 / checked_mul_isize)
  #    that Alt-Ergo struggles with. WP tries Alt-Ergo first and falls
  #    through to Z3 only on goals Alt-Ergo cannot close — keeping the
  #    common case fast while ensuring the hard goals get proved.
  #
  #    WP (Weakest Precondition):
  #      Proves ACSL contracts: requires, ensures, assigns, behaviors.
  #      Proves absence of runtime errors via -wp-rte: overflows,
  #      invalid shifts, null derefs, division by zero. Mathematical
  #      proof — if WP says "Valid", the property holds for ALL inputs.
  #
  #    Eva is NOT run on checked.h — see the comment in the steps below
  #    for the rationale (header-only modules have no entry point).
  #
  #    __FRAMAC__ is automatically defined by Frama-C's preprocessor.
  #    checked.h uses this to force the fallback path (WP has no
  #    semantics for __builtin_*_overflow).
  #
  #    Certification evidence produced:
  #      - Absence of runtime errors in checked.h (all standards)
  #      - Contract verification (requirement traceability)
  #      - Formal proof artifacts (DO-178C objective substitution)
  # -------------------------------------------------------------------------
  frama-c:
    needs: build
    runs-on: ubuntu-latest

    env:
      OCAML_VERSION: "4.14.2"
      FRAMAC_VERSION: "29.0"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies for opam and Frama-C
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            opam \
            m4 \
            pkg-config \
            libgmp-dev \
            zlib1g-dev \
            autoconf \
            autotools-dev \
            graphviz \
            libcairo2-dev \
            libgtk-3-dev \
            libgtksourceview-3.0-dev

      - name: Cache opam switch
        id: cache-opam
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-ocaml-${{ env.OCAML_VERSION }}-framac-${{ env.FRAMAC_VERSION }}-z3-v6

      - name: Initialise opam (cache miss only)
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          rm -rf ~/.opam
          opam init -y --bare --no-setup --disable-sandboxing
          opam switch create frama-c ocaml-base-compiler.${OCAML_VERSION}
          eval $(opam env --switch=frama-c)
          opam install -y --confirm-level=unsafe-yes --assume-depexts \
            frama-c.${FRAMAC_VERSION} alt-ergo why3 z3

      - name: Activate opam environment and configure Why3 provers
        run: |
          eval $(opam env --switch=frama-c)
          echo "$(opam var --switch=frama-c bin)" >> $GITHUB_PATH
          frama-c -version
          alt-ergo --version
          why3 config detect

      - name: "WP: core/primitives/checked.h"
        # WP is expected to leave exactly 2 goals unproven:
        #   typed_checked_add_overflow_ensures
        #   typed_checked_add_u64_overflow_ensures
        # Both are 64-bit unsigned add wraparound assertions that current
        # SMT provers (Alt-Ergo 2.6.2, Z3 4.15.2) cannot discharge in
        # WP's integer memory model. They are discharged manually by a
        # modular-arithmetic argument recorded in docs/verification.md
        # under "Manually discharged goals". The wrapper below verifies
        # WP fails on EXACTLY these two goals — any other failure is a
        # regression and fails the job.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-prover alt-ergo,z3 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/primitives/checked.h 2>&1 | tee wp_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_output.txt || true)
          echo "  ${PROVED_LINE}"

          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_output.txt || true)
          EXPECTED_TIMEOUTS=2
          echo "  Timeouts observed: ${TIMEOUT_COUNT} (expected ${EXPECTED_TIMEOUTS})"

          if [ "${TIMEOUT_COUNT}" -ne "${EXPECTED_TIMEOUTS}" ]; then
            echo "FAIL: unexpected number of timeouts."
            echo "      Expected exactly ${EXPECTED_TIMEOUTS} (the manually discharged goals)."
            echo "      See docs/verification.md for details."
            exit 1
          fi

          EXPECTED_GOAL_1="typed_checked_add_overflow_ensures"
          EXPECTED_GOAL_2="typed_checked_add_u64_overflow_ensures"

          if ! grep -q "${EXPECTED_GOAL_1}" wp_output.txt; then
            echo "FAIL: expected timeout on ${EXPECTED_GOAL_1} not observed."
            exit 1
          fi
          if ! grep -q "${EXPECTED_GOAL_2}" wp_output.txt; then
            echo "FAIL: expected timeout on ${EXPECTED_GOAL_2} not observed."
            exit 1
          fi

          echo "PASS: WP discharged all goals automatically except the 2 manually"
          echo "      verified obligations documented in docs/verification.md."
          echo "==============================================="

      - name: Upload WP proof output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-proof-output
          path: wp_output.txt

      # -- Eva (Evolved Value Analysis) is intentionally NOT run on checked.h --
      # Eva requires an entry point function to start abstract interpretation
      # from. checked.h is a header full of static inline functions with no
      # main() — Eva has nothing to anchor to and aborts with "cannot find
      # entry point". WP already proves the contracts and absence of runtime
      # errors for every function independently, so Eva is not needed here.
      #
      # When Canon-C grows real translation units (verification driver files
      # for macro-instantiated modules, or test files compiled as standalone
      # programs), Eva can run on those — pointing at a real main() that
      # exercises a representative call sequence. Until then, WP is the
      # complete formal verification story for header-only modules.

      # -- Next headers to annotate (bottom-up within core/primitives) --
      # Uncomment each block as ACSL annotations are added.
      #
      # Note: -warn-unsigned-overflow is intentionally NOT used. C defines
      # unsigned arithmetic as modular (wraparound is well-defined), and
      # several Canon-C primitives (notably checked.h's fallback paths)
      # rely on this. -wp-rte still proves absence of signed overflow,
      # division by zero, invalid shifts, null derefs, and out-of-bounds
      # access — all the actual runtime errors you want to rule out.
      #
      # - name: "WP: core/primitives/bits.h"
      #   run: |
      #     eval $(opam env --switch=frama-c)
      #     frama-c -wp -wp-rte \
      #       -wp-prover alt-ergo,z3,cvc5 \
      #       -wp-timeout 120 \
      #       -cpp-extra-args=" \
      #         -I core/primitives \
      #         -I core \
      #         -I . \
      #         -DCANON_NO_REQUIRE \
      #         -DNDEBUG" \
      #       core/primitives/bits.h
      #
      # - name: "WP: core/primitives/ptr.h"
      #   run: |
      #     eval $(opam env --switch=frama-c)
      #     frama-c -wp -wp-rte \
      #       -wp-prover alt-ergo,z3,cvc5 \
      #       -wp-timeout 120 \
      #       -cpp-extra-args=" \
      #         -I core/primitives \
      #         -I core \
      #         -I . \
      #         -DCANON_NO_REQUIRE \
      #         -DNDEBUG" \
      #       core/primitives/ptr.h
      #
      # - name: "WP: core/primitives/compare.h"
      #   run: |
      #     eval $(opam env --switch=frama-c)
      #     frama-c -wp -wp-rte \
      #       -wp-prover alt-ergo,z3,cvc5 \
      #       -wp-timeout 120 \
      #       -cpp-extra-args=" \
      #         -I core/primitives \
      #         -I core \
      #         -I . \
      #         -DCANON_NO_REQUIRE \
      #         -DNDEBUG" \
      #       core/primitives/compare.h

  # -------------------------------------------------------------------------
  # 6. MC/DC coverage — GCC 14 -fcondition-coverage (Linux only)
  #
  #    -DCANON_CHECKED_FORCE_FALLBACK is passed so the fallback paths
  #    in checked.h are exercised. Without this flag, GCC expands
  #    __builtin_*_overflow to single instructions with no branches,
  #    the #else fallback blocks become dead code, and gcov reports
  #    0% MC/DC on them. Forcing the fallback makes coverage measure
  #    the same code Frama-C is proving — the two tracks stay consistent.
  # -------------------------------------------------------------------------
  coverage:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 and lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 lcov

      - name: Configure CMake with MC/DC coverage instrumentation
        # CANON_CHECKED_FORCE_FALLBACK: exercise the same fallback path WP
        #   verifies (otherwise GCC expands __builtin_*_overflow to single
        #   instructions with no branches for gcov to see).
        # CANON_NO_REQUIRE: compiles CHECKED_ASSERT_RESULT(result) out to
        #   nothing. Without this, every function contains a runtime NULL
        #   assertion whose NULL branch is structurally unreachable (the
        #   ACSL `requires \valid(result)` clause proves it for every
        #   caller), yet gcov counts it as an uncovered branch. Defining
        #   CANON_NO_REQUIRE removes the assertion from the preprocessed
        #   source, keeping MC/DC measurement focused on real branches.
        #   The frama-c job passes the same flag for the same reason, so
        #   the WP and coverage evidence streams stay aligned.
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fcondition-coverage -DCANON_CHECKED_FORCE_FALLBACK -DCANON_NO_REQUIRE" \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        # contract_test is excluded here: the coverage build defines
        # CANON_NO_REQUIRE, which compiles require()/require_msg() into
        # ((void)0). contract_test's entire purpose is to verify that
        # those macros fire when preconditions are violated, so with
        # the macros disabled every assertion in the test fails by
        # design. contract_test still runs (and passes) in every other
        # CI job — build, valgrind, fuzzing — where CANON_NO_REQUIRE is
        # not defined. Excluding it here is honest about what the
        # coverage build measures: the fallback path of the Canon-C
        # library headers, not the assertion infrastructure itself.
        run: ctest --build-config Debug --output-on-failure --exclude-regex '^contract_test$'

      - name: Collect branch coverage data (lcov)
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage_raw.info \
            --rc branch_coverage=1 \
            --ignore-errors unused \
            --gcov-tool gcov-14

          lcov --remove coverage_raw.info \
            '/usr/*' \
            '*/test/*' \
            --output-file coverage.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

      - name: Collect MC/DC condition coverage (gcov-14 --conditions)
        run: |
          cd build

          for gcda in $(find . -name "*.gcda" | sort); do
            gcov-14 --conditions "$gcda" 2>/dev/null
          done > gcov_output.txt 2>&1

          awk '
            /^File / {
              current = $0
              sub(/^File /, "", current)
              gsub(/'\''/, "", current)
              have_file = 1
              next
            }
            /^Condition outcomes covered:/ {
              if (have_file) {
                print current "\t" $0
                have_file = 0
              }
            }
          ' gcov_output.txt | \
            grep -v "/test/" | \
            sed "s|${{ github.workspace }}/||" | \
            tee mcdc_per_file.txt

          python3 << 'PYEOF'
          import re

          best = {}
          with open("mcdc_per_file.txt") as f:
              for line in f:
                  parts = line.strip().split("\t")
                  if len(parts) < 2:
                      continue
                  filename = parts[0].strip()
                  m = re.search(r"([\d.]+)% of (\d+)", parts[1])
                  if not m:
                      continue
                  pct = float(m.group(1))
                  total = int(m.group(2))
                  hit = int(total * pct / 100 + 0.5)
                  if filename not in best:
                      best[filename] = (pct, hit, total)
                  else:
                      cur_pct, cur_hit, cur_total = best[filename]
                      if total > cur_total or (total == cur_total and pct > cur_pct):
                          best[filename] = (pct, hit, total)

          results = [(v[0], v[1], v[2], v[2]-v[1], k) for k, v in best.items()]
          results.sort()

          total_hit = sum(r[1] for r in results)
          total_all = sum(r[2] for r in results)
          overall = 100.0 * total_hit / total_all if total_all else 0

          print()
          print("=" * 85)
          print("  Canon-C MC/DC Condition Coverage (GCC 14 -fcondition-coverage)")
          print("=" * 85)
          print(f"  {'File':<50} {'MC/DC%':>8} {'Hit':>5} {'Total':>6} {'Missed':>7}")
          print("-" * 85)
          for pct, hit, total, missed, f in results:
              print(f"  {f:<50} {pct:>7.1f}% {hit:>5} {total:>6} {missed:>7}")
          print("-" * 85)
          print(f"  {'TOTAL':<50} {overall:>7.1f}% {total_hit:>5} {total_all:>6} {total_all-total_hit:>7}")
          print("=" * 85)

          with open("mcdc_summary.txt", "w") as out:
              out.write(f"{overall:.1f}\n")
              out.write(f"{total_hit}\n")
              out.write(f"{total_all}\n")
          PYEOF

      - name: "Debug: per-line MC/DC detail for checked.h"
        run: |
          cd build

          CHECKED_GCDA=$(find . -name "checked_test*.gcda" | head -1)

          if [ -z "$CHECKED_GCDA" ]; then
            echo "ERROR: could not locate checked_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $CHECKED_GCDA"
          gcov-14 --conditions --all-blocks "$CHECKED_GCDA" 2>&1 | \
            grep -A 200 "checked.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for checked.h ==="
          find . -name "checked.h.gcov" -exec echo "Found: {}" \;

          CHECKED_GCOV=$(find . -name "checked.h.gcov" | head -1)
          if [ -n "$CHECKED_GCOV" ]; then
            echo ""
            echo "=== Full contents of $CHECKED_GCOV ==="
            cat "$CHECKED_GCOV"
          else
            echo "No checked.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*checked* 2>/dev/null || true
            done
          fi

      - name: Generate HTML coverage report
        run: |
          genhtml coverage.info \
            --output-directory coverage_html \
            --branch-coverage \
            --title "Canon-C MC/DC Coverage" \
            --legend \
            --demangle-cpp \
            --ignore-errors unused

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage_html/
            build/mcdc_per_file.txt

      - name: Print branch coverage summary
        run: |
          echo "==============================================="
          echo "  Canon-C Branch Coverage Summary"
          echo "==============================================="
          lcov --summary coverage.info \
            --rc branch_coverage=1
          echo "==============================================="

      - name: Enforce coverage threshold
        run: |
          BRANCH_COV=$(lcov --summary coverage.info \
            --rc branch_coverage=1 2>&1 | \
            grep "branches" | grep -oP '[\d.]+%' | head -1 | tr -d '%')

          echo "Branch coverage: ${BRANCH_COV}%"

          if [ -f build/mcdc_summary.txt ]; then
            MCDC_COV=$(head -1 build/mcdc_summary.txt)
            echo "MC/DC coverage:  ${MCDC_COV}%"
          fi

          # Threshold progression plan:
          #   Phase 1 (current): 70% — baseline established
          #   Phase 2: 80% — after gap analysis and test additions
          #   Phase 3: 90% — certification readiness (DO-178C Level C)
          #   Phase 4: 95%+ — certification readiness (DO-178C Level A/B)
          THRESHOLD=70

          if [ "$(echo "${BRANCH_COV} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "FAIL: Branch coverage ${BRANCH_COV}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "PASS: Branch coverage ${BRANCH_COV}% meets threshold ${THRESHOLD}%"
          fi

  # -------------------------------------------------------------------------
  # 7. MISRA C:2012 advisory analysis (Linux only)
  #
  #    Uses Cppcheck's MISRA addon for preliminary compliance checking.
  #    This is NOT a qualified MISRA checker — it covers approximately
  #    60-70% of MISRA C:2012 rules. For certification, replace with
  #    a qualified tool: Polyspace, LDRA, PC-lint, or Parasoft C/C++test.
  #
  #    This job is advisory — it does not fail the build. Its purpose
  #    is to track MISRA compliance progress and identify deviations
  #    that must be documented in docs/deviations.md.
  #
  #    Suppressions:
  #      - misra-config:*_impl.h — macro-templated implementation headers
  #        (hashmap_impl.h, deque_impl.h, etc.) emit [misra-config]
  #        errors because Cppcheck cannot resolve macro-instantiated
  #        type names (e.g. HASHMAP_SLOT_NAME) without an instantiation
  #        context. This is a tool limitation, not a code defect.
  #        Qualified MISRA checkers handle this correctly via full
  #        preprocessor-aware analysis.
  # -------------------------------------------------------------------------
  misra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run MISRA C:2012 analysis on library headers
        shell: bash
        run: |
          HEADERS=$(find \
            "${{ github.workspace }}/core" \
            "${{ github.workspace }}/semantics" \
            "${{ github.workspace }}/data" \
            "${{ github.workspace }}/algo" \
            "${{ github.workspace }}/util" \
            -name "*.h" -type f 2>/dev/null | sort)

          if [ -z "$HEADERS" ]; then
            echo "No header files found — skipping MISRA analysis"
            exit 0
          fi

          echo "Found $(echo "$HEADERS" | wc -l) header files to analyze"

          cppcheck \
            --addon=misra \
            --std=c99 \
            --language=c \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=misra-config:*_impl.h" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            $HEADERS \
            2>&1 | tee misra_report.txt

          echo ""
          echo "==============================================="
          echo "  MISRA C:2012 Summary"
          echo "==============================================="

          TOTAL=$(grep -c "\[misra-" misra_report.txt || true)
          echo "  Total violations: ${TOTAL}"
          echo ""
          echo "  NOTE: Rule category breakdown (Mandatory/Required/Advisory)"
          echo "  requires a MISRA rule lookup table and is not produced by"
          echo "  Cppcheck alone. For certification, use a qualified tool"
          echo "  (Polyspace, LDRA, PC-lint) that emits categorized output."
          echo ""
          echo "  Deviations documented in: docs/deviations.md"
          echo "==============================================="

          # Advisory only — does not fail the build.
          # When MISRA compliance is mature, uncomment to enforce:
          # if [ "${TOTAL}" -gt 0 ]; then
          #   echo "FAIL: ${TOTAL} MISRA violations found"
          #   exit 1
          # fi

      - name: Upload MISRA report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra_report.txt
