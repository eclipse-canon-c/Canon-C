  # -------------------------------------------------------------------------
  # data/vec — third Shape-B macro-module driver, FIRST data/-layer module,
  # and the first driver on the Typed+Cast model: unlike option/result
  # (by-value structs, plain Typed), vec crosses void* boundaries —
  # (int*)mem_alloc(bytes), int* buffers through mem_copy/mem_move's void*
