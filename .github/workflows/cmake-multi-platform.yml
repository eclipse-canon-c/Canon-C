  # -------------------------------------------------------------------------
  # region.h — ENFORCED, 120s / -wp-split, in its own isolated job.
  #
  # In its own job region gets a fresh 6h budget instead of the leftover at
  # the tail of the old serial job, which is what makes 120s/split feasible.
  # The run is long (~1h40m observed) because -wp-split roughly doubles the
  # goal count and region_end's opaque h->fn hook is modelled as potentially
  # recursive, minting terminates/decreases/_partN goals the splitter
  # multiplies — but it completes, and `timeout-minutes: 350` still cancels
  # cleanly at 5h50m (before GitHub's 6h hard kill) should a future change
  # blow the budget, leaving a partial `tee` output worth inspecting.
  #
  # Promoted from report-only to enforced as of CI #1022 (VERIFY-011/-012):
  # 3531/3643 proved, exactly 112 unproved (89 inherited + 23 region-own).
  # The residual set is name-stable — VERIFY-012's 14 initialization closures
  # left the inherited surface (126 -> 112) without touching the 23 own goals.
  # -------------------------------------------------------------------------
  frama-c-region:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 350          # clean cancel before the 6h platform kill
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/framac-setup
      - name: "WP: core/region.h"
        # region.h — Typed+Cast, 120s / -wp-split, in its own isolated job.
        # Expected: 3531 / 3643 proved, exactly 112 unproved (VERIFY-011):
        # 89 inherited (arena.h's full surface, two-hop transitive) + 23
        # region.h-own (region_begin / region_end loop+terminates+assigns /
        # attach_arena / register / set_parent). Any deviation is a regression.
        #
        # Promoted from report-only to enforced as of CI #1022 (VERIFY-012):
        # the residual set is name-stable across runs — the 14 initialization
        # goals that VERIFY-012 closed upstream simply left the inherited
        # surface (126 -> 112), the 23 region-own goals are unchanged.
        # (2026-07-16 retrofit): roll-call COMPLETED from a 37-name sample
        # to the full 112-name set (inherited 89 = arena.h's pinned list
        # verbatim, VERIFY-011). Failed gated at zero and excluded from the
        # pooled count; Proved-line pin hardened. NOTE: sanity-diff CHECKS
        # against the latest wp-proof-region artifact before first push.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/region.h 2>&1 | tee wp_region_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e
          echo ""
          echo "==============================================="
          echo "  WP (region.h) exit status: ${WP_EXIT}"
          echo "==============================================="
          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_region_output.txt || true)
          echo "  ${PROVED_LINE}"
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in region.h. Check the WP"
            echo "      output above for [kernel:annot-error] or"
            echo "      [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_region_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_region_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_region_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_region_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT))
          EXPECTED_UNPROVED=112
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved (T+U): ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"
          if [ "${FAILED_COUNT}" -ne 0 ]; then
            echo "FAIL: ${FAILED_COUNT} goal(s) FAILED (not timeout/unknown) —"
            echo "      a contract in region.h is falsified:"
            grep -E "^\[wp\] \[Failed\]" wp_region_output.txt
            exit 1
          fi
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          if [ "${PROVED_COUNT}" != "3531 / 3643" ]; then
            echo "FAIL: proved-goal summary changed (pinned: 3531 / 3643)."
            echo "      The goal surface drifted — reclassify in VERIFY-011,"
            echo "      then ratchet this pin, EXPECTED_UNPROVED, and CHECKS"
            echo "      together in one acknowledged commit."
            exit 1
          fi
          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo ""
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md (region.h section) and"
            echo "      docs/deviations.md (VERIFY-011) for the full list."
