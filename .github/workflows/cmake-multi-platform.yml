      - name: Upload WP proof output (ptr.h)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-proof-ptr
          path: wp_ptr_output.txt

      - name: "WP: core/slice.h"
        # slice.h is the first non-primitives header WP-verified in
        # Canon-C. It defines the canonical {ptr, len} borrow types —
        # bytes_t (mutable byte view), cbytes_t (read-only byte view),
        # and str_t (read-only character view) — plus the
        # DEFINE_SLICE(T) macro for typed element views.
        #
        # Memory model: Typed+Cast — same rationale as VERIFY-005
        # (compare.h) and VERIFY-006 (ptr.h). slice.h performs void*
        # to u8* casts in bytes_from / cbytes_from / slice_T_as_bytes;
        # the default Typed memory model rejects these casts and
        # every RTE mem_access goal becomes unprovable.
        #
        # Expected result: 367 / 390 proved, exactly 23 unproved.
        # Established as the stable triple-prover baseline by CI #821
        # (commit 1e0d0fe). The 23 unproved goals are documented in
        # docs/deviations.md under VERIFY-007 with WP-warning evidence
        # and category analysis. They fall into three categories:
        #
        #   1. memcmp call-site preconditions (20) — six per
        #      bytes_equal/str_equal, four per str_starts_with/
        #      str_ends_with. WP itself reports the limitation:
        #        "Allocation, initialization and danglingness not yet
        #         implemented (\dangling{L}((char *)s + i))"
        #      ACSL's memcmp contract requires initialization and
        #      danglingness reasoning that Frama-C 29 has not yet
        #      implemented. Strengthening slice.h's predicates would
        #      not close these — the verifier itself cannot process
        #      the obligations.
        #
        #   2. strlen valid_string precondition (1) — str_from_cstr
        #      deliberately omits valid_read_string to avoid a
        #      project-wide -frama-c-stdlib dependency. See VERIFY-007
        #      for the spec-strength tradeoff rationale.
        #
        #   3. Transitive contract.h handler non-termination (2) —
        #      same two goals as VERIFY-006 category 4, re-emitted
        #      because slice.h includes contract.h transitively.
        #      Not new slice.h residuals.
        #
        # Verification scope:
        #   - bytes_t / cbytes_t / str_t functions: ANNOTATED + VERIFIED
        #   - DEFINE_SLICE(T) macro: DOCUMENTED, NOT WP-VERIFIED — the
        #     C preprocessor strips ACSL inside #define before macro
        #     expansion. Macro-generated functions are validated by
        #     unit testing, fuzzing, and 93.1% MC/DC coverage on the
        #     i32 instantiation.
        #
        # MCDC-002 closure:
        #   The four `!ptr` defensive branches in bytes_slice (line
        #   117), bytes_skip (line 130), str_slice (line 194), and
        #   str_skip (line 207) — documented in MCDC-002 as
        #   API-unreachable in MC/DC isolation — are formally proved
        #   unreachable by WP under the bytes_invariant / str_invariant
        #   type predicates. None of the four functions appear in the
        #   unproved goal list. The wrapper below verifies this with
        #   the diagnostic line `MCDC-002 functions with WP residuals:
        #   0/4` — a regression here means the predicates were
        #   weakened or the type invariants are no longer being
        #   carried through the contracts.
        #
        # The wrapper enforces 367/390 proved with the 23 named
        # unproved goal patterns. Any deviation is a regression.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/slice.h 2>&1 | tee wp_slice_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP (slice.h) exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_slice_output.txt || true)
          echo "  ${PROVED_LINE}"

          # First sanity check: did WP actually produce a verification
          # summary? If "Proved goals:" is missing, frama-c aborted
          # before WP ran (typically an ACSL parse error). The
          # unproved counters below would all read zero, falsely
          # passing the count check. Without this guard, a parse
          # error becomes a silent pass — see CI #821 history for the
          # bug this prevents.
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in slice.h. Check the WP"
            echo "      output above for [kernel:annot-error] or"
            echo "      [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_slice_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi

          # Count unproved goals: Timeout + Unknown + Failed.
          # WP may classify the same goal as either Timeout or Unknown
          # depending on solver heuristics per run.
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_slice_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_slice_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_slice_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
          EXPECTED_UNPROVED=23
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo ""
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md (slice.h section) and"
            echo "      docs/deviations.md (VERIFY-007) for the full list."
            echo ""
            echo "Observed unproved goals:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_slice_output.txt || true
            exit 1
          fi

          # Verify the proved count matches the stable triple-prover
          # baseline (367 / 390).
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          echo "  Proved: ${PROVED_COUNT}"
          if [ "${PROVED_COUNT}" != "367 / 390" ]; then
            echo "WARNING: proved count changed from expected 367 / 390."
            echo "         This may indicate added or removed functions,"
            echo "         a new timeout, or a newly-proved goal."
            echo "         Review the output and update VERIFY-007 in"
            echo "         docs/deviations.md before updating this wrapper."
          fi

          # MCDC-002 closure check: verify WP discharged all four
          # !ptr defensive branches as unreachable. If any of these
          # functions appears in the unproved list, MCDC-002's
          # WP-discharged status has regressed and the cross-stream
          # certification evidence is no longer valid.
          MCDC002_GOALS=(
            "bytes_slice"
            "bytes_skip"
            "str_slice"
            "str_skip"
          )
          MCDC002_RESIDUALS=0
          for fn in "${MCDC002_GOALS[@]}"; do
            if grep -qE "\[(Timeout|Unknown|Failed)\].*${fn}" wp_slice_output.txt; then
              MCDC002_RESIDUALS=$((MCDC002_RESIDUALS + 1))
            fi
          done
          echo "  MCDC-002 functions with WP residuals: ${MCDC002_RESIDUALS}/4 (expected 0/4)"
          if [ "${MCDC002_RESIDUALS}" -ne 0 ]; then
            echo ""
            echo "FAIL: MCDC-002 closure regressed."
            echo "      One or more of the four !ptr defensive branches"
            echo "      (bytes_slice, bytes_skip, str_slice, str_skip)"
            echo "      now produces a WP residual, breaking the"
            echo "      'WP-discharged unreachable' status documented"
            echo "      in docs/deviations.md MCDC-002. Investigate the"
            echo "      type invariant predicates (bytes_invariant,"
            echo "      str_invariant) — they may have been weakened."
            exit 1
          fi

          # Spot-check representative goals from each unproved category.
          # These may appear as [Timeout], [Unknown], or [Failed] —
          # check all. Full list: see docs/deviations.md, VERIFY-007.
          # The check uses pattern-style names because WP emits one
          # goal per memcmp aspect (valid/initialization/danglingness)
          # times two arguments (s1/s2) per equality function.
          CHECKS=(
            "typed_cast_contract_default_handler_terminates"
            "typed_cast_contract_default_handler_loop_invariant_established"
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_from_cstr_call_strlen_requires_valid_string_s"
            "typed_cast_str_equal_call_memcmp_requires_valid_s1"
            "typed_cast_str_equal_call_memcmp_requires_valid_s2"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s2"
          )

          for goal in "${CHECKS[@]}"; do
            if ! grep -qE "\[(Timeout|Unknown|Failed)\].*${goal}" wp_slice_output.txt; then
              echo "FAIL: expected unproved goal ${goal} not observed."
              exit 1
            fi
          done

          # Confirm CVC5 was actually invoked. Same belt-and-braces
          # check as the ptr.h wrapper. If CVC5 doesn't appear, the
          # triple-prover setup has degraded to dual-prover and the
          # certification claim ("triple-prover-resistant residuals")
          # is no longer supported.
          CVC5_INVOKED=$(grep -cE "CVC5|cvc5" wp_slice_output.txt || true)
          echo "  CVC5 mentions in WP output: ${CVC5_INVOKED}"
          if [ "${CVC5_INVOKED}" -eq 0 ]; then
            echo "WARNING: CVC5 does not appear in WP output."
            echo "         The triple-prover setup may have degraded to"
            echo "         dual-prover. Check the prover configuration step."
          fi

          echo "PASS: slice.h verified — 367/390 proved, 23 documented"
          echo "      residuals all observed (VERIFY-007), MCDC-002"
          echo "      closure intact (4/4 defensive branches discharged)."
          echo "==============================================="

      - name: Upload WP proof output (slice.h)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-proof-slice
          path: wp_slice_output.txt

      - name: "WP: core/memory.h"
        # memory.h is the sixth Canon-C header WP-verified and the
        # second non-primitives header (after slice.h). It provides
        # safe wrappers around memcpy/memmove/memset/memcmp,
        # malloc/free, alignment helpers, and bytes_t/cbytes_t slice
        # variants — 22 user-facing functions in three groups:
        #
        #   Group 1 — alignment and allocation (9 functions):
        #     mem_regions_overlap, mem_alloc, mem_free,
        #     mem_alloc_array_checked, mem_align, mem_align_to,
        #     mem_is_aligned, mem_get_alignment, mem_is_power_of_two
        #
        #   Group 2 — raw memory operations (11 functions):
        #     mem_copy, mem_move, mem_zero, mem_secure_zero, mem_set,
        #     mem_compare, mem_equal, mem_is_all, mem_is_zero,
        #     mem_swap, mem_swap_buf
        #
        #   Group 3 — bytes_t/cbytes_t variants (7 functions):
        #     mem_copy_bytes, mem_move_bytes, mem_zero_bytes,
        #     mem_set_bytes, mem_equal_bytes, mem_is_zero_bytes,
        #     mem_secure_zero_bytes
        #
        # Memory model: Typed+Cast — same rationale as VERIFY-005
        # (compare.h), VERIFY-006 (ptr.h), and VERIFY-007 (slice.h).
        # memory.h performs void* to char*/u8* casts in many places
        # (mem_alloc, mem_regions_overlap, all bytes_t variants);
        # the default Typed memory model rejects these casts.
        #
        # Expected result: 2805 / 2862 proved, exactly 57 unproved.
        # Established as the stable triple-prover baseline by CI #851
        # (commit TBD). The 57 unproved goals are documented in
        # docs/deviations.md under VERIFY-008 with WP-warning evidence
        # and category analysis. They split cleanly into inherited
        # vs memory.h-own:
        #
        # INHERITED RESIDUALS (31) — propagated unchanged from
        # already-verified substrate headers. These are not memory.h
        # defects; they are the substrate's documented residuals
        # that re-emerge wherever memory.h's call paths reach them.
        # The composable-verification thesis: substrate residuals
        # propagate without amplification.
        #
        #   1a. contract.h handler non-termination (2) — same as
        #       VERIFY-006 cat 4 (ptr.h) and slice.h cat 3.
        #
        #   1b. checked.h u64 add overflow (2) — same as VERIFY-001
        #       (the manually-discharged checked_add_u64 pair).
        #
        #   1c. ptr.h align formula ensures (3) — same as VERIFY-006
        #       cat 2 (align_up/down/padding integer theory).
        #
        #   1d. ptr.h call-chain align preconditions (3) — same as
        #       VERIFY-006 cat 3 (ptr_align_up/padding).
        #
        #   1e. slice.h bytes_equal/str_equal/str_starts_with/
        #       str_ends_with/str_from_cstr memcmp inheritance (21) —
        #       same as VERIFY-007 cat 1 and cat 2. ACSL's memcmp
        #       and strlen contracts use \dangling{L} and
        #       \initialization clauses that Frama-C 29 has not yet
        #       implemented.
        #
        # MEMORY.H-OWN RESIDUALS (26) — three categories, all
        # documented under VERIFY-008:
        #
        #   2a. \fresh / \freeable allocation reasoning (5) —
        #       mem_alloc, mem_free, mem_alloc_array_checked. WP
        #       cannot reason across stdlib malloc/free's allocation
        #       and freeability postconditions because Frama-C 29's
        #       libc spec uses unsupported clauses:
        #         "Allocation, initialization and danglingness not
        #          yet implemented (\fresh{Old, Here}(...))"
        #         "... (\freeable(p))"
        #       Same WP limitation as the slice.h memcmp residuals.
        #
        #   2b. WP integer theory / bitwise alignment (9) —
        #       mem_align, mem_align_to, mem_is_aligned,
        #       mem_get_alignment. The "% alignment" ensures clauses
        #       and bitwise alignment formulas exceed WP's integer
        #       theory in the same pattern as ptr.h's align_up
        #       residuals (VERIFY-006 cat 2). Strengthening contracts
        #       cannot close these — the verifier itself cannot
        #       process the obligations.
        #
        #   2c. memcmp call-site inheritance (12) — mem_compare,
        #       mem_equal, mem_equal_bytes. Same root cause as
        #       VERIFY-007 cat 1 (slice.h's bytes_equal/str_equal).
        #       memory.h directly calls memcmp, so the same
        #       \dangling/\initialization residuals re-emerge here
        #       at memory.h's call sites.
        #
        # Verification scope:
        #   - All 22 user-facing functions: ANNOTATED + VERIFIED
        #   - mem_alloc_type, mem_alloc_array, mem_zero_type, etc.
        #     (type-safe macros): DOCUMENTED, NOT WP-VERIFIED — the
        #     C preprocessor strips ACSL inside #define before macro
        #     expansion. Same VERIFY-007 macro-verification rationale
        #     as slice.h's DEFINE_SLICE.
        #   - mem_alloc_array_checked routes through checked_mul
        #     (checked.h's verified primitive). The composable-
        #     verification chain checked.h → memory.h is the first
        #     transitive dependency on a verified primitive at this
        #     layer; the inherited checked_add_u64 residual is the
        #     concrete data point.
        #
        # The wrapper enforces 2805/2862 proved with the 57 named
        # unproved goal patterns. Any deviation is a regression.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/memory.h 2>&1 | tee wp_memory_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP (memory.h) exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_memory_output.txt || true)
          echo "  ${PROVED_LINE}"

          # First sanity check: did WP actually produce a verification
          # summary? If "Proved goals:" is missing, frama-c aborted
          # before WP ran (typically an ACSL parse error). Without
          # this guard, a parse error becomes a silent pass — see
          # CI #821 history (slice.h) for the bug this prevents.
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in memory.h. Check the WP"
            echo "      output above for [kernel:annot-error] or"
            echo "      [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_memory_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi

          # Count unproved goals: Timeout + Unknown + Failed.
          # WP may classify the same goal as either Timeout or Unknown
          # depending on solver heuristics per run.
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_memory_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_memory_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_memory_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
          EXPECTED_UNPROVED=57
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo ""
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md (memory.h section) and"
            echo "      docs/deviations.md (VERIFY-008) for the full list."
            echo ""
            echo "Observed unproved goals:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_memory_output.txt || true
            exit 1
          fi

          # Verify the proved count matches the stable triple-prover
          # baseline (2805 / 2862).
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          echo "  Proved: ${PROVED_COUNT}"
          if [ "${PROVED_COUNT}" != "2805 / 2862" ]; then
            echo "WARNING: proved count changed from expected 2805 / 2862."
            echo "         This may indicate added or removed functions,"
            echo "         a new timeout, or a newly-proved goal."
            echo "         Review the output and update VERIFY-008 in"
            echo "         docs/deviations.md before updating this wrapper."
          fi

          # Spot-check representative goals from each category. These
          # may appear as [Timeout], [Unknown], or [Failed] — check
          # all. Full list: see docs/deviations.md, VERIFY-008.
          #
          # The check uses pattern-style names because WP emits one
          # goal per memcmp aspect (initialization/danglingness)
          # times two arguments (s1/s2), and one goal per align
          # behavior (part2/part3).
          CHECKS=(
            # Inherited cat 1a — contract.h handler (2)
            "typed_cast_contract_default_handler_terminates"
            "typed_cast_contract_default_handler_loop_invariant_established"
            # Inherited cat 1b — checked.h u64 add overflow (2)
            "typed_cast_checked_add_overflow_ensures"
            "typed_cast_checked_add_u64_overflow_ensures"
            # Inherited cat 1c — ptr.h align formula (3)
            "typed_cast_align_up_ensures"
            "typed_cast_align_down_ensures"
            "typed_cast_align_padding_ensures"
            # Inherited cat 1d — ptr.h call-chain align (3)
            "typed_cast_ptr_align_up_call_align_up_requires_3"
            "typed_cast_ptr_align_padding_call_align_padding_requires_3"
            "typed_cast_ptr_align_padding_nonnull_ensures_part2"
            # Inherited cat 1e — slice.h memcmp/strlen (21)
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_from_cstr_call_strlen_requires_valid_string_s"
            "typed_cast_str_equal_call_memcmp_requires_valid_s1"
            "typed_cast_str_equal_call_memcmp_requires_valid_s2"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s2"
            # memory.h-own cat 2a — \fresh / \freeable allocation (5)
            "typed_cast_mem_alloc_assigns_normal_part2"
            "typed_cast_mem_alloc_nonzero_size_ensures_part2"
            "typed_cast_mem_free_assigns_normal"
            "typed_cast_mem_free_call_free_requires_freeable"
            "typed_cast_mem_alloc_array_checked_nonoverflow_ensures_part3"
            # memory.h-own cat 2b — WP integer theory (9)
            "typed_cast_mem_align_normal_ensures_part3"
            "typed_cast_mem_align_normal_ensures_2_part3"
            "typed_cast_mem_align_to_normal_ensures_part3"
            "typed_cast_mem_align_to_normal_ensures_2_part3"
            "typed_cast_mem_is_aligned_nonnull_aligned_ensures"
            "typed_cast_mem_is_aligned_nonnull_unaligned_ensures"
            "typed_cast_mem_get_alignment_assert_rte_signed_overflow"
            "typed_cast_mem_get_alignment_nonnull_ensures_part2"
            "typed_cast_mem_get_alignment_nonnull_ensures_2_part2"
            # memory.h-own cat 2c — memcmp call-site inheritance (12)
            "typed_cast_mem_compare_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_compare_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_compare_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_compare_call_memcmp_requires_danglingness_s2"
            "typed_cast_mem_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_danglingness_s2"
          )

          for goal in "${CHECKS[@]}"; do
            if ! grep -qE "\[(Timeout|Unknown|Failed)\].*${goal}" wp_memory_output.txt; then
              echo "FAIL: expected unproved goal ${goal} not observed."
              exit 1
            fi
          done

          # Confirm CVC5 was actually invoked. Same belt-and-braces
          # check as the ptr.h and slice.h wrappers. If CVC5 doesn't
          # appear, the triple-prover setup has degraded to dual-
          # prover and the certification claim ("triple-prover-
          # resistant residuals") is no longer supported.
          CVC5_INVOKED=$(grep -cE "CVC5|cvc5" wp_memory_output.txt || true)
          echo "  CVC5 mentions in WP output: ${CVC5_INVOKED}"
          if [ "${CVC5_INVOKED}" -eq 0 ]; then
            echo "WARNING: CVC5 does not appear in WP output."
            echo "         The triple-prover setup may have degraded to"
            echo "         dual-prover. Check the prover configuration step."
          fi

          echo "PASS: memory.h verified — 2805/2862 proved, 57 documented"
          echo "      residuals all observed (VERIFY-008): 31 inherited"
          echo "      from ptr.h/slice.h/checked.h substrate + 26"
          echo "      memory.h-own (allocation reasoning, integer theory,"
          echo "      memcmp inheritance). Composable verification claim"
          echo "      holds: zero new substrate residuals introduced."
          echo "==============================================="

      - name: Upload WP proof output (memory.h)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-proof-memory
          path: wp_memory_output.txt

      # -- Eva (Evolved Value Analysis) is intentionally NOT run on checked.h --
      # Eva requires an entry point function to start abstract interpretation
      # from. checked.h is a header full of static inline functions with no
      # main() — Eva has nothing to anchor to and aborts with "cannot find
      # entry point". WP already proves the contracts and absence of runtime
      # errors for every function independently, so Eva is not needed here.
      #
      # When Canon-C grows real translation units (verification driver files
      # for macro-instantiated modules, or test files compiled as standalone
      # programs), Eva can run on those — pointing at a real main() that
      # exercises a representative call sequence. Until then, WP is the
      # complete formal verification story for header-only modules.

      - name: "WP: core/arena.h"
        # arena.h is the seventh Canon-C header WP-verified and the
        # third non-primitives header (after slice.h and memory.h). It
        # provides a linear bump allocator with explicit lifetime
        # control — 22 user-facing functions across init/reset,
        # allocation, query, and checkpoint/rollback.
        #
        # Memory model: Typed+Cast — same rationale as VERIFY-005
        # (compare.h), VERIFY-006 (ptr.h), VERIFY-007 (slice.h), and
        # VERIFY-008 (memory.h). arena.h performs void* to u8* casts
        # in arena_init, arena_alloc, arena_alloc_aligned, the byte
        # views, and several internal helpers; the default Typed
        # memory model rejects these casts.
        #
        # Expected result: 3369 / 3472 proved, exactly 103 unproved.
        # Established as the stable triple-prover baseline.
        # (commit TBD). The 103 unproved goals are documented in
        # docs/deviations.md under VERIFY-009. They split cleanly
        # into inherited vs arena.h-own — extending the composable-
        # verification claim to a third data point (after slice.h
        # inheriting from ptr.h, and memory.h inheriting from
        # ptr.h+slice.h+checked.h):
        #
        # INHERITED RESIDUALS (57) — propagated unchanged from the
        # already-verified substrate. memory.h's full residual set is
        # re-emitted byte-for-byte because arena.h includes memory.h
        # (which transitively includes ptr.h, slice.h, checked.h, and
        # contract.h). Zero new substrate residuals introduced.
        #
        #   1a. contract.h handler non-termination (2)
        #   1b. checked.h u64 add overflow (2)
        #   1c. ptr.h align formula ensures (3)
        #   1d. ptr.h call-chain align preconditions (3)
        #   1e. slice.h memcmp/strlen inheritance (21)
        #   1f. memory.h \fresh / \freeable allocation (5)
        #   1g. memory.h WP integer theory / bitwise alignment (9)
        #   1h. memory.h memcmp call-site inheritance (12)
        #
        # ARENA.H-OWN RESIDUALS (46) — four categories, all
        # documented under VERIFY-009:
        #
        #   2a. ptr_span call-site preconditions (8) — 4 in
        #       arena_alloc, 4 in arena_alloc_aligned. WP cannot
        #       reconstruct ptr_span's requires clauses through the
        #       ptr_align_up call chain under Typed+Cast. Same
        #       structural pattern as VERIFY-006 cat 3 (ptr.h
        #       ptr_align_up call-chain residuals).
        #
        #   2b. arena_alloc / arena_alloc_aligned fits/does_not_fit
        #       ensures (26 total: 13 per function) — the per-behavior
        #       postconditions relate the C offset arithmetic to the
        #       arena_can_fit predicate's let-bindings. WP cannot
        #       prove the arithmetic chain (offset + pad + size <=
        #       capacity, offset + size <= USIZE_MAX - pad, etc.)
        #       propagates through the C bump-pointer update across
        #       all four fits/does_not_fit cases. Strengthening
        #       arena_can_fit with intermediate alignment invariants
        #       would close these but adds substantial spec complexity
        #       for marginal certification benefit.
        #
        #   2c. arena_alloc_zero / arena_alloc_aligned_zero and
        #       arena_try_alloc / arena_try_alloc_aligned wrappers
        #       (10 total) — the zero-init and bool-return wrappers
        #       inherit the parent allocator's fits-ensures residuals
        #       through their delegation to arena_alloc /
        #       arena_alloc_aligned. The wrapper-specific obligations
        #       (assigns_normal_part03, non_null_out_ensures_part1,
        #       non_null_out_ensures_part2) reduce to the same
        #       arithmetic chain that cat 2b leaves unproved.
        #
        #   2d. arena_free_bytes ptr_offset/bytes_from call-site
        #       preconditions (2) — same structural pattern as
        #       cat 2a: WP cannot reconstruct the helper's requires
        #       clauses through the (offset < capacity) branch.
        #
        # Verification scope:
        #   - All 22 user-facing functions: ANNOTATED + VERIFIED
        #   - arena_alloc_type, arena_alloc_array, arena_alloc_type_zero,
        #     arena_alloc_array_zero (type-safe macros): DOCUMENTED,
        #     NOT WP-VERIFIED — the C preprocessor strips ACSL inside
        #     #define before macro expansion. Same VERIFY-007/008
        #     macro-verification rationale.
        #   - arena_init, arena_reset, arena_reset_secure, arena_reset_to,
        #     arena_mark, arena_capacity, arena_remaining, arena_used,
        #     arena_is_empty, arena_is_full: 100% proved (no residuals).
        #
        # MCDC-003 note (no closure check in this wrapper):
        #   Unlike slice.h's MCDC-002 closure block, this wrapper does
        #   NOT include a "functions with WP residuals: 0/N" check for
        #   MCDC-003. The slice.h pattern works because bytes_slice,
        #   bytes_skip, str_slice, str_skip are 100% proved — verifying
        #   they don't appear in residuals is meaningful. For arena.h,
        #   the MCDC-003 functions (arena_alloc, arena_alloc_aligned)
        #   DO appear in the residual list under cats 2a + 2b — they
        #   carry 13 WP-resistant goals each. A "function not in
        #   residuals" check would always fail and is not the right
        #   shape for arena.h's situation. Cross-stream MCDC-003
        #   evidence is provided by the per-line gcov debug step in
        #   the coverage job, which surfaces the specific unreachable
        #   subconditions for human review against docs/deviations.md.
        #
        # The wrapper enforces 3369/3472 proved with the 103 named
        # unproved goal patterns. Any deviation is a regression.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/arena.h 2>&1 | tee wp_arena_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP (arena.h) exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_arena_output.txt || true)
          echo "  ${PROVED_LINE}"

          # First sanity check: did WP actually produce a verification
          # summary? If "Proved goals:" is missing, frama-c aborted
          # before WP ran (typically an ACSL parse error). Without
          # this guard, a parse error becomes a silent pass — see
          # CI #821 history (slice.h) for the bug this prevents.
          if [ -z "${PROVED_LINE}" ]; then
            echo ""
            echo "FAIL: WP did not produce a verification summary."
            echo "      frama-c aborted before running WP, likely due to"
            echo "      an ACSL syntax error in arena.h. Check the WP"
            echo "      output above for [kernel:annot-error] or"
            echo "      [kernel] User Error messages."
            echo ""
            echo "First diagnostic lines from WP output:"
            grep -E "^\[(kernel|wp)" wp_arena_output.txt | head -10 || true
            echo "==============================================="
            exit 1
          fi

          # Count unproved goals: Timeout + Unknown + Failed.
          # WP may classify the same goal as either Timeout or Unknown
          # depending on solver heuristics per run.
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_arena_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_arena_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_arena_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
          EXPECTED_UNPROVED=103
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo ""
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md (arena.h section) and"
            echo "      docs/deviations.md (VERIFY-009) for the full list."
            echo ""
            echo "Observed unproved goals:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_arena_output.txt || true
            exit 1
          fi

          # Verify the proved count matches the stable triple-prover
          # baseline (3369 / 3472).
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          echo "  Proved: ${PROVED_COUNT}"
          if [ "${PROVED_COUNT}" != "3369 / 3472" ]; then
            echo "WARNING: proved count changed from expected 3369 / 3472."
            echo "         This may indicate added or removed functions,"
            echo "         a new timeout, or a newly-proved goal."
            echo "         Review the output and update VERIFY-009 in"
            echo "         docs/deviations.md before updating this wrapper."
          fi

          # Spot-check representative goals from each category. These
          # may appear as [Timeout], [Unknown], or [Failed] — check
          # all. Full list: see docs/deviations.md, VERIFY-009.
          CHECKS=(
            # === Inherited residuals (57) ===
            # Inherited cat 1a — contract.h handler (2)
            "typed_cast_contract_default_handler_terminates"
            "typed_cast_contract_default_handler_loop_invariant_established"
            # Inherited cat 1b — checked.h u64 add overflow (2)
            "typed_cast_checked_add_overflow_ensures"
            "typed_cast_checked_add_u64_overflow_ensures"
            # Inherited cat 1c — ptr.h align formula (3)
            "typed_cast_align_up_ensures"
            "typed_cast_align_down_ensures"
            "typed_cast_align_padding_ensures"
            # Inherited cat 1d — ptr.h call-chain align (3)
            "typed_cast_ptr_align_up_call_align_up_requires_3"
            "typed_cast_ptr_align_padding_call_align_padding_requires_3"
            "typed_cast_ptr_align_padding_nonnull_ensures_part2"
            # Inherited cat 1e — slice.h memcmp/strlen (21)
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_valid_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_bytes_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_from_cstr_call_strlen_requires_valid_string_s"
            "typed_cast_str_equal_call_memcmp_requires_valid_s1"
            "typed_cast_str_equal_call_memcmp_requires_valid_s2"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_str_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_starts_with_call_memcmp_requires_danglingness_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_initialization_s2"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s1"
            "typed_cast_str_ends_with_call_memcmp_requires_danglingness_s2"
            # Inherited cat 1f — memory.h \fresh / \freeable (5)
            "typed_cast_mem_alloc_assigns_normal_part2"
            "typed_cast_mem_alloc_nonzero_size_ensures_part2"
            "typed_cast_mem_free_assigns_normal"
            "typed_cast_mem_free_call_free_requires_freeable"
            "typed_cast_mem_alloc_array_checked_nonoverflow_ensures_part3"
            # Inherited cat 1g — memory.h integer theory (9)
            "typed_cast_mem_align_normal_ensures_part3"
            "typed_cast_mem_align_normal_ensures_2_part3"
            "typed_cast_mem_align_to_normal_ensures_part3"
            "typed_cast_mem_align_to_normal_ensures_2_part3"
            "typed_cast_mem_is_aligned_nonnull_aligned_ensures"
            "typed_cast_mem_is_aligned_nonnull_unaligned_ensures"
            "typed_cast_mem_get_alignment_assert_rte_signed_overflow"
            "typed_cast_mem_get_alignment_nonnull_ensures_part2"
            "typed_cast_mem_get_alignment_nonnull_ensures_2_part2"
            # Inherited cat 1h — memory.h memcmp call-site (12)
            "typed_cast_mem_compare_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_compare_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_compare_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_compare_call_memcmp_requires_danglingness_s2"
            "typed_cast_mem_equal_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_equal_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_equal_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_equal_call_memcmp_requires_danglingness_s2"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_initialization_s1"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_initialization_s2"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_danglingness_s1"
            "typed_cast_mem_equal_bytes_call_memcmp_requires_danglingness_s2"
            # === arena.h-own residuals (46) ===
            # arena-own cat 2a — arena_alloc/aligned ptr_span calls (8)
            "typed_cast_arena_alloc_call_ptr_span_requires"
            "typed_cast_arena_alloc_call_ptr_span_requires_2"
            "typed_cast_arena_alloc_call_ptr_span_requires_3"
            "typed_cast_arena_alloc_call_ptr_span_requires_4"
            "typed_cast_arena_alloc_aligned_call_ptr_span_requires"
            "typed_cast_arena_alloc_aligned_call_ptr_span_requires_2"
            "typed_cast_arena_alloc_aligned_call_ptr_span_requires_3"
            "typed_cast_arena_alloc_aligned_call_ptr_span_requires_4"
            # arena-own cat 2b — arena_alloc/aligned fits + does_not_fit ensures (26)
            "typed_cast_arena_alloc_fits_ensures_part2"
            "typed_cast_arena_alloc_fits_ensures_part3"
            "typed_cast_arena_alloc_fits_ensures_part4"
            "typed_cast_arena_alloc_fits_ensures_part5"
            "typed_cast_arena_alloc_fits_ensures_2_part2"
            "typed_cast_arena_alloc_fits_ensures_2_part3"
            "typed_cast_arena_alloc_fits_ensures_2_part4"
            "typed_cast_arena_alloc_fits_ensures_2_part5"
            "typed_cast_arena_alloc_fits_ensures_3_part2"
            "typed_cast_arena_alloc_fits_ensures_3_part3"
            "typed_cast_arena_alloc_fits_ensures_3_part4"
            "typed_cast_arena_alloc_does_not_fit_ensures_part5"
            "typed_cast_arena_alloc_does_not_fit_ensures_2_part5"
            "typed_cast_arena_alloc_aligned_fits_ensures_part2"
            "typed_cast_arena_alloc_aligned_fits_ensures_part3"
            "typed_cast_arena_alloc_aligned_fits_ensures_part4"
            "typed_cast_arena_alloc_aligned_fits_ensures_part5"
            "typed_cast_arena_alloc_aligned_fits_ensures_2_part2"
            "typed_cast_arena_alloc_aligned_fits_ensures_2_part3"
            "typed_cast_arena_alloc_aligned_fits_ensures_2_part4"
            "typed_cast_arena_alloc_aligned_fits_ensures_2_part5"
            "typed_cast_arena_alloc_aligned_fits_ensures_3_part2"
            "typed_cast_arena_alloc_aligned_fits_ensures_3_part3"
            "typed_cast_arena_alloc_aligned_fits_ensures_3_part4"
            "typed_cast_arena_alloc_aligned_does_not_fit_ensures_part5"
            "typed_cast_arena_alloc_aligned_does_not_fit_ensures_2_part5"
            # arena-own cat 2c — zero/try wrappers (10)
            "typed_cast_arena_alloc_zero_ensures_3_part1"
            "typed_cast_arena_alloc_zero_assigns_normal_part3"
            "typed_cast_arena_alloc_aligned_zero_ensures_3_part1"
            "typed_cast_arena_alloc_aligned_zero_assigns_normal_part3"
            "typed_cast_arena_try_alloc_assigns_normal_part03"
            "typed_cast_arena_try_alloc_non_null_out_ensures_part1"
            "typed_cast_arena_try_alloc_non_null_out_ensures_part2"
            "typed_cast_arena_try_alloc_aligned_assigns_normal_part03"
            "typed_cast_arena_try_alloc_aligned_non_null_out_ensures_part1"
            "typed_cast_arena_try_alloc_aligned_non_null_out_ensures_part2"
            # arena-own cat 2d — arena_free_bytes helper calls (2)
            "typed_cast_arena_free_bytes_call_bytes_from_requires"
            "typed_cast_arena_free_bytes_call_bytes_from_requires_2"
          )

          for goal in "${CHECKS[@]}"; do
            if ! grep -qE "\[(Timeout|Unknown|Failed)\].*${goal}" wp_arena_output.txt; then
              echo "FAIL: expected unproved goal ${goal} not observed."
              exit 1
            fi
          done

          # Confirm CVC5 was actually invoked. Same belt-and-braces
          # check as the ptr.h, slice.h, and memory.h wrappers. If
          # CVC5 doesn't appear, the triple-prover setup has degraded
          # to dual-prover and the certification claim ("triple-
          # prover-resistant residuals") is no longer supported.
          CVC5_INVOKED=$(grep -cE "CVC5|cvc5" wp_arena_output.txt || true)
          echo "  CVC5 mentions in WP output: ${CVC5_INVOKED}"
          if [ "${CVC5_INVOKED}" -eq 0 ]; then
            echo "WARNING: CVC5 does not appear in WP output."
            echo "         The triple-prover setup may have degraded to"
            echo "         dual-prover. Check the prover configuration step."
          fi

          echo "PASS: arena.h verified — 3369/3472 proved, 103 documented"
          echo "      residuals all observed (VERIFY-009): 57 inherited"
          echo "      from memory.h/slice.h/ptr.h/checked.h/contract.h"
          echo "      substrate + 46 arena.h-own (ptr_span call-sites,"
          echo "      fits/does_not_fit ensures, zero/try wrappers,"
          echo "      free_bytes helpers). Composable verification claim"
          echo "      holds: zero new substrate residuals introduced."
          echo "==============================================="

      - name: Upload WP proof output (arena.h)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wp-proof-arena
          path: wp_arena_output.txt

  # -------------------------------------------------------------------------
  # 6. MC/DC coverage — GCC 14 -fcondition-coverage (Linux only)
  #
  #    -DCANON_CHECKED_FORCE_FALLBACK and -DCANON_BITS_FORCE_FALLBACK are
  #    passed so the fallback paths in checked.h and bits.h are exercised.
  #    Without these flags, GCC expands builtins to single instructions
  #    with no branches, the #else fallback blocks become dead code, and
  #    gcov reports 0% MC/DC on them. Forcing the fallback makes coverage
  #    measure the same code Frama-C is proving — the two tracks stay
  #    consistent.
  # -------------------------------------------------------------------------
  coverage:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 and lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 lcov

      - name: Configure CMake with MC/DC coverage instrumentation
        # CANON_CHECKED_FORCE_FALLBACK: exercise the same fallback path WP
        #   verifies (otherwise GCC expands __builtin_*_overflow to single
        #   instructions with no branches for gcov to see).
        # CANON_BITS_FORCE_FALLBACK: same rationale for bits.h — forces the
        #   portable fallback paths for popcount, clz, ctz, and bswap
        #   instead of compiler builtins.
        # CANON_NO_REQUIRE: compiles CHECKED_ASSERT_RESULT(result) out to
        #   nothing. Without this, every function contains a runtime NULL
        #   assertion whose NULL branch is structurally unreachable (the
        #   ACSL `requires \valid(result)` clause proves it for every
        #   caller), yet gcov counts it as an uncovered branch. Defining
        #   CANON_NO_REQUIRE removes the assertion from the preprocessed
        #   source, keeping MC/DC measurement focused on real branches.
        #   The frama-c job passes the same flag for the same reason, so
        #   the WP and coverage evidence streams stay aligned.
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fcondition-coverage -DCANON_CHECKED_FORCE_FALLBACK -DCANON_BITS_FORCE_FALLBACK -DCANON_NO_REQUIRE" \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        # contract_test is excluded here: the coverage build defines
        # CANON_NO_REQUIRE, which compiles require()/require_msg() into
        # ((void)0). contract_test's entire purpose is to verify that
        # those macros fire when preconditions are violated, so with
        # the macros disabled every assertion in the test fails by
        # design. contract_test still runs (and passes) in every other
        # CI job — build, valgrind, fuzzing — where CANON_NO_REQUIRE is
        # not defined. Excluding it here is honest about what the
        # coverage build measures: the fallback path of the Canon-C
        # library headers, not the assertion infrastructure itself.
        run: ctest --build-config Debug --output-on-failure --exclude-regex '^contract_test$'

      - name: Collect branch coverage data (lcov)
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage_raw.info \
            --rc branch_coverage=1 \
            --ignore-errors unused \
            --gcov-tool gcov-14

          lcov --remove coverage_raw.info \
            '/usr/*' \
            '*/test/*' \
            --output-file coverage.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

      - name: Collect MC/DC condition coverage (gcov-14 --conditions)
        run: |
          cd build

          for gcda in $(find . -name "*.gcda" | sort); do
            gcov-14 --conditions "$gcda" 2>/dev/null
          done > gcov_output.txt 2>&1

          awk '
            /^File / {
              current = $0
              sub(/^File /, "", current)
              gsub(/'\''/, "", current)
              have_file = 1
              next
            }
            /^Condition outcomes covered:/ {
              if (have_file) {
                print current "\t" $0
                have_file = 0
              }
            }
          ' gcov_output.txt | \
            grep -v "/test/" | \
            sed "s|${{ github.workspace }}/||" | \
            tee mcdc_per_file.txt

          python3 << 'PYEOF'
          import re

          best = {}
          with open("mcdc_per_file.txt") as f:
              for line in f:
                  parts = line.strip().split("\t")
                  if len(parts) < 2:
                      continue
                  filename = parts[0].strip()
                  m = re.search(r"([\d.]+)% of (\d+)", parts[1])
                  if not m:
                      continue
                  pct = float(m.group(1))
                  total = int(m.group(2))
                  hit = int(total * pct / 100 + 0.5)
                  if filename not in best:
                      best[filename] = (pct, hit, total)
                  else:
                      cur_pct, cur_hit, cur_total = best[filename]
                      if total > cur_total or (total == cur_total and pct > cur_pct):
                          best[filename] = (pct, hit, total)

          results = [(v[0], v[1], v[2], v[2]-v[1], k) for k, v in best.items()]
          results.sort()

          total_hit = sum(r[1] for r in results)
          total_all = sum(r[2] for r in results)
          overall = 100.0 * total_hit / total_all if total_all else 0

          print()
          print("=" * 85)
          print("  Canon-C MC/DC Condition Coverage (GCC 14 -fcondition-coverage)")
          print("=" * 85)
          print(f"  {'File':<50} {'MC/DC%':>8} {'Hit':>5} {'Total':>6} {'Missed':>7}")
          print("-" * 85)
          for pct, hit, total, missed, f in results:
              print(f"  {f:<50} {pct:>7.1f}% {hit:>5} {total:>6} {missed:>7}")
          print("-" * 85)
          print(f"  {'TOTAL':<50} {overall:>7.1f}% {total_hit:>5} {total_all:>6} {total_all-total_hit:>7}")
          print("=" * 85)

          with open("mcdc_summary.txt", "w") as out:
              out.write(f"{overall:.1f}\n")
              out.write(f"{total_hit}\n")
              out.write(f"{total_all}\n")
          PYEOF

      - name: "Debug: per-line MC/DC detail for checked.h"
        run: |
          cd build

          CHECKED_GCDA=$(find . -name "checked_test*.gcda" | head -1)

          if [ -z "$CHECKED_GCDA" ]; then
            echo "ERROR: could not locate checked_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $CHECKED_GCDA"
          gcov-14 --conditions --all-blocks "$CHECKED_GCDA" 2>&1 | \
            grep -A 200 "checked.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for checked.h ==="
          find . -name "checked.h.gcov" -exec echo "Found: {}" \;

          CHECKED_GCOV=$(find . -name "checked.h.gcov" | head -1)
          if [ -n "$CHECKED_GCOV" ]; then
            echo ""
            echo "=== Full contents of $CHECKED_GCOV ==="
            cat "$CHECKED_GCOV"
          else
            echo "No checked.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*checked* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for ptr.h"
        # Identifies which specific conditions in ptr.h are uncovered.
        # As of CI #788, ptr.h reached 100% MC/DC (42/42). This debug
        # step remains in place to catch future regressions — if a new
        # function is added without corresponding tests, the output
        # will show which conditions drop below 100%.
        run: |
          cd build

          PTR_GCDA=$(find . -name "ptr_test*.gcda" | head -1)

          if [ -z "$PTR_GCDA" ]; then
            echo "ERROR: could not locate ptr_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $PTR_GCDA"
          gcov-14 --conditions --all-blocks "$PTR_GCDA" 2>&1 | \
            grep -A 200 "ptr.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for ptr.h ==="
          find . -name "ptr.h.gcov" -exec echo "Found: {}" \;

          PTR_GCOV=$(find . -name "ptr.h.gcov" | head -1)
          if [ -n "$PTR_GCOV" ]; then
            echo ""
            echo "=== Full contents of $PTR_GCOV ==="
            cat "$PTR_GCOV"
          else
            echo "No ptr.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*ptr* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for slice.h"
        # Identifies which specific conditions in slice.h are uncovered.
        # As of CI #816, slice.h reached its achievable MC/DC ceiling at
        # 93.1% (54/58, 4 missed). The 4 remaining outcomes are documented
        # in docs/deviations.md as MCDC-002 — they are the `!ptr` left-side
        # of OR in bytes_slice (line 117), bytes_skip (line 130),
        # str_slice (line 194), and str_skip (line 207). All four are
        # API-unreachable in MC/DC isolation.
        #
        # This step remains in place as a regression detector — if a
        # new function is added without corresponding tests, or if any
        # of the previously-closed reachable gaps regress, the output
        # will show which conditions drop below the documented ceiling.
        #
        # When VERIFY-007 confirms WP discharges the four MCDC-002
        # branches as unreachable, MCDC-002 transitions from "API-
        # unreachable" to "WP-discharged unreachable" — but the gcov
        # measurement remains at 93.1% because gcov instruments the
        # source, not the proof. The two evidence streams complement
        # each other rather than converge.
        run: |
          cd build

          SLICE_GCDA=$(find . -name "slice_test*.gcda" | head -1)

          if [ -z "$SLICE_GCDA" ]; then
            echo "ERROR: could not locate slice_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $SLICE_GCDA"
          gcov-14 --conditions --all-blocks "$SLICE_GCDA" 2>&1 | \
            grep -A 200 "slice.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for slice.h ==="
          find . -name "slice.h.gcov" -exec echo "Found: {}" \;

          SLICE_GCOV=$(find . -name "slice.h.gcov" | head -1)
          if [ -n "$SLICE_GCOV" ]; then
            echo ""
            echo "=== Full contents of $SLICE_GCOV ==="
            cat "$SLICE_GCOV"
          else
            echo "No slice.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*slice* 2>/dev/null || true
            done
          fi

      - name: "Debug: per-line MC/DC detail for memory.h"
        # Identifies which specific conditions in memory.h are uncovered.
        # As of CI #831, memory.h reached 88.3% MC/DC (113/128, 15 missed).
        # The 15 remaining outcomes split into three rough categories
        # (estimated, to be confirmed by reading this debug output and
        # documented in deviations.md as a memory.h-specific MCDC entry):
        #
        #   1. MCDC-002-pattern (~6 conditions) — the bytes_t variants
        #      mem_copy_bytes, mem_move_bytes, mem_zero_bytes, mem_set_bytes,
        #      mem_equal_bytes, mem_secure_zero_bytes contain compound
        #      `!b.ptr || b.len == 0` early returns. The {ptr, len}
        #      structure plus cbytes_empty() = {NULL, 0} make some
        #      subcondition combinations API-unreachable in MC/DC
        #      isolation, analogous to slice.h's bytes_slice / str_slice
        #      defensive branches.
        #
        #   2. require_msg panic paths (~4-6 conditions) — mem_align_to,
        #      mem_is_aligned, mem_swap, mem_swap_buf use require_msg to
        #      enforce preconditions. The failing branches collapse under
        #      -DCANON_NO_REQUIRE (used by the coverage build), but their
        #      structural positions still register as conditions in some
        #      cases. Same pattern as the contract.h 0/2 entry that
        #      appears in every test row.
        #
        #   3. Reachable gaps (~3-5 conditions) — mem_compare's `if (a == b)`
        #      vs `if (!a || !b)` interaction, and mem_swap_buf's three
        #      separate overlap require_msg calls, are likely the
        #      reachable subset that more-careful test design could close.
        #
        # This step remains in place as a regression detector. If a new
        # function is added without corresponding tests, or if any of the
        # previously-closed reachable gaps regress, the output will show
        # which conditions drop below the documented baseline.
        run: |
          cd build

          MEMORY_GCDA=$(find . -name "memory_test*.gcda" | head -1)

          if [ -z "$MEMORY_GCDA" ]; then
            echo "ERROR: could not locate memory_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $MEMORY_GCDA"
          gcov-14 --conditions --all-blocks "$MEMORY_GCDA" 2>&1 | \
            grep -A 200 "memory.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for memory.h ==="
          find . -name "memory.h.gcov" -exec echo "Found: {}" \;

          MEMORY_GCOV=$(find . -name "memory.h.gcov" | head -1)
          if [ -n "$MEMORY_GCOV" ]; then
            echo ""
            echo "=== Full contents of $MEMORY_GCOV ==="
            cat "$MEMORY_GCOV"
          else
            echo "No memory.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*memory* 2>/dev/null || true
            done
          fi
      
      - name: "Debug: per-line MC/DC detail for arena.h"
        # Identifies which specific conditions in arena.h are uncovered.
        # As of the CI run that landed test_try_alloc_aligned_failure
        # (closing the line 510 compound-return gap), arena.h reaches
        # 90.6% MC/DC (58/64, 6 missed). The 6 remaining outcomes are
        # documented in docs/deviations.md as MCDC-003 and split into
        # two categories:
        #
        #   1. Overflow guard structural unreachability (4 outcomes) —
        #      the compound `||` in arena_alloc (line 346) and
        #      arena_alloc_aligned (line 401):
        #          if (arena->offset > CANON_USIZE_MAX - pad ||      // cond 0
        #              arena->offset + pad > CANON_USIZE_MAX - size ||// cond 1
        #              arena->offset + pad + size > arena->capacity) // cond 2
        #              return NULL;
        #      gcov reports cond 0 and cond 1 as "not covered (true)" in
        #      both functions. Both subconditions are structurally
        #      unreachable under the arena_invariant predicate:
        #        - arena_invariant requires capacity <= CANON_ARENA_MAX_SIZE
        #        - CANON_ARENA_MAX_SIZE = CANON_GB = 2^30 (limits.h)
        #        - pad <= CANON_DEFAULT_ALIGN - 1 <= 15
        #        - therefore offset + pad <= 2^30 + 15, well below
        #          CANON_USIZE_MAX on both 32-bit and 64-bit platforms,
        #          so cond 0 cannot fire
        #        - cond 1 firing in MC/DC isolation requires
        #          offset + pad + size > CANON_USIZE_MAX while cond 2 is
        #          false (offset + pad + size <= capacity); since
        #          capacity is a usize, this is mathematically
        #          impossible regardless of CANON_ARENA_MAX_SIZE
        #      Same "structurally unreachable under type invariants"
        #      pattern as slice.h's MCDC-002.
        #
        #   2. Release-build macro no-op artifacts (2 outcomes) — the
        #      `_arena_debug_update(arena)` calls on lines 356 and 411.
        #      Under release builds (no CANON_ARENA_DEBUG, as in the
        #      coverage build's compile flags), the macro expands to
        #      `((void)0)` per arena.h:176. gcov-14 still registers a
        #      structural "condition" there and counts it as
        #      "condition 0 not covered (false)". Same artifact pattern
        #      as the contract.h 0/2 entry that appears in every test
        #      row across the project — not a real condition, not a
        #      coverage gap.
        #
        # Previously this step described a third category — a real test
        # gap on arena_try_alloc_aligned line 510 (`p != NULL` not
        # covered false). That gap was closed by adding
        # test_try_alloc_aligned_failure to arena_test.c. Line 510 now
        # reports 4/4, matching line 485 (arena_try_alloc's compound
        # return).
        #
        # Cross-stream evidence (VERIFY-009 + MCDC-003):
        #   VERIFY-009 separately documents that WP verifies the
        #   arena_invariant predicate is preserved across all alloc
        #   paths, and that arena_invariant entails capacity <=
        #   CANON_ARENA_MAX_SIZE, which is the substrate fact used to
        #   establish the line 346/401 cond-0 unreachability. The
        #   line 346/401 cond-1 unreachability is purely mathematical
        #   (independent of any constant), so WP does not need to
        #   discharge it specifically — it falls out of usize
        #   arithmetic alone. This is the same cross-stream evidence
        #   pattern slice.h's MCDC-002 established (gcov reports
        #   uncovered, WP proves unreachable, both streams consistent).
        #
        # This step remains in place as a regression detector. If a new
        # function is added without corresponding tests, or if any of
        # the previously-closed reachable gaps regress, the output will
        # show which conditions drop below the documented baseline.
        run: |
          cd build

          ARENA_GCDA=$(find . -name "arena_test*.gcda" | head -1)

          if [ -z "$ARENA_GCDA" ]; then
            echo "ERROR: could not locate arena_test gcda file"
            find . -name "*.gcda" | head -20
            exit 1
          fi

          echo "Running gcov on: $ARENA_GCDA"
          gcov-14 --conditions --all-blocks "$ARENA_GCDA" 2>&1 | \
            grep -A 200 "arena.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for arena.h ==="
          find . -name "arena.h.gcov" -exec echo "Found: {}" \;

          ARENA_GCOV=$(find . -name "arena.h.gcov" | head -1)
          if [ -n "$ARENA_GCOV" ]; then
            echo ""
            echo "=== Full contents of $ARENA_GCOV ==="
            cat "$ARENA_GCOV"
          else
            echo "No arena.h.gcov file generated — trying alternative approach"
            for d in $(find . -type d -name "*.dir"); do
              ls "$d"/*arena* 2>/dev/null || true
            done
          fi
      
      - name: Generate HTML coverage report
        run: |
          genhtml coverage.info \
            --output-directory coverage_html \
            --branch-coverage \
            --title "Canon-C MC/DC Coverage" \
            --legend \
            --demangle-cpp \
            --ignore-errors unused

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage_html/
            build/mcdc_per_file.txt

      - name: Print branch coverage summary
        run: |
          echo "==============================================="
          echo "  Canon-C Branch Coverage Summary"
          echo "==============================================="
          lcov --summary coverage.info \
            --rc branch_coverage=1
          echo "==============================================="

      - name: Enforce coverage threshold
        run: |
          BRANCH_COV=$(lcov --summary coverage.info \
            --rc branch_coverage=1 2>&1 | \
            grep "branches" | grep -oP '[\d.]+%' | head -1 | tr -d '%')

          echo "Branch coverage: ${BRANCH_COV}%"

          if [ -f build/mcdc_summary.txt ]; then
            MCDC_COV=$(head -1 build/mcdc_summary.txt)
            echo "MC/DC coverage:  ${MCDC_COV}%"
          fi

          # Threshold progression plan:
          #   Phase 1 (complete): 70% — baseline established
          #   Phase 2 (current):  80% — post-bits.h and compare.h verification
          #   Phase 3:            90% — certification readiness (DO-178C Level C)
          #   Phase 4:            95%+ — certification readiness (DO-178C Level A/B)
          THRESHOLD=80

          if [ "$(echo "${BRANCH_COV} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "FAIL: Branch coverage ${BRANCH_COV}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "PASS: Branch coverage ${BRANCH_COV}% meets threshold ${THRESHOLD}%"
          fi

  # -------------------------------------------------------------------------
  # 7. MISRA C:2012 advisory analysis (Linux only)
  #
  #    Uses Cppcheck's MISRA addon for preliminary compliance checking.
  #    This is NOT a qualified MISRA checker — it covers approximately
  #    60-70% of MISRA C:2012 rules. For certification, replace with
  #    a qualified tool: Polyspace, LDRA, PC-lint, or Parasoft C/C++test.
  #
  #    This job is advisory — it does not fail the build. Its purpose
  #    is to track MISRA compliance progress and identify deviations
  #    that must be documented in docs/deviations.md.
  #
  #    Suppressions:
  #      - misra-config:*_impl.h — macro-templated implementation headers
  #        (hashmap_impl.h, deque_impl.h, etc.) emit [misra-config]
  #        errors because Cppcheck cannot resolve macro-instantiated
  #        type names (e.g. HASHMAP_SLOT_NAME) without an instantiation
  #        context. This is a tool limitation, not a code defect.
  #        Qualified MISRA checkers handle this correctly via full
  #        preprocessor-aware analysis.
  # -------------------------------------------------------------------------
  misra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run MISRA C:2012 analysis on library headers
        shell: bash
        run: |
          HEADERS=$(find \
            "${{ github.workspace }}/core" \
            "${{ github.workspace }}/semantics" \
            "${{ github.workspace }}/data" \
            "${{ github.workspace }}/algo" \
            "${{ github.workspace }}/util" \
            -name "*.h" -type f 2>/dev/null | sort)

          if [ -z "$HEADERS" ]; then
            echo "No header files found — skipping MISRA analysis"
            exit 0
          fi

          echo "Found $(echo "$HEADERS" | wc -l) header files to analyze"

          cppcheck \
            --addon=misra \
            --std=c99 \
            --language=c \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=misra-config:*_impl.h" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            $HEADERS \
            2>&1 | tee misra_report.txt

          echo ""
          echo "==============================================="
          echo "  MISRA C:2012 Summary"
          echo "==============================================="

          TOTAL=$(grep -c "\[misra-" misra_report.txt || true)
          echo "  Total violations: ${TOTAL}"
          echo ""
          echo "  NOTE: Rule category breakdown (Mandatory/Required/Advisory)"
          echo "  requires a MISRA rule lookup table and is not produced by"
          echo "  Cppcheck alone. For certification, use a qualified tool"
          echo "  (Polyspace, LDRA, PC-lint) that emits categorized output."
          echo ""
          echo "  Deviations documented in: docs/deviations.md"
          echo "==============================================="

          # Advisory only — does not fail the build.
          # When MISRA compliance is mature, uncomment to enforce:
          # if [ "${TOTAL}" -gt 0 ]; then
          #   echo "FAIL: ${TOTAL} MISRA violations found"
          #   exit 1
          # fi

      - name: Upload MISRA report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra_report.txt

  # -------------------------------------------------------------------------
  # 8. Lifetime-debug build — all platforms, Release + Debug
  #
  #    Builds and runs the full test suite with CANON_LIFETIME=debug,
  #    which defines CANON_LIFETIME_DEBUG project-wide. This activates:
  #      - lifetime_t lt field on Arena, Pool, DynString, every
  #        dynvec_T instantiation, and (Phase 3) smallvec instantiations
  #      - source_lt + captured_id fields on every borrow struct
  #      - _from_lifetime constructors capture the source's token
  #      - BORROW_LT_CHECK_ fires require_msg on every _get if the
  #        captured ID no longer matches the source's current ID
  #
  #    Matrix mirrors the default `build` job — same OS/compiler/
  #    build-type coverage. This catches:
  #      - MSVC vs GCC/Clang struct-padding differences for the
  #        embedded lifetime_t field
  #      - macOS Clang vs Linux Clang alignment behavior of uint64_t
  #        inside struct
  #      - Platform-specific pointer-size assumptions in the
  #        (region_id_t)(uintptr_t)&v ID derivation
  #      - Release-mode codegen differences when LIKELY/UNLIKELY hints
  #        interact with the additional fields
  #
  #    Sanitizers (ASan + UBSan) are enabled in Debug on Linux + macOS
  #    to catch any latent UB the lifetime instrumentation might
  #    introduce — e.g. a forgotten field initialiser leaving
  #    captured_id uninitialised, or pointer arithmetic that the
  #    additional fields perturb. MSVC builds skip ASan (DLL
  #    deployment limitation; see ENABLE_SANITIZERS in CMakeLists.txt).
  #
  #    Previously this job was Linux-Clang only — sufficient evidence
  #    when only arena and borrow embedded lifetime_t (Phase 1). After
  #    Phase 2 broadened the surface to five owning types plus all
  #    macro-generated dynvec instantiations, single-platform coverage
  #    was no longer adequate. The matrix expanded after Phase 2
  #    landed.
  # -------------------------------------------------------------------------
  lifetime-debug:
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS, CANON_LIFETIME=debug)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCANON_LIFETIME=debug \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows, CANON_LIFETIME=debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCANON_LIFETIME=debug `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
