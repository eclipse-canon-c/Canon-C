          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved (T+U): ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"
          if [ "${FAILED_COUNT}" -ne 0 ]; then
            echo "FAIL: ${FAILED_COUNT} goal(s) FAILED —"
            echo "      a contract in error.h is falsified:"
