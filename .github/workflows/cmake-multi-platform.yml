          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_bits_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_bits_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT))
          EXPECTED_UNPROVED=15
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
