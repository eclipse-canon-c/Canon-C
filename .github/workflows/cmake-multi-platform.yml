  #       run: |
  #         sudo apt-get update
  #         sudo apt-get install -y opam gcc
  #         opam init -y --disable-sandboxing --bare
  #         opam switch create frama-c ocaml-base-compiler.4.14.2
  #         eval $(opam env)
  #         opam install -y frama-c
  #         echo "$(opam var bin)" >> $GITHUB_PATH
  #
  #     # -- core/primitives — WP (contract proofs + RTE absence) ---------
  #     - name: "WP: core/primitives"
  #       run: |
  #         eval $(opam env --switch=frama-c)
  #         frama-c -wp -wp-rte \
  #           -wp-prover alt-ergo \
  #           -wp-timeout 30 \
  #           -warn-unsigned-overflow \
  #           -cpp-extra-args=" \
  #             -I core/primitives \
  #             -I core \
  #             -I . \
  #             -DCANON_NO_REQUIRE \
  #             -DNDEBUG \
  #             -D__GNUC__=0 \
  #             -UCANON_BITS_MSVC" \
  #           core/primitives/bits.h \
  #           core/primitives/checked.h \
  #           core/primitives/ptr.h \
  #           core/primitives/compare.h
  #
  #     # -- core/primitives — Eva (value range analysis) -----------------
  #     - name: "Eva: core/primitives"
  #       run: |
  #         eval $(opam env --switch=frama-c)
  #         frama-c -eva \
  #           -eva-precision 3 \
  #           -warn-unsigned-overflow \
  #           -cpp-extra-args=" \
  #             -I core/primitives \
  #             -I core \
  #             -I . \
  #             -DCANON_NO_REQUIRE \
  #             -DNDEBUG \
  #             -D__GNUC__=0 \
  #             -UCANON_BITS_MSVC" \
  #           core/primitives/bits.h \
  #           core/primitives/checked.h \
  #           core/primitives/ptr.h \
  #           core/primitives/compare.h
  #
  #     # -- core — WP ----------------------------------------------------
  #     # Uncomment when core/ headers are annotated with ACSL contracts
