name: Canon-C CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# ---------------------------------------------------------------------------
# Job overview
#
#   build           — all platforms, Release + Debug, sanitizers
#   build-32bit     — Linux GCC -m32, Release + Debug. Tier 1 size_t==32
#                     width boundary; exercises the 32-bit arithmetic claims.
#   mingw           — Windows MSYS2 UCRT64 (GCC), Release + Debug. The
#                     GCC-on-Windows pairing the build job excludes; tests
#                     the UCRT runtime / stdio format-specifier surface.
#   static-analysis — clang-tidy (Linux only) + Cppcheck (all platforms)
#   valgrind        — Linux only, Debug, memory error detection
#   fuzzing         — Linux only (libFuzzer runtime only reliable on Linux CI)
#   frama-c-*       — Linux only, formal verification (WP proofs). One job
#                     per verified header (frama-c-checked, -bits, -compare,
#                     -ptr, -slice, -memory, -arena, -pool, -region, -error),
#                     plus one per macro-module driver (frama-c-option,
#                     frama-c-result), which run over a driver in
#                     vmacros/vdrivers/ rather than a header directly
#                     (Shape-B modules). All run in parallel and share the
#                     composite setup action at .github/actions/framac-setup.
#                     All twelve are ENFORCED (hard proved/unproved
#                     baselines); region runs 120s/split
#                     in its own isolated job (long run, ~1h40m, but enforced).
#                     Additional headers are added as a new job each as they
#                     are annotated; macro-module drivers likewise.
#   coverage        — Linux only, MC/DC coverage via GCC 14 -fcondition-coverage
#                     Uses -DCANON_CHECKED_FORCE_FALLBACK and
#                     -DCANON_BITS_FORCE_FALLBACK so the fallback paths
#                     in checked.h and bits.h are measurable (builtins
#                     expand to single instructions with no branches for
#                     gcov to see).
#   misra           — Linux only, MISRA C:2012 advisory analysis
#   lifetime-debug  — All platforms, Release + Debug, compatible compilers.
#                     Builds and tests the suite with CANON_LIFETIME=debug
#                     to exercise the runtime lifetime-tracking path
#                     (CANON_LIFETIME_DEBUG). Sanitizers (ASan + UBSan)
#                     enabled in Debug on Linux + macOS to catch any UB
#                     the lifetime instrumentation might introduce.
#                     The matrix mirrors the default `build` job so the
#                     substrate is exercised under the same platform and
#                     compiler combinations: GCC + Clang on Linux, MSVC
#                     and Clang on Windows, Clang on macOS. Previously Linux-Clang
#                     only — expanded after Phase 2 (dynvec, dynstring,
#                     smallvec) embedded lifetime_t in five owning types
#                     plus all macro-generated dynvec instantiations,
#                     broadening the surface enough that single-platform
#                     evidence was no longer sufficient.
#
# NOTE — Dr. Memory (Windows memory checker) is intentionally omitted.
#   Dr. Memory crashes internally on Windows Server 2022 (the current
#   windows-latest runner, Build 26100) with an unrecoverable internal
#   fault at startup. This is a known upstream bug with no available fix
#   or workaround as of the time of writing. Memory safety on Windows is
#   covered by the MSVC build with /W4 /WX and by Valgrind on Linux.
#   Re-enable dr-memory when upstream ships a compatible release.
# ---------------------------------------------------------------------------

jobs:

  # -------------------------------------------------------------------------
  # 1. Build + test — all platforms, Release and Debug
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc

    steps:
      - uses: actions/checkout@v6

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 1b. 32-bit build + test — Linux GCC -m32
  #
  #    Exercises the width axis nothing else in the matrix hits: on -m32,
  #    size_t is EXACTLY 32 bits (CANON_USIZE_MAX == 2^32-1), the minimum
  #    Tier 1 promises to support. This is where the arena overflow-guard
  #    unreachability argument (MCDC-003 / VERIFY-009, which reasons "on
  #    both 32-bit and 64-bit platforms") actually runs, instead of being
  #    asserted from a 64-bit-only matrix.
  #
  #    Sanitizers OFF: -m32 ASan/UBSan need the 32-bit runtime libs and are
  #    historically flaky to stand up. Once green, -m32 UBSan (the higher-
  #    value one for width-dependent overflow/shift UB) can be a follow-up.
  # -------------------------------------------------------------------------
  build-32bit:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v6

      - name: Install 32-bit GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Configure CMake (-m32)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_FLAGS="-m32" \
            -DCMAKE_EXE_LINKER_FLAGS="-m32" \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # 1c. MinGW build + test — Windows, MSYS2 UCRT64 (GCC-on-Windows)
  #
  #    Fills the one (compiler, OS) pairing the `build` job excludes that
  #    has a large real-world user base: the MSYS2/MinGW-w64 toolchain.
  #    The compiler frontend is already covered by Linux GCC; the value
  #    here is the C RUNTIME — UCRT instead of glibc. This is where the
  #    classic C99 format-specifier landmine lives: usize is size_t, and
  #    %zu / %llu against the wrong Windows CRT misbehaves. UCRT64 is the
  #    correct, fixed target; this cell proves the stdio surface (contract
  #    handler, diag.h, log.h, snprintf formatters) is sound on a Windows
  #    libc under -Wall -Wextra -Wpedantic -Werror.
  #
  #    Sanitizers OFF: ASan/UBSan support on MinGW is limited. Windows
  #    memory safety remains covered by the MSVC /W4 /WX build and by
  #    Valgrind on Linux.
  #
  #    Notes on the invocation:
  #      - Ninja is used (the path of least resistance inside the msys2
  #        shell). It is a single-config generator, so the build type is
  #        fixed at configure time — that is why the Build and Test steps
  #        do not pass --config / --build-config like the multi-config jobs.
  #      - -S . (not ${{ github.workspace }}) because the Windows workspace
  #        path with backslashes confuses the msys2 bash shell; "." resolves
  #        cleanly from the checkout directory.
  # -------------------------------------------------------------------------
  mingw:
    needs: build
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_SANITIZERS=OFF \
            -S .

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  # -------------------------------------------------------------------------
  # 2. Static analysis
  # -------------------------------------------------------------------------
  static-analysis:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install clang-tidy and Cppcheck (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Install Cppcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cppcheck

      - name: Install Cppcheck (Windows)
        # Pinned direct download from the official GitHub release —
        # same pattern as the CVC5 install in framac-setup, for the
        # same reason: deterministic tool versions. winget was removed
        # after 0x8a15000f stale-source failures on hosted runners
        # (winget depends on msstore source state the runner images
        # don't reliably ship). Note: the repo has moved to
        # cppcheck-opensource/cppcheck; GitHub redirects danmar/ URLs.
        # Bump $Version deliberately — cppcheck version changes can
        # move findings, so re-check suppressions when bumping.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $Version  = "2.19.0"
          $Checksum = "AAC15F6DC2B404B3B2562015419F11D91F391E686279CABD20627A8435782128"
          $Url = "https://github.com/danmar/cppcheck/releases/download/$Version/cppcheck-$Version-x64-Setup.msi"

          Invoke-WebRequest -Uri $Url -OutFile cppcheck.msi
          $Actual = (Get-FileHash cppcheck.msi -Algorithm SHA256).Hash
          if ($Actual -ne $Checksum) {
            Write-Error "cppcheck MSI checksum mismatch. Expected $Checksum, got $Actual"
            exit 1
          }

          Start-Process msiexec.exe -ArgumentList '/i','cppcheck.msi','/qn','/norestart' -Wait

          $Exe = Get-ChildItem "C:\Program Files\Cppcheck" -Filter "cppcheck.exe" `
            -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $Exe) {
            Write-Error "cppcheck.exe not found after MSI install"
            exit 1
          }
          Add-Content $env:GITHUB_PATH $Exe.DirectoryName
          & $Exe.FullName --version

      - name: Configure CMake for compile_commands.json (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -S "${{ github.workspace }}"

      - name: Run clang-tidy (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          SKIP="dynstring_test.c dynvec_test.c"
          FILES=""
          for f in $(find "${{ github.workspace }}/test" -name "*.c" 2>/dev/null | sort); do
            if ! grep -qE '[^[:space:]]' "$f"; then continue; fi
            BASENAME=$(basename "$f")
            SKIP_THIS=0
            for s in $SKIP; do
              if [ "$BASENAME" = "$s" ]; then SKIP_THIS=1; break; fi
            done
            if [ "$SKIP_THIS" = "1" ]; then continue; fi
            FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No files to analyse — skipping clang-tidy"
            exit 0
          fi

          CHECKS="\
          bugprone-integer-division,\
          bugprone-macro-parentheses,\
          bugprone-misplaced-widening-cast,\
          bugprone-signed-char-misuse,\
          bugprone-sizeof-expression,\
          bugprone-suspicious-memset-usage,\
          bugprone-too-small-loop-variable,\
          bugprone-undefined-memory-manipulation,\
          clang-analyzer-core.CallAndMessage,\
          clang-analyzer-core.DivideZero,\
          clang-analyzer-core.NullDereference,\
          clang-analyzer-core.UndefinedBinaryOperatorResult,\
          clang-analyzer-core.uninitialized.Assign,\
          clang-analyzer-core.uninitialized.Branch,\
          clang-analyzer-deadcode.DeadStores,\
          clang-analyzer-security.insecureAPI.strcpy,\
          misc-misplaced-const,\
          misc-redundant-expression,\
          misc-unused-parameters"

          clang-tidy \
            -p build \
            --checks="-*,$CHECKS" \
            --warnings-as-errors="$CHECKS" \
            --extra-arg="-I${{ github.workspace }}/core/primitives" \
            --extra-arg="-I${{ github.workspace }}/core" \
            --extra-arg="-I${{ github.workspace }}" \
            $FILES

      - name: Run Cppcheck (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cppcheck \
            --enable=warning \
            --std=c99 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=returnDanglingLifetime:*slice_test.c" \
            "--suppress=returnDanglingLifetime:*borrow_test.c" \
            "--suppress=returnDanglingLifetime:*array_test.c" \
            "--suppress=returnDanglingLifetime:*any_all_test.c" \
            "--suppress=returnDanglingLifetime:*filter_test.c" \
            "--suppress=returnDanglingLifetime:*find_test.c" \
            "--suppress=returnDanglingLifetime:*fold_test.c" \
            "--suppress=returnDanglingLifetime:*map_test.c" \
            "--suppress=returnDanglingLifetime:*reverse_test.c" \
            "--suppress=returnDanglingLifetime:*search_test.c" \
            "--suppress=returnDanglingLifetime:*sort_test.c" \
            "--suppress=returnDanglingLifetime:*unique_test.c" \
            "--suppress=literalWithCharPtrCompare:*diag_test.c" \
            "--suppress=arrayIndexOutOfBounds:*diag.h" \
            "--suppress=ctunullpointer:*deque_test.c" \
            "--suppress=ctunullpointer:*vec_test.c" \
            "--suppress=ctunullpointer:*hashmap_test.c" \
            "--suppress=ctunullpointer:*queue_test.c" \
            "--suppress=ctunullpointer:*stack_test.c" \
            "--suppress=ctunullpointer:*array_test.c" \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            "${{ github.workspace }}/test"

      - name: Run Cppcheck (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cppcheck `
            --enable=warning `
            --std=c99 `
            --error-exitcode=1 `
            --suppress=missingIncludeSystem `
            --suppress=toomanyconfigs `
            "--suppress=returnDanglingLifetime:*slice_test.c" `
            "--suppress=returnDanglingLifetime:*borrow_test.c" `
            "--suppress=returnDanglingLifetime:*array_test.c" `
            "--suppress=returnDanglingLifetime:*any_all_test.c" `
            "--suppress=returnDanglingLifetime:*filter_test.c" `
            "--suppress=returnDanglingLifetime:*find_test.c" `
            "--suppress=returnDanglingLifetime:*fold_test.c" `
            "--suppress=returnDanglingLifetime:*map_test.c" `
            "--suppress=returnDanglingLifetime:*reverse_test.c" `
            "--suppress=returnDanglingLifetime:*search_test.c" `
            "--suppress=returnDanglingLifetime:*sort_test.c" `
            "--suppress=returnDanglingLifetime:*unique_test.c" `
            "--suppress=literalWithCharPtrCompare:*diag_test.c" `
            "--suppress=arrayIndexOutOfBounds:*diag.h" `
            "--suppress=ctunullpointer:*deque_test.c" `
            "--suppress=ctunullpointer:*vec_test.c" `
            "--suppress=ctunullpointer:*hashmap_test.c" `
            "--suppress=ctunullpointer:*queue_test.c" `
            "--suppress=ctunullpointer:*stack_test.c" `
            "--suppress=ctunullpointer:*array_test.c" `
            -I "${{ github.workspace }}/core/primitives" `
            -I "${{ github.workspace }}/core" `
            -I "${{ github.workspace }}/semantics" `
            -I "${{ github.workspace }}/data" `
            -I "${{ github.workspace }}/algo" `
            -I "${{ github.workspace }}/util" `
            -I "${{ github.workspace }}" `
            "${{ github.workspace }}/test"

  # -------------------------------------------------------------------------
  # 3. Valgrind — Linux only
  # -------------------------------------------------------------------------
  valgrind:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Configure CMake (no sanitizers — conflicts with Valgrind)
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Test under Valgrind
        working-directory: build
        run: |
          ctest \
            --build-config Debug \
            --output-on-failure \
            --overwrite MemoryCheckCommand=$(which valgrind) \
            --overwrite MemoryCheckCommandOptions="--error-exitcode=1 --leak-check=full --track-origins=yes --show-leak-kinds=all" \
            -T memcheck

  # -------------------------------------------------------------------------
  # 4. Fuzzing — Linux only
  # -------------------------------------------------------------------------
  fuzzing:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Clang with libFuzzer runtime
        run: sudo apt-get install -y clang

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_FUZZING=ON \
            -S "${{ github.workspace }}"

      - name: Build fuzz targets
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config Debug

      - name: Run fuzz targets
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config Debug --output-on-failure

  # =========================================================================
  # 5. Formal verification — Frama-C (Linux only)
  #
  #   The single monolithic `frama-c` job has been split into one job per
  #   verified header. Each job:
  #       checkout  ->  uses: ./.github/actions/framac-setup  ->  WP wrapper  ->  upload
  #   The composite action reproduces the six setup steps (opam, cvc5, why3)
  #   that the jobs share; the opam switch is cached on a key all jobs use,
  #   so only the first cold job builds it and the rest restore in ~30s.
  #
  #   Why per-header jobs instead of one serial job: steps within a job run
  #   serially, separate jobs run in parallel. The workflow now gates on the
  #   slowest single header (~pool) instead of the sum of all of them, which
  #   keeps every header comfortably under GitHub's 6h per-job ceiling.
  #   Enforcement is unchanged — each WP step proves the same translation unit
  #   against the same baseline regardless of which job hosts it.
  #
  #   ENFORCED (hard proved/unproved baselines): checked, bits, compare, ptr,
  #   slice, memory, arena, pool, region, error, option. Region runs 120s/split
  #   in its own isolated job (long run, ~1h40m) but is enforced like the rest.
  #
  #   Eva is intentionally NOT run on these headers: Eva needs an entry point
  #   to anchor abstract interpretation, and these are header-only modules of
  #   static inline functions with no main(). WP proves the contracts and the
  #   absence of runtime errors for every function independently, so Eva is
  #   not needed. When Canon-C grows real translation units (verification
  #   driver files for macro-instantiated modules, or test files compiled as
  #   standalone programs), Eva can run on those.
  #
  #   Provers: Alt-Ergo 2.6.3 + Z3 4.15.2 + CVC5 1.2.1 (triple-prover). Every
  #   remaining unproved goal is demonstrated triple-prover-resistant. See the
  #   composite action for the install + why3 registration procedure.
  # =========================================================================

  frama-c-checked:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/framac-setup

      - name: "WP: core/primitives/checked.h"
        # WP is expected to leave exactly 2 goals unproven:
        #   typed_checked_add_overflow_ensures
        #   typed_checked_add_u64_overflow_ensures
        # Both are 64-bit unsigned add wraparound assertions that the
        # triple-prover setup (Alt-Ergo 2.6.3 + Z3 4.15.2 + CVC5 1.2.1)
        # cannot discharge in WP's integer memory model. They are
        # discharged manually by a modular-arithmetic argument recorded
        # in docs/verification.md under "Manually discharged goals".
        # The wrapper below verifies WP fails on EXACTLY these two
        # goals — any other failure is a regression and fails the job.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/primitives/checked.h 2>&1 | tee wp_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_output.txt || true)
          echo "  ${PROVED_LINE}"

          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_output.txt || true)
          EXPECTED_TIMEOUTS=2
          echo "  Timeouts observed: ${TIMEOUT_COUNT} (expected ${EXPECTED_TIMEOUTS})"

          if [ "${TIMEOUT_COUNT}" -ne "${EXPECTED_TIMEOUTS}" ]; then
            echo "FAIL: unexpected number of timeouts."
            echo "      Expected exactly ${EXPECTED_TIMEOUTS} (the manually discharged goals)."
            echo "      See docs/verification.md for details."
            exit 1
          fi

          EXPECTED_GOAL_1="typed_checked_add_overflow_ensures"
          EXPECTED_GOAL_2="typed_checked_add_u64_overflow_ensures"

          if ! grep -q "${EXPECTED_GOAL_1}" wp_output.txt; then
            echo "FAIL: expected timeout on ${EXPECTED_GOAL_1} not observed."
            exit 1
          fi
          if ! grep -q "${EXPECTED_GOAL_2}" wp_output.txt; then
            echo "FAIL: expected timeout on ${EXPECTED_GOAL_2} not observed."
            exit 1
          fi

          echo "PASS: WP discharged all goals automatically except the 2 manually"
          echo "      verified obligations documented in docs/verification.md."
          echo "==============================================="

      - name: Upload WP proof output (checked.h)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wp-proof-checked
          path: wp_output.txt

  frama-c-bits:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/framac-setup

      - name: "WP: core/primitives/bits.h"
        # WP is expected to leave exactly 15 goals unproven (as Timeout
        # or Unknown — WP may classify the same goal differently across
        # runs depending on solver heuristics).
        # These are all WP model limitations on bitwise reasoning — not
        # code defects. Categories:
        #   - Bitwise complement (~) in specs: bits_clear, bits_insert (3)
        #   - SWAR popcount magic constants: bits_popcount (1)
        #   - Rotation shift RTE + spec |: bits_rotl, bits_rotr (4)
        #   - Minimality through bit-smearing: bits_next_power_of_two (4)
        #   - Byte swap signed overflow + spec: bits_bswap16/32/64 (3)
        # All 15 are documented in docs/verification.md and deviations.md.
        # The wrapper below verifies WP fails on EXACTLY these 15 goals —
        # any additional failure is a regression and fails the job.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/primitives/bits.h 2>&1 | tee wp_bits_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP (bits.h) exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_bits_output.txt || true)
          echo "  ${PROVED_LINE}"

          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_bits_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_bits_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT))
          EXPECTED_UNPROVED=15
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md for details."
            exit 1
          fi

          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          echo "  Proved: ${PROVED_COUNT}"
          if [ "${PROVED_COUNT}" != "746 / 761" ]; then
            echo "WARNING: proved count changed from expected 746 / 761."
            echo "         This may indicate a new timeout or a newly proved goal."
            echo "         Review the output and update the enforcement wrapper."
          fi

          CHECKS=(
            "typed_bits_clear_ensures"
            "typed_bits_popcount_ensures"
            "typed_bits_rotl_nonzero_shift_ensures"
            "typed_bits_next_power_of_two_normal_ensures"
            "typed_bits_bswap16_assert_rte_signed_overflow"
            "typed_bits_bswap64_ensures"
          )

          for goal in "${CHECKS[@]}"; do
            if ! grep -qE "\[(Timeout|Unknown)\].*${goal}" wp_bits_output.txt; then
              echo "FAIL: expected unproved goal ${goal} not observed."
              exit 1
            fi
          done

          echo "PASS: WP discharged all goals automatically except the 15"
          echo "      documented unproved goals. See docs/verification.md."
          echo "==============================================="

      - name: Upload WP proof output (bits.h)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: wp-proof-bits
          path: wp_bits_output.txt

