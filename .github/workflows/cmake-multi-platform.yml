  # -------------------------------------------------------------------------
  # 7. MISRA C:2012 advisory analysis (Linux only)
  #
  #    Uses Cppcheck's MISRA addon for preliminary compliance checking.
  #    This is NOT a qualified MISRA checker — it covers approximately
  #    60-70% of MISRA C:2012 rules. For certification, replace with
  #    a qualified tool: Polyspace, LDRA, PC-lint, or Parasoft C/C++test.
  #
  #    Findings are advisory — real violations do not fail the build.
  #    Their purpose is to track MISRA compliance progress and identify
  #    deviations that must be documented in docs/deviations.md
  #    (inline via `cppcheck-suppress misra-c2012-X.Y` comments,
  #    honored through --inline-suppr).
  #
  #    The INSTRUMENT, however, is enforced: canary/misra_canary.h
  #    contains intentional violations, and the job FAILS if they are
  #    not detected. Rationale: cppcheck emits MISRA addon findings at
  #    "style" severity, which is silently discarded without
  #    --enable=style — this job previously reported "0 violations"
  #    for that exact reason while the addon's findings were being
  #    filtered out. The canary makes any such silent breakage of the
  #    toolchain (severity filtering, addon resolution, packaging
  #    changes) a hard failure instead of a fake-green zero.
  #
  #    PROJECT-WIDE RULE DEVIATIONS — each maps 1:1 to a record in
  #    docs/deviations.md (do not add a suppression without one):
  #      15.5        MISRA-DEV-001  early-return guard-clause style
  #      2.5         MISRA-DEV-002  standalone-TU unused-macro artifact
  #      20.10       MISRA-DEV-003  ## is the type-instantiation mechanism
  #      3.1         MISRA-DEV-004  // and /* inside doc comments (URLs)
  #      5.6/5.8/5.9 MISRA-DEV-005  instantiation-header identifier artifact
  #      11.5        MISRA-DEV-006  void* generic interface level
  #      20.5        MISRA-DEV-007  #undef template-parameter cleanup
  #      18.4        MISRA-DEV-008  bounded slice/string pointer arithmetic
  #      17.1        MISRA-DEV-009  stdarg in fmt/log entry points (Tier 2)
  #      11.6        MISRA-DEV-010  uintptr_t alignment round-trips
  #                                 (same sites as VERIFY-006/-008)
  #    CANARY INTERACTION: the canary relies on rules 21.6, 14.4/15.1,
  #    and 10.1 — none of which may be added to the list above without
  #    path-scoping the suppression, or the self-test goes blind.
  #
  #    PER-LINE MASKING (measured property of cppcheck's misra output):
  #    at most one misra violation is reported per source line, so a
  #    line violating several rules shows only one until that one is
  #    suppressed or fixed — then the next surfaces. All counts in this
  #    job and in the MISRA-DEV records are counts of VISIBLE findings
  #    under the then-active suppression set, i.e. lower bounds. The
  #    1672-finding baseline unmasked 224 shadowed findings when the
  #    892 deviation-covered findings were suppressed (-> 1004).
  #
  #    Suppressions (tool limitations):
  #      - misra-config:*_impl.h — macro-templated implementation headers
  #        (hashmap_impl.h, deque_impl.h, etc.) emit [misra-config]
  #        errors because Cppcheck cannot resolve macro-instantiated
  #        type names (e.g. HASHMAP_SLOT_NAME) without an instantiation
  #        context. This is a tool limitation, not a code defect
  #        (MISRA-CFG-001). Qualified MISRA checkers handle this
  #        correctly via full preprocessor-aware analysis.
  # -------------------------------------------------------------------------
  misra:
    needs: build
    # PINNED RUNNER — not ubuntu-latest. The misra job's finding set is a
    # function of the cppcheck/misra-addon version, which comes from the
    # runner image's apt archive (24.04 -> cppcheck 2.13.0, newer images
    # -> 2.17+ with expanded MISRA coverage: rules 19.2/8.7/5.7 and
    # macro-body 15.6 descent). During the ubuntu-latest image migration
    # the label is nondeterministic and the Real count flips 780 <-> 1004
    # between pushes. Pin the image = pin the tool = stable baseline.
    # Bump this pin DELIBERATELY (same policy as the Windows cppcheck
    # $Version pin in static-analysis): re-baseline the counts, add/extend
    # deviation records for newly covered rules (19.2 union-backed result,
    # 5.7 instantiation-header tags -> MISRA-DEV-005, 15.6 grows to ~262,
    # 12.3 comma declarators, 8.7 standalone-TU linkage artifact), then
    # move the pin and the expected count in one acknowledged commit.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run MISRA C:2012 analysis on library headers
        shell: bash
        run: |
          HEADERS=$(find \
            "${{ github.workspace }}/core" \
            "${{ github.workspace }}/semantics" \
            "${{ github.workspace }}/data" \
            "${{ github.workspace }}/algo" \
            "${{ github.workspace }}/util" \
            "${{ github.workspace }}/canary" \
            -name "*.h" -type f 2>/dev/null | sort)
          if [ -z "$HEADERS" ]; then
            echo "No header files found — skipping MISRA analysis"
            exit 0
          fi
          echo "Found $(echo "$HEADERS" | wc -l) header files to analyze"
          echo "Toolchain: $(cppcheck --version)" | tee misra_toolchain.txt
          cppcheck \
            --addon=misra \
            --enable=style \
            --inline-suppr \
            --std=c99 \
            --language=c \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            "--suppress=misra-config:*_impl.h" \
            --suppress=misra-c2012-15.5 \
            --suppress=misra-c2012-2.5 \
            --suppress=misra-c2012-20.10 \
            --suppress=misra-c2012-3.1 \
            --suppress=misra-c2012-5.6 \
            --suppress=misra-c2012-5.8 \
            --suppress=misra-c2012-5.9 \
            --suppress=misra-c2012-11.5 \
            --suppress=misra-c2012-20.5 \
            --suppress=misra-c2012-18.4 \
            --suppress=misra-c2012-17.1 \
            --suppress=misra-c2012-11.6 \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            $HEADERS \
            2>&1 | tee misra_report.txt
          echo ""
          # ---- Instrument self-test: the canary MUST be flagged ----
          CANARY=$(grep -c "misra_canary\.h.*\[misra-" misra_report.txt || true)
          if [ "${CANARY}" -eq 0 ]; then
            echo "FAIL: MISRA self-test — canary violations not detected."
            echo "The addon is not producing output; any count is meaningless."
            exit 1
          fi
          TOTAL=$(grep -c "\[misra-" misra_report.txt || true)
          echo "==============================================="
          echo "  MISRA C:2012 Summary"
          echo "==============================================="
          echo "  Toolchain: $(cppcheck --version) (runner-pinned; see job comment)"
          echo "  Canary findings (expected >0): ${CANARY}"
          echo "  Total violations incl. canary: ${TOTAL}"
          echo "  Real violations:               $((TOTAL - CANARY))"
          echo ""
          echo "  Expected real count: 985 (pinned; cppcheck 2.13.0,"
          echo "  suppression set MISRA-DEV-001..011; 1004 - 19 rule-21.1"
          echo "  sites eliminated by the reserved-identifier rename sweep,"
          echo "  zero unmaskings, pre-verified by report diff)."
          echo ""
          echo "  NOTE — per-line masking: cppcheck reports at most ONE"
          echo "  misra violation per source line. Counts are therefore a"
          echo "  LOWER BOUND on (line, rule) pairs: suppressing or fixing"
          echo "  a rule can SURFACE previously shadowed violations on the"
          echo "  same lines (measured: suppressing 892 baseline findings"
          echo "  surfaced 224 shadowed ones, 1672 -> 1004, all 224"
          echo "  machine-verified as same-line unmaskings). A count that"
          echo "  RISES after cleanup work is surfacing, not regression —"
          echo "  diff the report artifact against the previous run before"
          echo "  concluding anything."
          echo ""
          echo "  Advisory only — real violations do not fail the build."
          echo ""
          echo "  NOTE: Rule category breakdown (Mandatory/Required/Advisory)"
          echo "  requires a MISRA rule lookup table and is not produced by"
          echo "  Cppcheck alone. For certification, use a qualified tool"
          echo "  (Polyspace, LDRA, PC-lint) that emits categorized output."
          echo ""
          echo "  Deviations documented in: docs/deviations.md"
          echo "  (MISRA-DEV-001..010 project-wide; MISRA-DEV-011 inline"
          echo "  at util/time.h; MISRA-CFG-001 tool)"
          echo "==============================================="
          # Real violations are advisory by design. When MISRA compliance
          # is mature, uncomment to enforce a zero-real-violations gate:
          # if [ "$((TOTAL - CANARY))" -gt 0 ]; then
          #   echo "FAIL: $((TOTAL - CANARY)) MISRA violations found"
          #   exit 1
          # fi
      - name: Upload MISRA report
        uses: actions/upload-artifact@v6
        with:
          name: misra-report
          path: |
            misra_report.txt
            misra_toolchain.txt
          
  # -------------------------------------------------------------------------
  # 8. Lifetime-debug build — all platforms, Release + Debug
  #
  #    Builds and runs the full test suite with CANON_LIFETIME=debug,
  #    which defines CANON_LIFETIME_DEBUG project-wide. This activates:
  #      - lifetime_t lt field on Arena, Pool, DynString, every
  #        dynvec_T instantiation, and (Phase 3) smallvec instantiations
  #      - source_lt + captured_id fields on every borrow struct
  #      - _from_lifetime constructors capture the source's token
  #      - BORROW_LT_CHECK_ fires require_msg on every _get if the
  #        captured ID no longer matches the source's current ID
  #
  #    Matrix mirrors the default `build` job — same OS/compiler/
  #    build-type coverage. This catches:
  #      - MSVC vs GCC/Clang struct-padding differences for the
  #        embedded lifetime_t field
  #      - macOS Clang vs Linux Clang alignment behavior of uint64_t
  #        inside struct
  #      - Platform-specific pointer-size assumptions in the
  #        (region_id_t)(uintptr_t)&v ID derivation
  #      - Release-mode codegen differences when LIKELY/UNLIKELY hints
  #        interact with the additional fields
  #
  #    Sanitizers (ASan + UBSan) are enabled in Debug on Linux + macOS
  #    to catch any latent UB the lifetime instrumentation might
  #    introduce — e.g. a forgotten field initialiser leaving
  #    captured_id uninitialised, or pointer arithmetic that the
  #    additional fields perturb. MSVC builds skip ASan (DLL
  #    deployment limitation; see ENABLE_SANITIZERS in CMakeLists.txt).
  #
  #    Previously this job was Linux-Clang only — sufficient evidence
  #    when only arena and borrow embedded lifetime_t (Phase 1). After
  #    Phase 2 broadened the surface to five owning types plus all
  #    macro-generated dynvec instantiations, single-platform coverage
  #    was no longer adequate. The matrix expanded after Phase 2
  #    landed.
  # -------------------------------------------------------------------------
  lifetime-debug:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: clang
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
    steps:
      - uses: actions/checkout@v6
      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
      - name: Configure CMake (Linux / macOS, CANON_LIFETIME=debug)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          SANITIZERS=OFF
          if [[ "${{ matrix.build_type }}" == "Debug" ]]; then
            SANITIZERS=ON
          fi
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCANON_LIFETIME=debug \
            -DENABLE_SANITIZERS=${SANITIZERS} \
            -S "${{ github.workspace }}"
      - name: Configure CMake (Windows, CANON_LIFETIME=debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sanitizers = if ("${{ matrix.build_type }}" -eq "Debug") { "ON" } else { "OFF" }
          cmake -B "${{ steps.strings.outputs.build-output-dir }}" `
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCANON_LIFETIME=debug `
            -DENABLE_SANITIZERS="$sanitizers" `
            -S "${{ github.workspace }}"
      - name: Build
        run: cmake --build "${{ steps.strings.outputs.build-output-dir }}" --config ${{ matrix.build_type }}
      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure
