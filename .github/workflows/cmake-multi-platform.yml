  #     #       -warn-unsigned-overflow \
  #     #       -cpp-extra-args=" \
  #     #         -I core/primitives \
  #     #         -I core \
  #     #         -I . \
  #     #         -DCANON_NO_REQUIRE \
  #     #         -DNDEBUG \
  #     #         -D__GNUC__=0 \
  #     #         -UCANON_BITS_MSVC" \
  #     #       core/arena.h \
  #     #       core/slice.h \
  #     #       core/memory.h \
  #     #       core/pool.h \
  #     #       core/region.h
  #     #
  #     # - name: "Eva: core"
