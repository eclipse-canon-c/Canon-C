      - name: "WP: core/primitives/ptr.h"
        # ptr.h uses Typed+Cast memory model for the same reason as
        # compare.h — the header performs void* to u8* casts for
        # byte-level pointer arithmetic. The default Typed memory
        # model rejects these casts; Typed+Cast allows them under
        # the same soundness argument as VERIFY-005.
        #
        # Expected result: 1729 / 1739 proved, exactly 10 unproved.
        # This baseline is confirmed stable under the triple-prover
        # configuration (Alt-Ergo 2.6.3 + Z3 4.15.2 + CVC5 1.2.1),
        # as of CI #791. The 10 unproved goals are all documented in
        # docs/deviations.md under VERIFY-006 with manual proof
        # arguments. They fall into four categories:
        #   - Transitive checked.h overflow (2): inherited from checked.h
        #     VERIFY-001 (the 64-bit unsigned add wraparound pair)
        #   - Align formula ensures (3): align_up_ensures,
        #     align_down_ensures, align_padding_ensures — WP integer
        #     theory cannot reason across bitwise AND with complement
        #   - ptr_align_* call-chain (3): call-site reconstruction of
        #     align_up / align_padding preconditions through pointer
        #     casts — Typed+Cast model limitation
        #   - Contract handler non-termination (2):
        #     contract_default_handler_loop_invariant_established,
        #     contract_default_handler_terminates — WP correctly
        #     identifies the while(1) loop as non-terminating; this is
        #     the intended ACSL idiom for a non-returning handler
        #
        # The wrapper below verifies WP fails on EXACTLY these 10 goals
        # with Proved = 1729/1739. Any deviation is a regression and
        # fails the job.
        run: |
          eval $(opam env --switch=frama-c)
          set +e
          frama-c -wp -wp-rte \
            -wp-model Typed+Cast \
            -wp-prover alt-ergo,z3,cvc5 \
            -wp-timeout 120 \
            -wp-split \
            -cpp-extra-args=" \
              -I core/primitives \
              -I core \
              -I . \
              -DCANON_NO_REQUIRE \
              -DNDEBUG" \
            core/primitives/ptr.h 2>&1 | tee wp_ptr_output.txt
          WP_EXIT=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "==============================================="
          echo "  WP (ptr.h) exit status: ${WP_EXIT}"
          echo "==============================================="

          PROVED_LINE=$(grep -E "^\[wp\] Proved goals:" wp_ptr_output.txt || true)
          echo "  ${PROVED_LINE}"

          # Count unproved goals: Timeout + Unknown + Failed.
          # WP may classify the same goal as either Timeout or Unknown
          # depending on solver heuristics per run.
          TIMEOUT_COUNT=$(grep -cE "^\[wp\] \[Timeout\]" wp_ptr_output.txt || true)
          UNKNOWN_COUNT=$(grep -cE "^\[wp\] \[Unknown\]" wp_ptr_output.txt || true)
          FAILED_COUNT=$(grep -cE "^\[wp\] \[Failed\]" wp_ptr_output.txt || true)
          UNPROVED_COUNT=$((TIMEOUT_COUNT + UNKNOWN_COUNT + FAILED_COUNT))
          EXPECTED_UNPROVED=10
          echo "  Timeouts: ${TIMEOUT_COUNT}"
          echo "  Unknown:  ${UNKNOWN_COUNT}"
          echo "  Failed:   ${FAILED_COUNT}"
          echo "  Total unproved: ${UNPROVED_COUNT} (expected ${EXPECTED_UNPROVED})"

          if [ "${UNPROVED_COUNT}" -ne "${EXPECTED_UNPROVED}" ]; then
            echo "FAIL: unexpected number of unproved goals."
            echo "      Expected exactly ${EXPECTED_UNPROVED} documented unproved goals."
            echo "      See docs/verification.md (ptr.h section) and"
            echo "      docs/deviations.md (VERIFY-006) for the full list."
            echo ""
            echo "Observed unproved goals:"
            grep -E "^\[wp\] \[(Timeout|Unknown|Failed)\]" wp_ptr_output.txt || true
            exit 1
          fi

          # Verify the proved count matches the stable triple-prover
          # baseline (1729 / 1739).
          PROVED_COUNT=$(echo "${PROVED_LINE}" | grep -oP '\d+ / \d+' | head -1 || true)
          echo "  Proved: ${PROVED_COUNT}"
          if [ "${PROVED_COUNT}" != "1729 / 1739" ]; then
            echo "WARNING: proved count changed from expected 1729 / 1739."
            echo "         This may indicate a new timeout or a newly proved goal."
            echo "         Review the output and update VERIFY-006 in"
            echo "         docs/deviations.md before updating this wrapper."
          fi

          # Spot-check representative goals from each unproved category.
          # These may appear as [Timeout], [Unknown], or [Failed] — check all.
          # Full list: see docs/deviations.md, entry VERIFY-006.
          CHECKS=(
            "typed_cast_checked_add_overflow_ensures"
            "typed_cast_checked_add_u64_overflow_ensures"
            "typed_cast_align_up_ensures"
            "typed_cast_align_down_ensures"
            "typed_cast_align_padding_ensures"
            "typed_cast_ptr_align_up_call_align_up_requires_3"
            "typed_cast_ptr_align_padding_call_align_padding_requires_3"
            "typed_cast_ptr_align_padding_nonnull_ensures_part2"
            "typed_cast_contract_default_handler_loop_invariant_established"
            "typed_cast_contract_default_handler_terminates"
          )

          for goal in "${CHECKS[@]}"; do
