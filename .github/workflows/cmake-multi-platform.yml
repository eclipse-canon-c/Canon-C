  # -------------------------------------------------------------------------
  # semantics/error.h — ENFORCED. First header of the semantics/ layer.
  #
  # error.h is a plain int-backed enum plus four pure lookup/predicate
  # functions. No void* casts, so it uses WP's DEFAULT Typed model (not
  # Typed+Cast like the core/ headers from compare.h onward). All four
  # functions are expected to prove fully automatically with ZERO residuals
  # (VERIFY-013) — the calibration baseline for the semantics/ layer.
  #
  # error_message carries the weak postcondition `\result != \null` that the
  # public contract actually guarantees, NOT full string validity. Asserting
  # valid_read_string(\result) would cross the libc strlen/valid_string
  # boundary documented in VERIFY-007 cat 2; the weak spec keeps error.h at
  # 0 residuals. See docs/verification.md, error.h section.
  # -------------------------------------------------------------------------
  frama-c-error:
