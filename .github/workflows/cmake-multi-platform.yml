  # at both timeouts, refuting time-starvation); pinned at {TODO: sha}
  # (CI #{TODO}, actions run 28967245082, 120s, 17m21s) after the trusted-
  # stdio-axiom alignment in diag.h closed 49 of the 59 (32 valid_fmt
  # caller obligations deleted by weakening the axiom requires to
  # format != \null; 17 rf_/r_terminated goals closed by the axiom's
