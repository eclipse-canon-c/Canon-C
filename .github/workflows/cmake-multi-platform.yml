  # -------------------------------------------------------------------------
  # 6. Coverage — branch coverage measurement (Linux only)
  #
  #    Measures branch-level coverage using gcov + lcov. This is a
  #    necessary subset of MC/DC (Modified Condition/Decision Coverage).
  #
  #    For true MC/DC required by DO-178C Level A/B:
  #    switch to gcc -fcondition-coverage (GCC 14+) when available on
  #    the CI runner, or use a commercial tool (VectorCAST, LDRA).
  #
  #    The HTML report artifact is uploadable certification evidence.
  #
  #    Certification evidence produced:
  #      - Branch coverage percentage (all standards)
  #      - Per-file coverage breakdown (auditor review)
  #      - Uncovered branch identification (test gap analysis)
  # -------------------------------------------------------------------------
  coverage:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Configure CMake with coverage instrumentation
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DENABLE_SANITIZERS=OFF \
            -S "${{ github.workspace }}"

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --build-config Debug --output-on-failure

      - name: Collect coverage data
        run: |
          lcov --capture \
            --directory build \
            --output-file coverage_raw.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

          # Remove test files — coverage is for Canon-C library headers
          # only, not test harnesses. --ignore-errors unused suppresses
          # errors when an exclude pattern matches nothing (e.g. /usr/*
          # is absent because headers are inlined into test TUs).
          lcov --remove coverage_raw.info \
            '/usr/*' \
            '*/test/*' \
            --output-file coverage.info \
            --rc branch_coverage=1 \
            --ignore-errors unused

      - name: Generate HTML coverage report
        run: |
          genhtml coverage.info \
            --output-directory coverage_html \
            --branch-coverage \
            --title "Canon-C Branch Coverage" \
            --legend \
            --demangle-cpp \
            --ignore-errors unused

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/

      - name: Print coverage summary
        run: |
          echo "==============================================="
          echo "  Canon-C Branch Coverage Summary"
          echo "==============================================="
          lcov --summary coverage.info \
            --rc branch_coverage=1
          echo "==============================================="

      - name: Enforce branch coverage threshold
        run: |
          BRANCH_COV=$(lcov --summary coverage.info \
            --rc branch_coverage=1 2>&1 | \
            grep "branches" | grep -oP '[\d.]+%' | head -1 | tr -d '%')

          echo "Branch coverage: ${BRANCH_COV}%"

          # Threshold progression plan:
          #   Phase 1 (current): 70% — establish baseline
          #   Phase 2: 80% — after gap analysis and test additions
          #   Phase 3: 90% — certification readiness
          #   Phase 4: 95%+ — full MC/DC with gcc -fcondition-coverage
          THRESHOLD=70

          if [ "$(echo "${BRANCH_COV} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "FAIL: Branch coverage ${BRANCH_COV}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "PASS: Branch coverage ${BRANCH_COV}% meets threshold ${THRESHOLD}%"
          fi

  # -------------------------------------------------------------------------
  # 7. MISRA C:2012 advisory analysis (Linux only)
  #
  #    Uses Cppcheck's MISRA addon for preliminary compliance checking.
  #    This is NOT a qualified MISRA checker — it covers approximately
  #    60-70% of MISRA C:2012 rules. For certification, replace with
  #    a qualified tool: Polyspace, LDRA, PC-lint, or Parasoft C/C++test.
  #
  #    This job is advisory — it does not fail the build. Its purpose
  #    is to track MISRA compliance progress and identify deviations
  #    that must be documented in docs/misra_deviations.md.
  #
  #    NOTE: Canon-C is header-only. Cppcheck scans .c files by default
  #    when given a directory. We use find to locate .h files explicitly.
  #
  #    Certification evidence produced:
  #      - MISRA violation report (all safety standards)
  #      - Deviation tracking (auditor review)
  # -------------------------------------------------------------------------
  misra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run MISRA C:2012 analysis on library headers
        shell: bash
        run: |
          # Canon-C is header-only — find all .h files in library
          # directories. Test files are excluded (they intentionally
          # violate MISRA rules for boundary testing).
          HEADERS=$(find \
            "${{ github.workspace }}/core" \
            "${{ github.workspace }}/semantics" \
            "${{ github.workspace }}/data" \
            "${{ github.workspace }}/algo" \
            "${{ github.workspace }}/util" \
            -name "*.h" -type f 2>/dev/null | sort)

          if [ -z "$HEADERS" ]; then
            echo "No header files found — skipping MISRA analysis"
            exit 0
          fi

          echo "Found $(echo "$HEADERS" | wc -l) header files to analyze"

          cppcheck \
            --addon=misra \
            --std=c99 \
            --language=c \
            --suppress=missingIncludeSystem \
            --suppress=toomanyconfigs \
            -I "${{ github.workspace }}/core/primitives" \
            -I "${{ github.workspace }}/core" \
            -I "${{ github.workspace }}/semantics" \
            -I "${{ github.workspace }}/data" \
            -I "${{ github.workspace }}/algo" \
            -I "${{ github.workspace }}/util" \
            -I "${{ github.workspace }}" \
            $HEADERS \
            2>&1 | tee misra_report.txt

          echo ""
          echo "==============================================="
          echo "  MISRA C:2012 Summary"
          echo "==============================================="

          TOTAL=$(grep -c "\[misra-" misra_report.txt 2>/dev/null || echo "0")
          REQUIRED=$(grep -c "Required" misra_report.txt 2>/dev/null || echo "0")
          ADVISORY=$(grep -c "Advisory" misra_report.txt 2>/dev/null || echo "0")
          MANDATORY=$(grep -c "Mandatory" misra_report.txt 2>/dev/null || echo "0")

          echo "  Total violations:     ${TOTAL}"
          echo "  Mandatory:            ${MANDATORY}"
          echo "  Required:             ${REQUIRED}"
          echo "  Advisory:             ${ADVISORY}"
          echo ""
          echo "  Deviations documented in: docs/misra_deviations.md"
          echo "==============================================="

          # Advisory only — do not fail the build.
          # When MISRA compliance is mature, uncomment to enforce:
          # if [ "${MANDATORY}" -gt 0 ]; then
          #   echo "FAIL: ${MANDATORY} mandatory MISRA violations found"
          #   exit 1
          # fi

      - name: Upload MISRA report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra_report.txt
