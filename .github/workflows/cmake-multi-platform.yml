  # -------------------------------------------------------------------------
  # borrow.h — ENFORCED, 120s / -wp-split.
  #
  # First verified header in semantics/ with in-place contracts, and the
  # project's first hybrid Shape-A/Shape-B header: the 24 non-macro
  # functions (borrowed_ptr x6, borrowed_str x9, borrowed_bytes x9) carry
  # ACSL and are verified here; DEFINE_BORROWED_SLICE is outside the
  # verified surface, parked with the other single-file macro families in
  # docs/vmacros.md (DEFINE_SLICE precedent: documented + tested, not
  # WP-verified).
  #
  # Verified configuration is the default build (CANON_LIFETIME off,
  # -DCANON_NO_REQUIRE -DNDEBUG): the BORROW_LT_* macros expand to nothing,
  # so WP sees the exact shipped bodies of the ABI guarantee. The
  # lifetime-debug path is runtime-only by construction (OWN-001 §7) and
  # stays covered by borrow_test.c across the CI matrix, including the
  # OWN-002 double-reset regression guards.
  #
  # Composability check #6 — CONFIRMED: the TU's substrate is checked.h +
  # slice.h (no ptr.h, no memory.h — slice.h does not pull them), and the
  # inherited surface is exactly 17 goals re-emitted byte-identically:
  # slice.h's 15 (VERIFY-007/-012) + checked.h's 2 (VERIFY-002, prefix
  # flipped typed_ -> typed_cast_ under this TU's model). Own residuals:
  # exactly 2, both on borrowed_bytes_eq's memcmp call site (the only
  # direct libc call in the header) — the danglingness_s1/s2 pair; the
  # valid_s1/s2 and initialization goals closed via the day-one guarded
  # \valid_read/\initialized requires. Zero function-pointer residuals:
  # borrow.h has no combinators or hooks — the first downstream header
  # since error.h to add no new residual class at all.
  #
  # Cross-stream tie-in: gcov reports borrow.h at 38/40 MC/DC (95.0%,
  # CI #1106) with exactly 2 outcomes open — the NULL-true sides of the
  # one-NULL guard in borrowed_bytes_eq. The named goal dead_by_invariant
  # (an /*@ assert \false */ inside that guard) PROVED at CI #1110 under
  # cbytes_invariant, completing the MCDC-008 cross-stream record
  # (MCDC-002 shape, seventh instance, first in semantics/, first carried
  # by a named assert). This job's proved-set check on dead_by_invariant
  # is the proof-stream regression detector; the per-line coverage debug
  # step in the coverage job is the measurement-stream one.
  #
  # Promoted from report-only to enforced as of {TODO: promotion CI #}
  # (VERIFY-016/MCDC-008 landed in the same PR): report-only first at
  # 383bf9f (CI #1109, 27 unproved — the final 19 plus 8 call-site
  # chaining goals from slice.h contracts mirrored by shape); aligned to
  # slice.h's real clauses at 262a503 (CI #1110): 2433/2452 proved,
  # exactly 19 unproved (17 inherited + 2 own), 0 Unknown, 0 Failed,
  # zero outside prediction, dead_by_invariant proved. The 19 are the
  # identical named subset of #1109's 27 — name-stable across both runs.
  # No timeout-minutes override: this TU is slice.h-sized, not
  # region.h-sized — the default job budget is ample.
  # -------------------------------------------------------------------------
  frama-c-borrow:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/framac-setup
      - name: "WP: semantics/borrow.h"
        # borrow.h — Typed+Cast. Expected: 2433 / 2452 proved, exactly 19
        # unproved (VERIFY-016): 17 inherited (slice.h's full 15-goal
        # surface incl. the contract.h handler pair, + checked.h's 2 with
        # the typed_ -> typed_cast_ prefix flip) + 2 borrow-own (memcmp
        # danglingness at borrowed_bytes_eq, the header's only libc call).
        # Also enforces the MCDC-008 closure: the named in-body assert
        # dead_by_invariant must remain in the proved set. Any deviation
        # is a regression.
        #
        # First hybrid Shape-A/Shape-B header: the 24 non-macro functions
        # are annotated in place (slice.h-style); DEFINE_BORROWED_SLICE is
        # outside the verified surface (docs/vmacros.md). Verified
        # configuration is the default build (CANON_LIFETIME off,
        # -DCANON_NO_REQUIRE -DNDEBUG) — the exact shipped bodies of the
        # ABI guarantee; the lifetime-debug path stays runtime-verified by
        # borrow_test.c across the CI matrix (OWN-001 §7).
        #
