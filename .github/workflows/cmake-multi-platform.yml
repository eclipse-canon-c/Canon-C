          gcov-14 --conditions --all-blocks "$ARENA_GCDA" 2>&1 | \
            grep -A 200 "arena.h" | head -500

          echo ""
          echo "=== Looking for the generated .gcov file for arena.h ==="
          find . -name "arena.h.gcov" -exec echo "Found: {}" \;

          ARENA_GCOV=$(find . -name "arena.h.gcov" | head -1)
