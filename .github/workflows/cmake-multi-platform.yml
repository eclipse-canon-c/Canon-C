        #
        # VEC-SPECIFIC EXPECTATION: vec_impl.h itself IS expected to appear
        # in the ownership table — but with the result__Bool_Error
        # fingerprint only: 4 functions / 1 line (the guarded
        # CANON_RESULT(bool, Error) emission at file scope, vec_impl.h
        # ~line 113) and ZERO conditions. CI #1147's genhtml already showed
        # exactly this (lines=1 functions=4), as did deque_impl.h and
        # fold_impl.h (same guarded emission). For the MCDC-010 split this
